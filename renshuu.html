<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TR品質向上活動報告会 発表練習</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; }
#app { padding: 14px; max-width: 480px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.slide-num { font-size: 12px; color: #888; }
.timer { font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums; color: #222; }
.bar-wrap { height: 5px; background: #e0e0e0; border-radius: 3px; margin-bottom: 10px; }
.bar { height: 5px; border-radius: 3px; transition: width 1s linear, background 0.3s; }
.dots { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.dot { width: 9px; height: 9px; border-radius: 50%; cursor: pointer; transition: background 0.2s; }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 10px; margin-bottom: 8px; }
.badge-a { background: #dbeafe; color: #1e40af; }
.badge-b { background: #dcfce7; color: #166534; }
.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.card-title { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px; }
.title-text { font-size: 14px; font-weight: 700; color: #111; flex: 1; }
.allotted { font-size: 11px; background: #f3f3f3; color: #666; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.script { font-size: 16px; line-height: 1.9; color: #333; white-space: pre-wrap; }
.hl { background: #fde68a; color: #78350f; border-radius: 3px; padding: 0 3px; }
.nav { display: flex; gap: 10px; margin-bottom: 10px; }
.btn { flex: 1; padding: 13px 0; font-size: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff; cursor: pointer; color: #333; -webkit-tap-highlight-color: transparent; }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn:active { background: #f0f0f0; }
.controls { display: flex; gap: 10px; }
.btn-start { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.btn-start.running { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="slide-num" id="slideNum"></div>
    <div class="timer" id="timerDisp">0:00</div>
  </div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="dots" id="dots"></div>
  <div id="badge"></div>
  <div class="card">
    <div class="card-title">
      <div class="title-text" id="title"></div>
      <div class="allotted" id="allotted"></div>
    </div>
    <div class="script" id="script"></div>
  </div>
  <div class="nav">
    <button class="btn" id="btnPrev" onclick="go(-1)">◀ 前へ</button>
    <button class="btn" id="btnNext" onclick="go(1)">次へ ▶</button>
  </div>
  <div class="controls">
    <button class="btn btn-start" id="btnTimer" onclick="toggleTimer()">▶ 開始</button>
    <button class="btn" onclick="resetTimer()">↺ リセット</button>
  </div>
  <div style="margin-top:10px;">
    <button class="btn" id="btnSpeak" onclick="toggleSpeak()" style="width:100%;background:#f0fdf4;color:#166534;border-color:#bbf7d0;">
      🔊 読み上げ
    </button>
  </div>
</div>

<script>
const slides = [
  { s:'A', title:'① アジェンダ・開会', allotted:'2分', secs:120, script:`本日はお時間をいただきありがとうございます。
2026年4月のTR品質向上活動報告会を始めさせていただきます。

本日のアジェンダはご覧の通りです。
それでは早速始めます。` },

  { s:'A', title:'② 東海理化様向け品質状況', allotted:'3分', secs:180, script:`まず品質状況についてご報告します。

2026年の後工程クレームは3月に1件発生しましたが、現時点で目標ラインを大きく下回って推移しています。

2025年が月平均【1.08件】だったのに対し、現在は【0.33件】と約3分の1に改善できております。` },

  { s:'A', title:'③ 2025年不具合の振り返り', allotted:'5分', secs:300, script:`次に昨年の不具合を振り返ります。

東海理化様向け不具合件数は、2024年の【21件】から2025年は【13件】へ、約38%改善できました。
特にプレス不具合は17件から9件へと約半減しています。

おととし目立っていた測定ミス・異常処置ミスによる不具合はゼロ件を達成できました。

一方で課題として浮かび上がったのが【変化点起因の不具合】です。
変化点管理の基準の甘さが不具合につながるケースが目立ちました。

この対策として、【変化点区分のルール見直し】を実施しました。
現場での定量評価が難しい項目、具体的には打ち出し・面付け・刻印については、管理基準を【CからBに変更】しています。
これにより、品質Gの確認が入る体制に強化されました。` },

  { s:'A', title:'④ 変化点要因の不具合事例', allotted:'3分', secs:180, script:`変化点起因の不具合についての具体的な事例になります。

初物測定で曲げ高さと面押しのNGを検出した際、面押しを強くしようとしてストリッパー側の押えプレートにシムを追加しました。
しかしこれは【金型構造上、不適切な調整】で、ストリッパーが材料を押える力が相対的に弱まり、曲げが甘くなってしまいました。

そして、この変化点に対して通常の量産管理項目しか測定しておらず、【影響する寸法の測定を実施していなかった】ことです。

この事例を受け、変化点管理基準の見直しを実施しました。` },

  { s:'A', title:'⑤ 昨年の振り返り（全体）', allotted:'3分', secs:180, script:`続いて工程内不良の振り返りです。

工程内不良件数は2024年の【370件】から2025年は【264件】へ、損失金額は804万円から563万円へと、いずれも約【30%削減】することができました。

成果として異常履歴アプリの導入により、スムーズな情報共有とデータに基づいた課題抽出が可能になりました。

一方でアプリ化により対応スピードは上がりましたが、再発防止・未然防止には活かしきれていません。
【DXのさらなる拡充を今年度のテーマの一つとして掲げています】。` },

  { s:'A', title:'⑥ 昨年の不具合振り返り（品違い）', allotted:'3分', secs:180, script:`昨年の不具合でもう一つの課題が、品違い不具合の増加です。

原因は「部品の誤投入」「かんばんの確認不足」といった生産現場でのヒューマンエラーです。

具体的には、部品投入ミスや、4G溶接工程でのかんばん指示の確認不足によって発生しています。

これらの対策を標準化し、横展することで、【品違い0を目指します】。` },

  { s:'A', title:'⑦ 今年度の取り組み', allotted:'5分', secs:300, script:`今年度の活動の柱は2つです。

【1つ目が「工程内異常の見える化と潰し込み」】
DXによる工程内不良の把握と対策、慢性的な異常の撲滅を進めます。

【2つ目が「品違い不具合の撲滅」】
かんばん照合環境の整備・横展と、物流工程での異常低減を推進します。

KPIの現状ですが、2026年3月時点ではすべての項目で目標を達成しています。
品違い不具合は0件、工程内不良件数は16件/月、工程内不良損失は22万円/月、納入不具合は1件と、いずれも良好な状況です。` },

  { s:'A', title:'⑧ 活動事例紹介・接続', allotted:'1分', secs:60, script:`以上が品質状況と今年度の取り組みの概要です。

続きまして、具体的な活動事例として3つのテーマをご報告します。
①DXによる工程内異常の見える化
②工程内異常低減の取り組み
③物流工程での異常低減

それでは①から、私より報告いたします。` },

  { s:'B', title:'④-0 DXロードマップ', allotted:'2分', secs:120, script:`「DXによる工程内異常の見える化」について報告いたします。

昨年末より、異常の見える化と対応の効率化を目的とした【異常履歴アプリの運用を開始】しました。
こちらは100%内製で開発しており、自社の仕組みに完全にマッチしたアプリ構造となっています。
この内製の強みを生かした小回りの利く改善を重ね、現在も日々進化しています。

こちらのグラフからも見て取れるように、このアプリの導入を境に、品質状況に【風向きも変わった】と感じています。

今回は、このアプリが生まれた経緯と、どんな機能を持っているのか順を追ってご紹介いたします。` },

  { s:'B', title:"④-1 従来のDX（'25年2月〜11月）", allotted:'2分', secs:120, script:`テーマ「異常履歴のDX改善」について、1から5のステップで報告します。

まず【1. 従来のDX】についてです。2025年2月から11月にかけての取り組みです。

従来は、全部署共通のExcelシートで異常履歴を一元管理し、PowerBIで集計・可視化していました。

製造部と技術部がそれぞれExcelに入力し、PowerBIで集計したデータを品質朝市で報告・レビューする運用です。

データの蓄積という観点では一定の効果がありましたが、現場からは様々な課題の声が上がっていました。` },

  { s:'B', title:'④-2 現状調査', allotted:'2分', secs:120, script:`【2. 現状調査】の結果です。

入力側の問題点が3つありました。
一つ目は【膨大なデータを処理するため動作が重い】こと。
二つ目は【異常が起きたその場で入力が出来ない】こと。
三つ目は【写真が無く状況が伝わりづらい】ことです。

集計・解析側の問題点も2つありました。
一つ目は【多くの人が使い方が分からず活用されていない】こと。
二つ目は【「今、起きている異常」のリアルタイム情報が得られない】ことです。

これらを総合すると、【現場のニーズとの不一致】が根本的な問題でした。` },

  { s:'B', title:'④-3 アプリ開発・マルチデバイス対応', allotted:'2分', secs:120, script:`そこで、【現場に本当に合った仕組みを目指して、アプリ開発にチャレンジ】しました。

コンセプトは「生産部が喜ぶ改善」です。

キーポイントの一つ目が【マルチデバイス対応】です。
スマートフォン・タブレット・PCのいずれからでも使えるよう設計し、現場のどこでも、その場で入力できるようにしました。

発生日・時刻はNOWボタン一押しで自動入力できる設計となっています。` },

  { s:'B', title:'④-4 スマートフォン対応', allotted:'1分', secs:60, script:`スマートフォン対応について補足します。

従来のExcelは現場での入力が事実上不可能でしたが、本アプリはモバイル端末に最適化した画面設計としています。

異常が発生したその瞬間に、手元のスマートフォンで入力できるようになりました。
これにより【情報の鮮度が大幅に向上】しています。` },

  { s:'B', title:'④-5 リスト選択・データ一貫性', allotted:'1分', secs:60, script:`入力精度を高めるための工夫として、【リスト選択方式】を採用しています。

発信部署・ライン名・処置者などの項目は、自由入力ではなくリストから選択する形式です。

これにより【データの一貫性を確保】し、後の集計・分析に活用しやすい構造としています。
表記ゆれや入力ミスによるデータ汚染を防ぐ効果があります。` },

  { s:'B', title:'④-6 過去データから候補表示', allotted:'1分', secs:60, script:`次に、入力工数を低減するための【過去データからの候補表示機能】をご紹介します。

品番（整理No）を選択すると、その品番で過去に多く入力されたワードが候補として自動表示されます。

例えば「フランジ部割れ」「工機連絡 金型修理」といった内容が候補に挙がることで、入力時間を大幅に短縮できます。

現場の作業者が入力に時間をとられず、本来の対応に集中できる環境を実現しました。` },

  { s:'B', title:'④-7 写真アップロード', allotted:'1分', secs:60, script:`次は【写真アップロード機能】です。

スマートフォンのカメラで異常部位をその場で撮影し、そのままアプリにアップロードできます。

これにより異常の状況を文章で細かく説明する必要がなくなりました。
【「詳細は写真参照」で済む】ため、表現に悩む時間がゼロになります。

文章では伝わりにくい微妙な傷や変形も、写真で正確に共有できるようになりました。` },

  { s:'B', title:'④-8 過去トラ検索', allotted:'1分', secs:60, script:`最後の機能が【過去トラ検索】です。

登録時に、過去の類似案件を自動で検索・表示します。

例えば「フランジ部割れ」で登録すると、過去の対応事例が類似度付きで表示されます。
「2025-12-03の対応事例 類似度100%」として、過去の異常内容・現場対応・処置方法が参照できます。

これにより【対応の参考にできる】だけでなく、【原因特定のヒント】にもなります。
ベテランの知見をデジタルで蓄積し、誰でも活用できる仕組みです。` },

  { s:'B', title:'④-9 対策結果', allotted:'2分', secs:120, script:`【4. 対策結果】として、実際の運用事例をご紹介します。

こちらは整理No.7583、88-400ラインでの事例です。

異常内容は「箱替え機 搬送異常　チェーン回らない　チェーンとスプロケの間に7583ワーク噛み込み」と、状況が具体的に記録されています。

写真も添付されており、チェーンとスプロケの噛み込み状況が一目で分かります。

【情報の精度が向上し、事実に基づいた原因分析を迅速に行うことが可能となりました】。` },

  { s:'B', title:'④-10 結論・今後の展開', allotted:'2分', secs:120, script:`これらの改善によって現場が【「これがあって良かった」と思える道具】になりました。

また、アプリを介して手軽に異常履歴へアクセスできるようになり、全体の異常に対する感度が上がり、【対応スピードの向上も数値として表れています】。

今後はここで培ったデータを活用し、【「生まれのいいラインづくり」につながるツール】として発展させていきたいです。

以上が「異常履歴のDX改善」の活動報告です。ありがとうございました。` },
];

let cur = 0, elapsed = 0, running = false, iv = null;

function render() {
  const s = slides[cur];
  document.getElementById('slideNum').textContent = `スライド ${cur+1} / ${slides.length}`;
  document.getElementById('title').textContent = s.title;
  document.getElementById('allotted').textContent = s.allotted;
  document.getElementById('script').innerHTML = s.script.replace(/【(.+?)】/g, '<span class="hl">$1</span>');
  document.getElementById('badge').innerHTML = `<span class="badge ${s.s==='B'?'badge-b':'badge-a'}">${s.s==='B'?'④ 異常履歴DX改善':'概要パート'}</span>`;
  document.getElementById('btnPrev').disabled = cur === 0;
  document.getElementById('btnNext').disabled = cur === slides.length - 1;
  renderDots();
  updateBar();
}

function renderDots() {
  document.getElementById('dots').innerHTML = slides.map((sl, i) => {
    let bg = sl.s==='B' ? '#ccc' : '#ddd';
    if (i < cur) bg = sl.s==='B' ? '#639922' : '#1D9E75';
    if (i === cur) bg = sl.s==='B' ? '#3B6D11' : '#378ADD';
    return `<div class="dot" style="background:${bg}" onclick="jumpTo(${i})"></div>`;
  }).join('');
}

function updateBar() {
  const s = slides[cur];
  const pct = Math.min(100, (elapsed / s.secs) * 100);
  const color = pct > 90 ? '#E24B4A' : pct > 70 ? '#EF9F27' : '#1D9E75';
  const bar = document.getElementById('bar');
  bar.style.width = (100 - pct) + '%';
  bar.style.background = color;
  const m = Math.floor(elapsed / 60), sec = elapsed % 60;
  document.getElementById('timerDisp').textContent = `${m}:${String(sec).padStart(2,'0')}`;
}

function go(d) {
  stopTimer(); stopSpeak();
  cur = Math.max(0, Math.min(slides.length - 1, cur + d));
  elapsed = 0;
  document.getElementById('btnTimer').textContent = '▶ 開始';
  document.getElementById('btnTimer').className = 'btn btn-start';
  render();
}

function jumpTo(i) {
  stopTimer(); stopSpeak();
  cur = i; elapsed = 0;
  document.getElementById('btnTimer').textContent = '▶ 開始';
  document.getElementById('btnTimer').className = 'btn btn-start';
  render();
}

function stopTimer() { clearInterval(iv); running = false; }

// ===== 読み上げ =====
let speaking = false;

function toggleSpeak() {
  if (speaking) {
    speechSynthesis.cancel();
    setSpeakBtn(false);
    return;
  }
  const text = slides[cur].script.replace(/【|】/g, '');
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = 0.95;

  // 日本語の声を優先して選ぶ
  const voices = speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
  if (jpVoice) utt.voice = jpVoice;

  utt.onstart = () => setSpeakBtn(true);
  utt.onend = () => setSpeakBtn(false);
  utt.onerror = () => setSpeakBtn(false);
  speechSynthesis.speak(utt);
}

function setSpeakBtn(active) {
  speaking = active;
  const btn = document.getElementById('btnSpeak');
  if (active) {
    btn.textContent = '⏹ 停止';
    btn.style.background = '#fef2f2';
    btn.style.color = '#b91c1c';
    btn.style.borderColor = '#fecaca';
  } else {
    btn.textContent = '🔊 読み上げ';
    btn.style.background = '#f0fdf4';
    btn.style.color = '#166534';
    btn.style.borderColor = '#bbf7d0';
  }
}

// スライド移動時に読み上げ停止
function stopSpeak() { speechSynthesis.cancel(); setSpeakBtn(false); }

function toggleTimer() {
  const btn = document.getElementById('btnTimer');
  if (running) {
    stopTimer();
    btn.textContent = '▶ 再開';
    btn.className = 'btn btn-start';
  } else {
    running = true;
    btn.textContent = '⏸ 一時停止';
    btn.className = 'btn btn-start running';
    iv = setInterval(() => { elapsed++; updateBar(); }, 1000);
  }
}

function resetTimer() {
  stopTimer();
  elapsed = 0;
  document.getElementById('btnTimer').textContent = '▶ 開始';
  document.getElementById('btnTimer').className = 'btn btn-start';
  updateBar();
}

render();
</script>
</body>
</html>
