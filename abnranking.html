
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>停止要因ランキング｜ライン別</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#f0f2f8; --card:#ffffff; --ink:#1e293b; --ink-2:#334155;
    --muted:#64748b; --border:#e2e8f0; --brand:#667eea; --brand-2:#764ba2;
    --shadow:0 2px 12px rgba(102,126,234,.10); --shadow-md:0 4px 24px rgba(102,126,234,.15);
    --row-odd:#f8fafc; --row-hover:#eef2ff; --table-head:#667eea;
  }
  body.dark {
    --bg:#0b1120; --card:#0f172a; --ink:#e2e8f0; --ink-2:#cbd5e1;
    --muted:#94a3b8; --border:#1e293b; --brand:#818cf8; --brand-2:#a78bfa;
    --shadow:0 2px 12px rgba(0,0,0,.3); --shadow-md:0 4px 24px rgba(0,0,0,.4);
    --row-odd:#0b1528; --row-hover:#0f1f3d; --table-head:#334155;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic UI',sans-serif;
    background:var(--bg);color:var(--ink);min-height:100vh;transition:background .3s,color .3s;}

  .header{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);
    padding:16px 28px;position:sticky;top:0;z-index:200;
    box-shadow:0 2px 20px rgba(102,126,234,.35);
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .header h1{color:#fff;font-size:1.25rem;font-weight:700;}
  .header-sub{color:rgba(255,255,255,.75);font-size:.8rem;margin-top:1px;}
  .btn-hd{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);
    color:#fff;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s;}
  .btn-hd:hover{background:rgba(255,255,255,.28);}

  .container{max-width:1500px;margin:0 auto;padding:22px 28px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:18px 22px;box-shadow:var(--shadow);margin-bottom:18px;}
  .panel-title{font-size:.95rem;font-weight:700;color:var(--brand);margin-bottom:12px;}

  .filter-grid{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;}
  .fg-item{display:flex;flex-direction:column;gap:4px;}
  .fg-item label{font-size:.8rem;font-weight:600;color:var(--muted);}
  .fg-item input[type="date"],.fg-item select{
    padding:8px 12px;border:2px solid var(--border);border-radius:8px;
    background:transparent;color:var(--ink);font-size:.88rem;min-width:140px;transition:.2s;}
  .fg-item input[type="date"]:focus,.fg-item select:focus{outline:none;border-color:var(--brand);}
  .quick-btns{display:flex;gap:5px;flex-wrap:wrap;}
  .qbtn{padding:8px 14px;border:2px solid var(--brand);background:transparent;
    color:var(--brand);border-radius:7px;cursor:pointer;font-weight:700;font-size:.83rem;transition:.2s;}
  .qbtn:hover{background:rgba(102,126,234,.08);}
  .qbtn.active{background:var(--brand);color:#fff;}

  .controls-row{display:flex;flex-wrap:wrap;gap:16px;align-items:center;}
  .seg{display:flex;border:2px solid var(--border);border-radius:8px;overflow:hidden;}
  .seg button{padding:7px 15px;border:none;background:transparent;color:var(--ink);
    font-weight:600;font-size:.85rem;cursor:pointer;border-right:1px solid var(--border);transition:.15s;}
  .seg button:last-child{border-right:none;}
  .seg button.active{background:var(--brand);color:#fff;}
  .ctrl-label{font-size:.85rem;font-weight:600;color:var(--muted);}

  .summary-row{display:flex;flex-wrap:wrap;gap:10px;}
  .stat-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:12px 20px;border-radius:10px;border:1px solid var(--border);
    background:rgba(148,163,184,.07);min-width:120px;gap:2px;}
  .stat-badge .val{font-size:1.6rem;font-weight:800;color:var(--brand);}
  .stat-badge .lbl{font-size:.76rem;color:var(--muted);font-weight:600;}

  /* ライン別カード */
  .line-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
    box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
  .line-card-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;
    gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(148,163,184,.06);}
  .lc-name{font-size:1.1rem;font-weight:800;color:var(--ink);}
  .lc-dept{font-size:.78rem;color:var(--muted);font-weight:600;
    background:rgba(148,163,184,.14);padding:3px 10px;border-radius:20px;border:1px solid var(--border);}
  .lc-meta{display:flex;gap:16px;flex-wrap:wrap;}
  .lc-meta span{font-size:.82rem;color:var(--muted);}
  .lc-meta strong{color:var(--ink);font-weight:700;}

  /* デュアルチャート */
  .dual-charts{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--border);}
  @media(max-width:800px){.dual-charts{grid-template-columns:1fr;}}
  .chart-col{padding:16px 20px;}
  .chart-col:first-child{border-right:1px solid var(--border);}
  .chart-col-title{font-size:.85rem;font-weight:700;color:var(--muted);
    margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .ctag{display:inline-block;padding:2px 8px;border-radius:20px;
    font-size:.78rem;font-weight:700;border:1px solid;}
  .ctag-count{background:rgba(102,126,234,.12);border-color:rgba(102,126,234,.35);color:var(--brand);}
  .ctag-stop{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#dc2626;}
  body.dark .ctag-stop{color:#f87171;}
  .chart-wrap{position:relative;}

  /* 詳細テーブル */
  .detail-section{padding:0 20px 16px;}
  .detail-toggle{display:flex;align-items:center;gap:8px;padding:10px 0;
    cursor:pointer;user-select:none;color:var(--brand);font-weight:700;font-size:.88rem;
    border-top:1px solid var(--border);}
  .detail-toggle:hover{opacity:.8;}
  .toggle-arrow{transition:transform .2s;display:inline-block;}
  .toggle-arrow.open{transform:rotate(90deg);}
  .detail-table-wrap{display:none;overflow-x:auto;border:1px solid var(--border);border-radius:8px;margin-top:8px;}
  .detail-table-wrap.open{display:block;}
  table.dt{width:100%;border-collapse:collapse;font-size:.84rem;color:var(--ink);}
  table.dt thead th{background:var(--table-head);color:#fff;padding:9px 14px;
    text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:1;}
  table.dt tbody tr:nth-child(odd){background:var(--row-odd);}
  table.dt tbody tr:nth-child(even){background:var(--card);}
  table.dt tbody tr:hover{background:var(--row-hover);}
  table.dt td{padding:8px 14px;border-bottom:1px solid var(--border);vertical-align:top;}
  .rank-cell{font-weight:800;font-size:.88rem;text-align:center;white-space:nowrap;
    border-right:2px solid var(--border);}
  .rank-top{color:#ef4444;}
  .rank-2nd{color:#f97316;}
  .rank-3rd{color:#eab308;}
  .rank-rest{color:var(--muted);}
  .stop-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-weight:700;font-size:.82rem;}
  .stop-hi{background:rgba(239,68,68,.14);color:#dc2626;border:1px solid rgba(239,68,68,.3);}
  .stop-mid{background:rgba(245,158,11,.14);color:#b45309;border:1px solid rgba(245,158,11,.3);}
  .stop-lo{background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.3);}
  .stop-zero{background:rgba(148,163,184,.12);color:var(--muted);border:1px solid var(--border);}
  body.dark .stop-hi{color:#f87171;}
  body.dark .stop-mid{color:#fbbf24;}
  body.dark .stop-lo{color:#34d399;}
  .content-cell{max-width:300px;line-height:1.55;}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:1rem;}
  .empty-icon{font-size:3rem;margin-bottom:10px;}
  .loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:9999;gap:14px;color:#fff;font-size:1.05rem;font-weight:600;}
  .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div>データ読み込み中…</div>
</div>

<div class="header">
  <div>
    <h1>📊 停止要因ランキング</h1>
    <div class="header-sub">ライン別・整理No 集計ビュー</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn-hd" id="btnTheme">🌙 ダーク</button>
    <button class="btn-hd" id="btnRefresh">🔄 再読込</button>
  </div>
</div>

<div class="container">

  <div class="panel">
    <div class="panel-title">📅 期間・絞り込み</div>
    <div class="filter-grid">
      <div class="fg-item">
        <label>クイック選択</label>
        <div class="quick-btns">
          <button class="qbtn" id="btnYesterday">前日</button>
          <button class="qbtn" id="btnToday">今日</button>
          <button class="qbtn" id="btnWeek">直近7日</button>
          <button class="qbtn" id="btnMonth">直近30日</button>
          <button class="qbtn" id="btnAll">全期間</button>
        </div>
      </div>
      <div class="fg-item"><label>開始日</label><input type="date" id="dateFrom"></div>
      <div class="fg-item"><label>終了日</label><input type="date" id="dateTo"></div>
      <div class="fg-item"><label>部署</label>
        <select id="deptFilter"><option value="">すべての部署</option></select>
      </div>
      <div class="fg-item"><label>ライン</label>
        <select id="lineFilter"><option value="">すべてのライン</option></select>
      </div>
    </div>
  </div>

  <div class="panel" style="padding:12px 22px;">
    <div class="controls-row">
      <span class="ctrl-label">表示件数 (TOP N)：</span>
      <div class="seg" id="topnSeg">
        <button data-val="5">TOP 5</button>
        <button class="active" data-val="10">TOP 10</button>
        <button data-val="20">TOP 20</button>
      </div>
    </div>
  </div>

  <div class="panel" id="summaryPanel" style="display:none;">
    <div class="panel-title">📌 集計サマリー</div>
    <div class="summary-row" id="summaryRow"></div>
  </div>

  <div id="chartsArea">
    <div class="empty"><div class="empty-icon">📭</div><div>条件に合うデータがありません</div></div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence }
  from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js';
import { getFirestore, collection, query, orderBy, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyA0YUIpIDh4WB4p1ewiNB0XfwHve0ByljU",
  authDomain:"abnreport-fd733.firebaseapp.com",
  projectId:"abnreport-fd733",
  storageBucket:"abnreport-fd733.firebasestorage.app",
  messagingSenderId:"349748947315",
  appId:"1:349748947315:web:010cb671d2a95bcf1f7d06"
});
const db   = getFirestore(app);
const auth = getAuth(app);

/* テーマ */
let theme = localStorage.getItem('rankingTheme') ||
  (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
function applyTheme(t){
  document.body.classList.toggle('dark', t==='dark');
  document.getElementById('btnTheme').textContent = t==='dark' ? '☀️ ライト' : '🌙 ダーク';
  theme = t;
}
applyTheme(theme);
document.getElementById('btnTheme').addEventListener('click', ()=>{
  theme = theme==='dark' ? 'light' : 'dark';
  localStorage.setItem('rankingTheme', theme);
  applyTheme(theme);
  renderAll();
});

/* utils */
const pad2 = n => String(n).padStart(2,'0');
function fmtDate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function today(){ return fmtDate(new Date()); }
function opToday(){ const n=new Date(); if(n.getHours()<8) n.setDate(n.getDate()-1); return fmtDate(n); }
function prevBiz(){ const d=new Date(); const w=d.getDay(); d.setDate(d.getDate()-(w===1?3:w===0?2:1)); return fmtDate(d); }
function nAgo(n){ const d=new Date(); d.setDate(d.getDate()-n+1); return fmtDate(d); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nw(s){ return String(s||'').replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/　/g,' ').trim(); }
function normD(s){ return nw(s).toUpperCase()||'未設定'; }
function normL(s){ return nw(s)||'未設定'; }
function normS(s){ return nw(s).replace(/\s+/g,'')||'未設定'; }

function parseDt(v){
  if(!v) return null;
  let d=null;
  if(typeof v==='object'){ if(typeof v.toDate==='function') d=v.toDate(); else if('seconds'in v) d=new Date(v.seconds*1000); }
  if(!d&&typeof v==='number') d=new Date(v);
  if(!d&&typeof v==='string'){
    const s=v.trim();
    let m=s.match(/^(\d{4})[.\-\/年](\d{1,2})[.\-\/月](\d{1,2})/);
    if(m) d=new Date(+m[1],+m[2]-1,+m[3]);
    if(!d){ const p=Date.parse(s); if(!isNaN(p)) d=new Date(p); }
  }
  if(!d||isNaN(d.getTime())) return null;
  return d;
}
function normTime(v){
  if(!v) return null; const s=String(v).trim();
  let m=s.match(/^(\d{1,2}):(\d{1,2})$/); if(m) return `${pad2(+m[1])}:${pad2(+m[2])}`;
  m=s.match(/(\d{1,2})\D+(\d{1,2})/); if(m) return `${pad2(+m[1])}:${pad2(+m[2])}`;
  m=s.match(/^(\d{3,4})$/); if(m){ const r=m[1].padStart(4,'0'); return `${pad2(+r.slice(0,2))}:${pad2(+r.slice(2,4))}`; }
  return null;
}

/* state */
let allData=[], topN=10, dateFrom=null, dateTo=null, selDept='', selLine='';
let charts={};

function convertDoc(doc){
  const r={ _id:doc.id,...doc.data() };
  const occSrc = r.occurrenceDate??r.occurrence_at??r.date??r.createdAt??r.updatedAt;
  const occDate = parseDt(occSrc);
  const occMs   = occDate ? occDate.getTime() : null;
  const occIso  = occDate ? fmtDate(occDate) : null;
  const oT = normTime(r.occurrenceTime);
  const rT = normTime(r.restartTime);
  let stop = null;
  if(oT&&rT){ const[oh,om]=oT.split(':').map(Number); const[rh,rm]=rT.split(':').map(Number); let d=(rh*60+rm)-(oh*60+om); if(d<0)d+=1440; stop=d; }
  if(typeof r.stopMinutes==='number') stop=r.stopMinutes;
  return {
    _id:r._id, dept:normD(r.department), line:normL(r.lineName),
    serialNo:normS(r.serialNo||r.serial||''),
    occMs, occIso, occTimeNorm:oT, resTimeNorm:rT, stopMinutes:stop,
    anomalyContent:(r.anomalyContent||'').trim(),
    actionTaken:(r.actionTaken||'').trim(),
    handler:(r.handler||'').trim(),
  };
}

function getFiltered(){
  const fromMs = dateFrom ? new Date(`${dateFrom}T00:00:00`).getTime() : null;
  const toMs   = dateTo   ? new Date(`${dateTo}T23:59:59.999`).getTime() : null;
  return allData.filter(it=>{
    if(fromMs!==null&&(it.occMs===null||it.occMs<fromMs)) return false;
    if(toMs!==null  &&(it.occMs===null||it.occMs>toMs))   return false;
    if(selDept&&it.dept!==selDept) return false;
    if(selLine&&it.line!==selLine) return false;
    return true;
  });
}

function updateSelects(){
  const depts=[...new Set(allData.map(d=>d.dept))].sort();
  const dSel=document.getElementById('deptFilter'); const pD=dSel.value;
  dSel.innerHTML='<option value="">すべての部署</option>'+depts.map(d=>`<option value="${d}"${d===pD?'selected':''}>${d}</option>`).join('');
  selDept=dSel.value;
  const lines=[...new Set(allData.filter(d=>!selDept||d.dept===selDept).map(d=>d.line))].sort();
  const lSel=document.getElementById('lineFilter'); const pL=lSel.value;
  lSel.innerHTML='<option value="">すべてのライン</option>'+lines.map(l=>`<option value="${l}"${l===pL?'selected':''}>${l}</option>`).join('');
  selLine=lSel.value;
}

function renderSummary(data){
  const p=document.getElementById('summaryPanel');
  if(!data.length){ p.style.display='none'; return; }
  p.style.display='';
  const tStop=data.reduce((s,d)=>s+(d.stopMinutes||0),0);
  document.getElementById('summaryRow').innerHTML=`
    <div class="stat-badge"><span class="val">${data.length.toLocaleString()}</span><span class="lbl">総異常件数</span></div>
    <div class="stat-badge"><span class="val">${tStop.toLocaleString()}</span><span class="lbl">総停止時間（分）</span></div>
    <div class="stat-badge"><span class="val">${new Set(data.map(d=>d.line)).size}</span><span class="lbl">対象ライン数</span></div>
    <div class="stat-badge"><span class="val">${new Set(data.map(d=>d.serialNo).filter(s=>s&&s!=='未設定')).size}</span><span class="lbl">整理No 種類数</span></div>`;
}

function hexRgba(hex,a){ const h=hex.replace('#',''); const n=parseInt(h,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

function stopBadge(min){
  if(min===null||min===undefined) return `<span class="stop-badge stop-zero">-</span>`;
  const n=+min;
  if(n>=60)  return `<span class="stop-badge stop-hi">${n}分</span>`;
  if(n>=15)  return `<span class="stop-badge stop-mid">${n}分</span>`;
  if(n>0)    return `<span class="stop-badge stop-lo">${n}分</span>`;
  return `<span class="stop-badge stop-zero">0分</span>`;
}

function drawChart(canvasId, labels, values, color, metricLabel){
  const isDark=document.body.classList.contains('dark');
  const gridC=isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)';
  const tickC=isDark?'#94a3b8':'#64748b';
  const lblC=isDark?'#e2e8f0':'#1e293b';
  const bars=values.map((_,i)=>hexRgba(color,i===0?.90:i===1?.78:i===2?.68:.58));
  const ctx=document.getElementById(canvasId)?.getContext('2d');
  if(!ctx) return;
  charts[canvasId]?.destroy();
  charts[canvasId]=new Chart(ctx,{
    type:'bar',
    data:{ labels, datasets:[{ label:metricLabel, data:values,
      backgroundColor:bars, borderColor:color, borderWidth:2,
      borderRadius:4, borderSkipped:false }] },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      animation:{ duration:350, easing:'easeOutQuart' },
      layout:{ padding:{ right:10 } },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:isDark?'#0f172a':'#fff',
          titleColor:isDark?'#e2e8f0':'#1e293b',
          bodyColor:isDark?'#94a3b8':'#64748b',
          borderColor:isDark?'#1e293b':'#e2e8f0',
          borderWidth:1, padding:10,
          callbacks:{ label:ctx=>`${metricLabel}：${ctx.parsed.x.toLocaleString()}` }
        }
      },
      scales:{
        x:{ beginAtZero:true, grid:{ color:gridC },
          ticks:{ color:tickC, font:{ size:11 } },
          title:{ display:true, text:metricLabel, color:tickC, font:{ size:11,weight:'600' } } },
        y:{ grid:{ display:false },
          ticks:{ color:lblC, font:{ size:12,weight:'600' },
            callback:(_,i)=>{ const l=labels[i]; return l.length>16?l.slice(0,15)+'…':l; } } }
      }
    }
  });
}

function buildTable(allSorted){
  const rankCls = i => i===0?'rank-top':i===1?'rank-2nd':i===2?'rank-3rd':'rank-rest';
  const rankLbl = i => i===0?'1位':i===1?'2位':i===2?'3位':`${i+1}位`;

  const rows = allSorted.flatMap((entry, si)=>{
    const rc = rankCls(si);
    const rl = rankLbl(si);
    return entry.rows.map((it, ri)=>`
      <tr>
        ${ri===0
          ? `<td rowspan="${entry.rows.length}" class="rank-cell ${rc}">
               ${rl}<br>
               <span style="font-size:.95rem;font-weight:800;color:var(--ink);word-break:break-all;">${esc(entry.sn)}</span><br>
               <span style="font-size:.76rem;color:var(--muted);">計${entry.count}件・${entry.stop}分</span>
             </td>`
          : ''}
        <td style="white-space:nowrap;color:var(--muted);font-size:.8rem;">${esc(it.occIso||'-')}</td>
        <td style="white-space:nowrap;font-size:.8rem;">${esc(it.occTimeNorm||'-')}→${esc(it.resTimeNorm||'-')}</td>
        <td style="text-align:right;">${stopBadge(it.stopMinutes)}</td>
        <td class="content-cell">${esc(it.anomalyContent)||'<span style="color:var(--muted);">-</span>'}</td>
        <td class="content-cell" style="font-size:.8rem;">${esc(it.actionTaken)||'<span style="color:var(--muted);">-</span>'}</td>
        <td style="white-space:nowrap;font-size:.8rem;">${esc(it.handler)||'-'}</td>
      </tr>`);
  }).join('');

  return `<table class="dt">
    <thead><tr>
      <th style="min-width:88px;">整理No（順位）</th>
      <th>発生日</th><th>発生→再開</th><th>停止時間</th>
      <th style="min-width:200px;">異常内容</th>
      <th style="min-width:160px;">対応内容</th>
      <th>処置者</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderAll(){
  const data=getFiltered();
  renderSummary(data);

  Object.values(charts).forEach(c=>c.destroy());
  charts={};

  const lineMap=new Map();
  for(const it of data){
    if(!lineMap.has(it.line)) lineMap.set(it.line,{ dept:it.dept, serials:new Map() });
    const entry=lineMap.get(it.line);
    const sn=it.serialNo||'未設定';
    if(!entry.serials.has(sn)) entry.serials.set(sn,{count:0,stop:0,rows:[]});
    const s=entry.serials.get(sn);
    s.count++; s.stop+=(it.stopMinutes||0); s.rows.push(it);
  }

  const area=document.getElementById('chartsArea');
  if(!lineMap.size){
    area.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div>条件に合うデータがありません</div></div>`;
    return;
  }
  area.innerHTML='';

  const isDark=document.body.classList.contains('dark');
  const brandC=isDark?'#818cf8':'#667eea';
  const stopC=isDark?'#f87171':'#ef4444';

  [...lineMap.keys()].sort().forEach((line,li)=>{
    const {dept,serials}=lineMap.get(line);
    const byCount=[...serials.entries()].sort((a,b)=>b[1].count-a[1].count).slice(0,topN);
    const byStop =[...serials.entries()].sort((a,b)=>b[1].stop -a[1].stop ).slice(0,topN);
    const allSorted=[...serials.entries()].sort((a,b)=>b[1].count-a[1].count)
      .map(([sn,v])=>({sn,count:v.count,stop:v.stop,
        rows:v.rows.slice().sort((a,b)=>(b.occMs||0)-(a.occMs||0))}));

    const tCount=[...serials.values()].reduce((s,v)=>s+v.count,0);
    const tStop =[...serials.values()].reduce((s,v)=>s+v.stop,0);

    const cId=`cc-${li}`, sId=`cs-${li}`, dtId=`dt-${li}`, arId=`ar-${li}`;
    const chartH=Math.max(180, Math.max(byCount.length,byStop.length)*36+60);

    const card=document.createElement('div');
    card.className='line-card';
    card.innerHTML=`
      <div class="line-card-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div class="lc-name">▍ ${esc(line)}</div>
          <div class="lc-dept">${esc(dept)}</div>
        </div>
        <div class="lc-meta">
          <span>異常件数：<strong>${tCount}</strong></span>
          <span>停止時間合計：<strong>${tStop}</strong> 分</span>
          <span>整理No 種類：<strong>${serials.size}</strong></span>
        </div>
      </div>
      <div class="dual-charts">
        <div class="chart-col">
          <div class="chart-col-title">
            <span class="ctag ctag-count">件数</span>整理No ランキング（発生回数の多い順）
          </div>
          <div class="chart-wrap" style="height:${chartH}px;"><canvas id="${cId}"></canvas></div>
        </div>
        <div class="chart-col">
          <div class="chart-col-title">
            <span class="ctag ctag-stop">停止時間</span>整理No ランキング（停止時間合計の多い順）
          </div>
          <div class="chart-wrap" style="height:${chartH}px;"><canvas id="${sId}"></canvas></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-toggle" id="tog-${li}">
          <span class="toggle-arrow" id="${arId}">▶</span>
          異常内容 詳細テーブルを表示（${tCount} 件・整理No ${serials.size} 種類）
        </div>
        <div class="detail-table-wrap" id="${dtId}">
          ${buildTable(allSorted)}
        </div>
      </div>`;

    area.appendChild(card);

    requestAnimationFrame(()=>{
      drawChart(cId, byCount.map(([sn])=>sn), byCount.map(([,v])=>v.count), brandC, '件数（回）');
      drawChart(sId, byStop .map(([sn])=>sn), byStop .map(([,v])=>v.stop),  stopC,  '停止時間合計（分）');
    });

    document.getElementById(`tog-${li}`).addEventListener('click',()=>{
      const w=document.getElementById(dtId); const a=document.getElementById(arId);
      const o=w.classList.toggle('open'); a.classList.toggle('open',o);
    });
  });
}

/* ボタン */
function setDates(f,t,aid=''){
  dateFrom=f; dateTo=t;
  document.getElementById('dateFrom').value=f||'';
  document.getElementById('dateTo').value=t||'';
  ['btnYesterday','btnToday','btnWeek','btnMonth','btnAll'].forEach(id=>
    document.getElementById(id).classList.toggle('active',id===aid));
  renderAll();
}
document.getElementById('btnYesterday').addEventListener('click',()=>{const y=prevBiz();setDates(y,y,'btnYesterday');});
document.getElementById('btnToday').addEventListener('click',()=>{const t=opToday();setDates(t,t,'btnToday');});
document.getElementById('btnWeek').addEventListener('click',()=>setDates(nAgo(7),today(),'btnWeek'));
document.getElementById('btnMonth').addEventListener('click',()=>setDates(nAgo(30),today(),'btnMonth'));
document.getElementById('btnAll').addEventListener('click',()=>setDates(null,null,'btnAll'));
['dateFrom','dateTo'].forEach(id=>document.getElementById(id).addEventListener('change',e=>{
  if(id==='dateFrom') dateFrom=e.target.value||null; else dateTo=e.target.value||null;
  ['btnYesterday','btnToday','btnWeek','btnMonth','btnAll'].forEach(i=>document.getElementById(i).classList.remove('active'));
  renderAll();
}));
document.getElementById('deptFilter').addEventListener('change',e=>{selDept=e.target.value;selLine='';updateSelects();renderAll();});
document.getElementById('lineFilter').addEventListener('change',e=>{selLine=e.target.value;renderAll();});
document.getElementById('topnSeg').querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{
  document.getElementById('topnSeg').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); topN=+btn.dataset.val; renderAll();
}));
document.getElementById('btnRefresh').addEventListener('click',()=>location.reload());

/* 認証 */
async function checkAuth(){
  return new Promise(resolve=>{
    onAuthStateChanged(auth,user=>{
      if(user){resolve(true);return;}
      const e=prompt('メールアドレス'), p=prompt('パスワード');
      if(!e||!p){resolve(false);return;}
      setPersistence(auth,browserLocalPersistence)
        .then(()=>signInWithEmailAndPassword(auth,e,p))
        .then(()=>resolve(true))
        .catch(err=>{alert('ログイン失敗: '+err.message);resolve(false);});
    });
  });
}

(async()=>{
  if(!await checkAuth()){alert('認証が必要です');return;}
  const t=opToday(); dateFrom=t; dateTo=t;
  document.getElementById('dateFrom').value=t;
  document.getElementById('dateTo').value=t;
  document.getElementById('btnToday').classList.add('active');

  onSnapshot(query(collection(db,'anomalies'),orderBy('createdAt','desc')), snap=>{
    allData=snap.docs.map(convertDoc);
    updateSelects(); renderAll();
    document.getElementById('loadingOverlay').style.display='none';
  }, err=>{
    console.error(err); alert('データ取得エラー: '+err.message);
    document.getElementById('loadingOverlay').style.display='none';
  });
})();
</script>
