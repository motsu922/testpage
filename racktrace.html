
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>RACK WMS — 入出庫トレース</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg:      #0f1117;
  --surface: #181c25;
  --card:    #1e2330;
  --border:  #2a3040;
  --accent:  #f5a623;
  --green:   #2ecc71;
  --red:     #e74c3c;
  --blue:    #3498db;
  --text:    #e8ecf0;
  --muted:   #6b7a8d;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);min-height:100vh;min-height:100dvh}
body{color:var(--text);font-family:'Noto Sans JP',sans-serif;-webkit-text-fill-color:var(--text)}
button,input,select{font-family:'Noto Sans JP',sans-serif;font-size:inherit}

.header{background:var(--surface);border-bottom:2px solid var(--accent);padding:10px 18px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.header-icon{font-size:20px}
.header-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;
  color:var(--accent);-webkit-text-fill-color:var(--accent);letter-spacing:2px}
.header-sub{font-size:11px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-left:6px}
.header-status{margin-left:auto;font-size:11px;color:var(--muted);-webkit-text-fill-color:var(--muted)}

.main{max-width:960px;margin:0 auto;padding:18px 14px 60px}

/* MODE TOGGLE */
.mode-toggle{display:flex;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;margin-bottom:12px}
.mode-btn{flex:1;padding:11px 10px;text-align:center;cursor:pointer;font-size:13px;
  font-weight:700;letter-spacing:0.3px;color:var(--muted);-webkit-text-fill-color:var(--muted);
  border:none;background:none;transition:all 0.2s;display:flex;align-items:center;
  justify-content:center;gap:6px}
.mode-btn:first-child{border-right:1px solid var(--border)}
.mode-btn.a-in {background:rgba(46,204,113,0.12);color:var(--green);-webkit-text-fill-color:var(--green)}
.mode-btn.a-out{background:rgba(52,152,219,0.12);color:var(--blue); -webkit-text-fill-color:var(--blue)}

.mode-desc{font-size:11px;color:var(--muted);-webkit-text-fill-color:var(--muted);
  margin-bottom:12px;padding:8px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;line-height:1.7}
.mode-desc strong{color:var(--text);-webkit-text-fill-color:var(--text)}

/* SEARCH */
.search-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;margin-bottom:16px}
.search-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:9px;font-weight:700;color:var(--muted);-webkit-text-fill-color:var(--muted);letter-spacing:1.2px}
input[type=date],select.sel{background:var(--surface);border:2px solid var(--border);border-radius:8px;
  color:var(--text);-webkit-text-fill-color:var(--text);font-size:14px;font-weight:700;
  padding:8px 12px;min-height:42px;outline:none;transition:border-color 0.2s;
  -webkit-appearance:none;appearance:none;cursor:pointer}
input.fi:focus,select.fi:focus{border-color:var(--green)}
input.fo:focus,select.fo:focus{border-color:var(--blue)}
.run-btn{border:none;border-radius:9px;font-weight:700;font-size:14px;padding:0 22px;
  min-height:42px;cursor:pointer;letter-spacing:0.5px;transition:opacity 0.2s;
  white-space:nowrap;color:var(--bg);-webkit-text-fill-color:var(--bg)}
.run-btn.ri{background:var(--green)}
.run-btn.ro{background:var(--blue)}
.run-btn:active{opacity:0.8}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}
.csv-btn{background:rgba(245,166,35,0.12);border:1px solid var(--accent);color:var(--accent);
  -webkit-text-fill-color:var(--accent);border-radius:9px;font-weight:700;font-size:13px;
  padding:0 16px;min-height:42px;cursor:pointer;letter-spacing:0.3px;transition:opacity 0.2s;white-space:nowrap}
.csv-btn:active{opacity:0.8}
.csv-btn:disabled{opacity:0.35;cursor:not-allowed}

/* KPI */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.kpi-label{font-size:9px;font-weight:700;color:var(--muted);-webkit-text-fill-color:var(--muted);letter-spacing:1.3px;margin-bottom:4px}
.kv{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--accent);-webkit-text-fill-color:var(--accent);line-height:1}
.kv.g{color:var(--green);-webkit-text-fill-color:var(--green)}
.kv.b{color:var(--blue);-webkit-text-fill-color:var(--blue)}
.kv.r{color:var(--red);-webkit-text-fill-color:var(--red)}
.ku{font-size:11px;font-family:'Noto Sans JP';font-weight:400;margin-left:2px}

/* CHIPS */
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;
  color:var(--muted);-webkit-text-fill-color:var(--muted);font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:700;padding:4px 12px;cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:4px}
.chip.ca{background:rgba(245,166,35,0.15);border-color:var(--accent);color:var(--accent);-webkit-text-fill-color:var(--accent)}
.chip.cs{background:rgba(52,152,219,0.15);border-color:var(--blue);  color:var(--blue);  -webkit-text-fill-color:var(--blue)}
.chip.ci{background:rgba(46,204,113,0.15);border-color:var(--green); color:var(--green); -webkit-text-fill-color:var(--green)}
.chip.cn{background:rgba(231,76,60,0.15); border-color:var(--red);   color:var(--red);   -webkit-text-fill-color:var(--red)}
.chip-cnt{font-size:9px;font-family:'Noto Sans JP',sans-serif;font-weight:400;opacity:.6}

/* TABLE */
.table-wrap{border-radius:10px;border:1px solid var(--border);overflow:hidden}
.scroll-inner{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 400px);min-height:200px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:620px}
thead th{background:var(--surface);color:var(--muted);-webkit-text-fill-color:var(--muted);
  padding:8px 10px;text-align:left;font-size:9px;letter-spacing:1px;
  border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:1}
tbody td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);
  -webkit-text-fill-color:var(--text);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody tr.rs td{background:rgba(52,152,219,0.04)}
tbody tr.ri td{background:rgba(46,204,113,0.04)}
tbody tr.rn td{background:rgba(231,76,60,0.04)}

.st{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:0.3px;white-space:nowrap}
.st.ss{background:rgba(52,152,219,0.18);color:var(--blue);  -webkit-text-fill-color:var(--blue);  border:1px solid rgba(52,152,219,0.4)}
.st.si{background:rgba(46,204,113,0.18);color:var(--green); -webkit-text-fill-color:var(--green); border:1px solid rgba(46,204,113,0.4)}
.st.sn{background:rgba(231,76,60,0.18); color:var(--red);   -webkit-text-fill-color:var(--red);   border:1px solid rgba(231,76,60,0.4)}
.dy{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700}
.dy.fast{color:var(--green);-webkit-text-fill-color:var(--green)}
.dy.mid {color:var(--accent);-webkit-text-fill-color:var(--accent)}
.dy.slow{color:var(--red);  -webkit-text-fill-color:var(--red)}
.dy.none{color:var(--muted);-webkit-text-fill-color:var(--muted)}

.empty{text-align:center;color:var(--muted);-webkit-text-fill-color:var(--muted);font-size:12px;padding:32px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--green);
  color:#fff;-webkit-text-fill-color:#fff;font-weight:700;font-size:13px;padding:10px 22px;
  border-radius:24px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:2000;white-space:nowrap}
.toast.err{background:var(--red)}
.toast.show{opacity:1}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;
  border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">🔍</span>
  <span class="header-title">RACK WMS</span>
  <span class="header-sub">入出庫トレース</span>
  <span class="header-status" id="status">Firebase: 接続中...</span>
</div>

<div class="main">

  <div class="mode-toggle">
    <button class="mode-btn a-in" id="mbtn-in"  onclick="setMode('in')">📦 入庫日 → 出庫日を追跡</button>
    <button class="mode-btn"      id="mbtn-out" onclick="setMode('out')">🚛 出庫日 → 入庫日を逆算</button>
  </div>

  <div class="mode-desc" id="mode-desc">
    <strong>入庫日トレース：</strong>指定した日に入庫された品番が、その後いつ出庫されたかを追跡します。
  </div>

  <div class="search-card">
    <div class="search-row">
      <div class="field">
        <div class="field-label" id="date-label">入庫日</div>
        <input type="date" id="trace-date" class="fi">
      </div>
      <div class="field">
        <div class="field-label">品番（任意）</div>
        <select class="sel fi" id="trace-product" style="min-width:150px">
          <option value="">すべての品番</option>
        </select>
      </div>
      <button class="run-btn ri" id="run-btn" onclick="runTrace()" disabled>🔍 追跡</button>
      <button class="csv-btn"    id="csv-btn" onclick="exportCSV()" disabled>📥 CSV</button>
    </div>
  </div>

  <div id="result-area">
    <div class="empty">日付を選択して追跡・逆算を押してください</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }      from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy, limit }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAOMRoojKv9Hnh3OjVGwYV_k1LBTGOKepY",
  authDomain:"miyamaunitec-fb87a.firebaseapp.com",
  projectId:"miyamaunitec-fb87a",
  storageBucket:"miyamaunitec-fb87a.firebasestorage.app",
  messagingSenderId:"495316649507",
  appId:"1:495316649507:web:1f98ee3dd851474fa39396"
});
const auth=getAuth(app), db=getFirestore(app);

let allHistory=[], traceResults=[], filterStatus='all', currentMode='in';

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function pad2(n){return String(n).padStart(2,'0')}
function fmtTime(ms){if(!ms)return'—';const d=new Date(ms);return`${d.getMonth()+1}/${d.getDate()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`}
function setStatus(t,c='var(--muted)'){const el=document.getElementById('status');el.textContent=`Firebase: ${t}`;el.style.color=c;el.style.webkitTextFillColor=c}
function showToast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast${err?' err':''} show`;setTimeout(()=>t.className='toast',2400)}

try{await signInAnonymously(auth);setStatus('接続済み','var(--green)')}
catch(e){setStatus('未接続','var(--red)')}

const today=new Date();
document.getElementById('trace-date').value=`${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;
document.getElementById('trace-date').addEventListener('change',()=>{document.getElementById('run-btn').disabled=false});

async function loadHistory(){
  setStatus('読み込み中...','var(--accent)');
  try{
    const snap=await getDocs(query(collection(db,'shelfHistory'),orderBy('atMs','desc'),limit(3000)));
    allHistory=snap.docs.map(d=>d.data());
    setStatus(`接続済み（${allHistory.length}件）`,'var(--green)');
    const products=[...new Set(allHistory.map(h=>h.productId).filter(Boolean))].sort();
    document.getElementById('trace-product').innerHTML='<option value="">すべての品番</option>'+products.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
    document.getElementById('run-btn').disabled=false;
  }catch(e){console.error(e);setStatus('読み込みエラー','var(--red)');showToast('データ読み込みエラー',true)}
}
await loadHistory();

/* ===== MODE SWITCH ===== */
function setMode(mode){
  currentMode=mode;
  document.getElementById('mbtn-in').className ='mode-btn'+(mode==='in'?' a-in':'');
  document.getElementById('mbtn-out').className='mode-btn'+(mode==='out'?' a-out':'');
  const isIn=mode==='in';
  document.getElementById('mode-desc').innerHTML=isIn
    ?'<strong>入庫日トレース：</strong>指定した日に入庫された品番が、その後いつ出庫されたかを追跡します。'
    :'<strong>出庫日逆算：</strong>指定した日に出庫された品番が、もともといつ入庫されたものかを逆算します。';
  document.getElementById('date-label').textContent=isIn?'入庫日':'出庫日';
  document.getElementById('trace-date').className=isIn?'fi':'fo';
  document.getElementById('trace-product').className=isIn?'sel fi':'sel fo';
  document.getElementById('run-btn').className=isIn?'run-btn ri':'run-btn ro';
  document.getElementById('run-btn').textContent=isIn?'🔍 追跡':'🔍 逆算';
  traceResults=[];filterStatus='all';
  document.getElementById('csv-btn').disabled=true;
  document.getElementById('result-area').innerHTML=`<div class="empty">日付を選択して${isIn?'追跡':'逆算'}を押してください</div>`;
}

/* ===== RUN ===== */
function runTrace(){
  const dateVal=document.getElementById('trace-date').value;
  const prodVal=document.getElementById('trace-product').value;
  if(!dateVal){showToast('日付を選択してください',true);return}
  const btn=document.getElementById('run-btn');
  btn.innerHTML='<span class="spinner"></span>処理中...';btn.disabled=true;
  setTimeout(()=>{
    try{currentMode==='in'?computeForward(dateVal,prodVal):computeReverse(dateVal,prodVal)}
    finally{btn.innerHTML=currentMode==='in'?'🔍 追跡':'🔍 逆算';btn.disabled=false}
  },30);
}

/* ===== FORWARD（入庫日 → 出庫日） ===== */
function computeForward(dateVal,prodVal){
  const fromMs=new Date(dateVal+'T00:00:00').getTime();
  const toMs  =new Date(dateVal+'T23:59:59').getTime();
  const inbounds=allHistory.filter(h=>
    h.type==='inbound'&&(h.atMs||0)>=fromMs&&(h.atMs||0)<=toMs&&(!prodVal||h.productId===prodVal));
  if(!inbounds.length){
    document.getElementById('result-area').innerHTML=`<div class="empty">📭 ${dateVal} に入庫レコードがありません</div>`;
    traceResults=[];document.getElementById('csv-btn').disabled=true;return;
  }
  const outbounds=allHistory.filter(h=>h.type==='outbound'||h.type==='move-to-fixed');
  traceResults=inbounds.map(ib=>{
    const ob=outbounds
      .filter(ob=>{
        if(ob.productId!==ib.productId||(ob.atMs||0)<=(ib.atMs||0))return false;
        return ob.type==='move-to-fixed'?ob.fromShelf===ib.shelfId:true;
      })
      .sort((a,b)=>(a.atMs||0)-(b.atMs||0))[0]||null;
    return{productId:ib.productId||'—',shelfA:ib.shelfId||'—',timeA:ib.atMs||0,
      shelfB:ob?.shelfId||null,fromShelf:ob?.fromShelf||null,timeB:ob?.atMs||null,
      stockDays:ob?parseFloat(((ob.atMs-ib.atMs)/86400000).toFixed(1)):null,
      status:ob?'shipped':'instock'};
  }).sort((a,b)=>a.timeA-b.timeA);
  filterStatus='all';document.getElementById('csv-btn').disabled=false;renderResult('in');
}

/* ===== REVERSE（出庫日 → 入庫日逆算） ===== */
function computeReverse(dateVal,prodVal){
  const fromMs=new Date(dateVal+'T00:00:00').getTime();
  const toMs  =new Date(dateVal+'T23:59:59').getTime();
  const outbounds=allHistory.filter(h=>
    (h.type==='outbound'||h.type==='move-to-fixed')&&(h.atMs||0)>=fromMs&&(h.atMs||0)<=toMs&&(!prodVal||h.productId===prodVal));
  if(!outbounds.length){
    document.getElementById('result-area').innerHTML=`<div class="empty">📭 ${document.getElementById('trace-date').value} に出庫レコードがありません</div>`;
    traceResults=[];document.getElementById('csv-btn').disabled=true;return;
  }
  const inbounds=allHistory.filter(h=>h.type==='inbound');
  traceResults=outbounds.map(ob=>{
    const ib=inbounds
      .filter(ib=>{
        if(ib.productId!==ob.productId||(ib.atMs||0)>=(ob.atMs||0))return false;
        return ob.type==='move-to-fixed'?ib.shelfId===ob.fromShelf:true;
      })
      .sort((a,b)=>(b.atMs||0)-(a.atMs||0))[0]||null; // 入庫より前で最も直近の入庫
    return{productId:ob.productId||'—',shelfA:ib?.shelfId||null,timeA:ib?.atMs||null,
      shelfB:ob.shelfId||'—',fromShelf:ob.fromShelf||null,timeB:ob.atMs||0,
      stockDays:ib?parseFloat(((ob.atMs-ib.atMs)/86400000).toFixed(1)):null,
      status:ib?'shipped':'noin'};
  }).sort((a,b)=>a.timeB-b.timeB);
  filterStatus='all';document.getElementById('csv-btn').disabled=false;renderResult('out');
}

/* ===== RENDER ===== */
function renderResult(mode){
  const area=document.getElementById('result-area');
  const shippedCnt=traceResults.filter(r=>r.status==='shipped').length;
  const noInCnt   =traceResults.filter(r=>r.status==='noin').length;
  const instockCnt=traceResults.filter(r=>r.status==='instock').length;
  const daysArr=traceResults.filter(r=>r.stockDays!==null).map(r=>r.stockDays);
  const avg=daysArr.length?(daysArr.reduce((s,v)=>s+v,0)/daysArr.length).toFixed(1):'—';
  const max=daysArr.length?Math.max(...daysArr).toFixed(1):'—';

  const kpi=`<div class="kpi-strip">
    <div class="kpi-card"><div class="kpi-label">${mode==='in'?'入庫':'出庫'}件数</div><div class="kv">${traceResults.length}</div></div>
    ${mode==='in'
      ?`<div class="kpi-card"><div class="kpi-label">出庫済</div><div class="kv b">${shippedCnt}</div></div>
        <div class="kpi-card"><div class="kpi-label">在庫中</div><div class="kv g">${instockCnt}</div></div>`
      :`<div class="kpi-card"><div class="kpi-label">入庫元 特定</div><div class="kv g">${shippedCnt}</div></div>
        <div class="kpi-card"><div class="kpi-label">入庫元 不明</div><div class="kv r">${noInCnt}</div></div>`}
    <div class="kpi-card"><div class="kpi-label">平均在庫日数</div><div class="kv">${avg}<span class="ku">日</span></div></div>
    <div class="kpi-card"><div class="kpi-label">最長在庫日数</div><div class="kv r">${max}<span class="ku">日</span></div></div>
  </div>`;

  const chips=`<div class="chip-row">
    <button class="chip ca" id="ch-all" onclick="window._setFilter('all')">すべて<span class="chip-cnt">${traceResults.length}</span></button>
    ${mode==='in'
      ?`<button class="chip cs" id="ch-s" onclick="window._setFilter('shipped')">🚛 出庫済<span class="chip-cnt">${shippedCnt}</span></button>
        <button class="chip ci" id="ch-i" onclick="window._setFilter('instock')">📦 在庫中<span class="chip-cnt">${instockCnt}</span></button>`
      :`<button class="chip ci" id="ch-s" onclick="window._setFilter('shipped')">✅ 入庫元特定<span class="chip-cnt">${shippedCnt}</span></button>
        <button class="chip cn" id="ch-n" onclick="window._setFilter('noin')">⚠️ 入庫元不明<span class="chip-cnt">${noInCnt}</span></button>`}
  </div>`;

  area.innerHTML=kpi+chips+'<div id="tbl"></div>';
  renderTable(mode);
}

function renderTable(mode){
  mode=mode||currentMode;
  const display=filterStatus==='all'?traceResults:traceResults.filter(r=>r.status===filterStatus);
  const tbl=document.getElementById('tbl');
  if(!display.length){tbl.innerHTML='<div class="empty">該当データがありません</div>';return}

  const muted='<span style="color:var(--muted);-webkit-text-fill-color:var(--muted)">';
  const shelfCell=(from,to)=>{
    if(!to)return muted+'—</span>';
    return from?`${muted}${esc(from)}</span><span style="margin:0 4px;color:var(--muted)">→</span>${esc(to)}`:esc(to);
  };
  const daysCell=r=>{
    if(r.stockDays===null){
      if(r.status==='instock'){const el=((Date.now()-(r.timeA||0))/86400000).toFixed(0);return`<span class="dy none">在庫中<span style="font-size:10px;font-family:'Noto Sans JP';margin-left:3px">(${el}日経過)</span></span>`}
      return'<span class="dy none">不明</span>'
    }
    const dc=r.stockDays<=3?'fast':r.stockDays<=7?'mid':'slow';
    return`<span class="dy ${dc}">${r.stockDays}日</span>`;
  };
  const stCell=r=>r.status==='shipped'?'<span class="st ss">出庫済</span>':r.status==='instock'?'<span class="st si">在庫中</span>':'<span class="st sn">入庫元不明</span>';
  const rowCls=r=>r.status==='shipped'?'rs':r.status==='instock'?'ri':'rn';

  const th=(mode==='in')
    ?'<tr><th>品番</th><th>入庫棚</th><th>入庫日時</th><th>出庫日時</th><th>出庫棚（補充元→定番地）</th><th>在庫日数</th><th>ステータス</th></tr>'
    :'<tr><th>品番</th><th>入庫日時</th><th>入庫棚</th><th>出庫日時</th><th>出庫棚（補充元→定番地）</th><th>在庫日数</th><th>ステータス</th></tr>';

  const tbody=display.map(r=>{
    const nameCell=`<strong style="font-family:'Rajdhani',sans-serif;font-size:14px">${esc(r.productId)}</strong>`;
    const inShelf=r.shelfA?`<span style="font-family:'Rajdhani',sans-serif;font-weight:700">${esc(r.shelfA)}</span>`:muted+'—</span>';
    const inTime=r.timeA?`<span style="white-space:nowrap;font-size:11px">${fmtTime(r.timeA)}</span>`:muted+'不明</span>';
    const outTime=r.timeB?`<span style="white-space:nowrap;font-size:11px">${fmtTime(r.timeB)}</span>`:muted+'—</span>';
    const outSh=shelfCell(r.fromShelf,r.shelfB);
    if(mode==='in') return`<tr class="${rowCls(r)}"><td>${nameCell}</td><td>${inShelf}</td><td>${inTime}</td><td>${outTime}</td><td style="font-size:12px">${outSh}</td><td>${daysCell(r)}</td><td>${stCell(r)}</td></tr>`;
    return`<tr class="${rowCls(r)}"><td>${nameCell}</td><td>${inTime}</td><td>${inShelf}</td><td>${outTime}</td><td style="font-size:12px">${outSh}</td><td>${daysCell(r)}</td><td>${stCell(r)}</td></tr>`;
  }).join('');

  tbl.innerHTML=`<div class="table-wrap"><div class="scroll-inner"><table><thead>${th}</thead><tbody>${tbody}</tbody></table></div></div>`;
}

/* ===== CSV ===== */
function exportCSV(){
  if(!traceResults.length){showToast('先に追跡を実行してください',true);return}
  const dateVal=document.getElementById('trace-date').value;
  const mode=currentMode;
  const display=filterStatus==='all'?traceResults:traceResults.filter(r=>r.status===filterStatus);
  const hdr=mode==='in'
    ?['品番','入庫棚','入庫日時','出庫日時','出庫棚','在庫日数','ステータス']
    :['品番','入庫日時','入庫棚','出庫日時','出庫棚','在庫日数','ステータス'];
  const rows=[hdr];
  const stL=r=>r.status==='shipped'?'出庫済':r.status==='instock'?'在庫中':'入庫元不明';
  const outSh=r=>r.shelfB?(r.fromShelf?`${r.fromShelf}→${r.shelfB}`:r.shelfB):'';
  for(const r of display){
    if(mode==='in') rows.push([r.productId,r.shelfA,fmtTime(r.timeA),r.timeB?fmtTime(r.timeB):'',outSh(r),r.stockDays??'',stL(r)]);
    else            rows.push([r.productId,r.timeA?fmtTime(r.timeA):'',r.shelfA||'',fmtTime(r.timeB),outSh(r),r.stockDays??'',stL(r)]);
  }
  const label={all:'',shipped:mode==='in'?'_出庫済':'_入庫元特定',instock:'_在庫中',noin:'_入庫元不明'}[filterStatus]||'';
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`${mode==='in'?'入庫日トレース':'出庫日逆算'}_${dateVal}${label}.csv`;
  a.click();
  showToast('📥 CSVを出力しました');
}

/* ===== EXPOSE ===== */
window.setMode=setMode;
window.runTrace=runTrace;
window.exportCSV=exportCSV;
window._setFilter=function(status){
  filterStatus=status;
  ['all','s','i','n'].forEach(k=>{
    const el=document.getElementById(`ch-${k==='all'?'all':k}`);
    if(!el)return;
    const base={'all':'ca','s':currentMode==='in'?'cs':'ci','i':'ci','n':'cn'}[k]||'ca';
    const isActive=
      (k==='all'&&status==='all')||(k==='s'&&status==='shipped')||(k==='i'&&status==='instock')||(k==='n'&&status==='noin');
    el.className=`chip ${base}${isActive?' ca':''}`.replace('ca ca','ca');
    if(isActive)el.className=`chip ${base}`;
  });
  renderTable(currentMode);
};
</script>
