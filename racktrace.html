
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>RACK WMS — 入庫日トレース</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg:      #0f1117;
  --surface: #181c25;
  --card:    #1e2330;
  --border:  #2a3040;
  --accent:  #f5a623;
  --green:   #2ecc71;
  --red:     #e74c3c;
  --blue:    #3498db;
  --text:    #e8ecf0;
  --muted:   #6b7a8d;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);min-height:100vh;min-height:100dvh}
body{color:var(--text);font-family:'Noto Sans JP',sans-serif;-webkit-text-fill-color:var(--text)}
button,input,select{font-family:'Noto Sans JP',sans-serif;font-size:inherit}

/* HEADER */
.header{
  background:var(--surface);border-bottom:2px solid var(--accent);
  padding:10px 18px;display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:100;
}
.header-icon{font-size:20px}
.header-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);-webkit-text-fill-color:var(--accent);letter-spacing:2px}
.header-sub{font-size:11px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-left:6px}
.header-status{margin-left:auto;font-size:11px;color:var(--muted);-webkit-text-fill-color:var(--muted)}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:18px 14px 60px}

/* SEARCH CARD */
.search-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;margin-bottom:18px;
}
.search-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:9px;font-weight:700;color:var(--muted);-webkit-text-fill-color:var(--muted);letter-spacing:1.2px}
input[type=date],select.sel{
  background:var(--surface);border:2px solid var(--border);border-radius:8px;
  color:var(--text);-webkit-text-fill-color:var(--text);
  font-size:14px;font-weight:700;padding:8px 12px;min-height:42px;outline:none;
  transition:border-color 0.2s;-webkit-appearance:none;appearance:none;cursor:pointer;
}
input[type=date]:focus,select.sel:focus{border-color:var(--accent)}
.run-btn{
  background:var(--accent);color:var(--bg);-webkit-text-fill-color:var(--bg);
  border:none;border-radius:9px;font-weight:700;font-size:14px;
  padding:0 22px;min-height:42px;cursor:pointer;letter-spacing:0.5px;
  transition:opacity 0.2s;white-space:nowrap;
}
.run-btn:active{opacity:0.8}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}
.csv-btn{
  background:rgba(46,204,113,0.12);border:1px solid var(--green);
  color:var(--green);-webkit-text-fill-color:var(--green);
  border-radius:9px;font-weight:700;font-size:13px;
  padding:0 16px;min-height:42px;cursor:pointer;letter-spacing:0.3px;
  transition:opacity 0.2s;white-space:nowrap;
}
.csv-btn:active{opacity:0.8}
.csv-btn:disabled{opacity:0.35;cursor:not-allowed}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.kpi-label{font-size:9px;font-weight:700;color:var(--muted);-webkit-text-fill-color:var(--muted);letter-spacing:1.3px;margin-bottom:4px}
.kpi-value{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--accent);-webkit-text-fill-color:var(--accent);line-height:1}
.kpi-value.g{color:var(--green);-webkit-text-fill-color:var(--green)}
.kpi-value.b{color:var(--blue);-webkit-text-fill-color:var(--blue)}
.kpi-unit{font-size:11px;font-family:'Noto Sans JP';font-weight:400;margin-left:2px}

/* FILTER CHIPS */
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.chip{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  color:var(--muted);-webkit-text-fill-color:var(--muted);
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  padding:4px 12px;cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:4px;
}
.chip.active{
  background:rgba(245,166,35,0.15);border-color:var(--accent);
  color:var(--accent);-webkit-text-fill-color:var(--accent);
}
.chip.shipped{
  background:rgba(52,152,219,0.15);border-color:var(--blue);
  color:var(--blue);-webkit-text-fill-color:var(--blue);
}
.chip.instock{
  background:rgba(46,204,113,0.15);border-color:var(--green);
  color:var(--green);-webkit-text-fill-color:var(--green);
}
.chip-cnt{font-size:9px;font-family:'Noto Sans JP',sans-serif;font-weight:400;opacity:.6}

/* TABLE */
.table-wrap{border-radius:10px;border:1px solid var(--border);overflow:hidden}
.scroll-inner{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 380px)}
@media(max-width:640px){.scroll-inner{max-height:none}}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:580px}
thead th{
  background:var(--surface);color:var(--muted);-webkit-text-fill-color:var(--muted);
  padding:8px 10px;text-align:left;font-size:9px;letter-spacing:1px;
  border-bottom:2px solid var(--border);white-space:nowrap;
  position:sticky;top:0;z-index:1;
}
tbody td{
  padding:9px 10px;border-bottom:1px solid var(--border);
  color:var(--text);-webkit-text-fill-color:var(--text);vertical-align:middle;
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody tr.shipped-row td{background:rgba(52,152,219,0.04)}
tbody tr.instock-row td{background:rgba(46,204,113,0.04)}

/* STATUS / DAYS */
.st-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:0.3px;white-space:nowrap}
.st-badge.shipped{background:rgba(52,152,219,0.18);color:var(--blue);-webkit-text-fill-color:var(--blue);border:1px solid rgba(52,152,219,0.4)}
.st-badge.instock{background:rgba(46,204,113,0.18);color:var(--green);-webkit-text-fill-color:var(--green);border:1px solid rgba(46,204,113,0.4)}
.days{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700}
.days.fast{color:var(--green);-webkit-text-fill-color:var(--green)}
.days.mid {color:var(--accent);-webkit-text-fill-color:var(--accent)}
.days.slow{color:var(--red);-webkit-text-fill-color:var(--red)}
.days.none{color:var(--muted);-webkit-text-fill-color:var(--muted)}

/* LOADING / EMPTY */
.empty{text-align:center;color:var(--muted);-webkit-text-fill-color:var(--muted);font-size:12px;padding:32px}
.loading{display:flex;flex-direction:column;gap:8px;padding:20px}
.loading-bar{height:13px;border-radius:4px;background:linear-gradient(90deg,var(--border) 25%,rgba(255,255,255,0.04) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* TOAST */
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;-webkit-text-fill-color:#fff;
  font-weight:700;font-size:13px;padding:10px 22px;border-radius:24px;
  opacity:0;pointer-events:none;transition:all 0.3s;z-index:2000;white-space:nowrap;
}
.toast.err{background:var(--red)}
.toast.show{opacity:1}

/* SPINNER */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">🔍</span>
  <span class="header-title">RACK WMS</span>
  <span class="header-sub">入庫日トレース</span>
  <span class="header-status" id="status">Firebase: 接続中...</span>
</div>

<div class="main">

  <!-- 検索フォーム -->
  <div class="search-card">
    <div class="search-row">
      <div class="field">
        <div class="field-label">入庫日</div>
        <input type="date" id="trace-date">
      </div>
      <div class="field">
        <div class="field-label">品番（任意）</div>
        <select class="sel" id="trace-product" style="min-width:150px">
          <option value="">すべての品番</option>
        </select>
      </div>
      <button class="run-btn" id="run-btn" onclick="runTrace()" disabled>🔍 追跡</button>
      <button class="csv-btn" id="csv-btn" onclick="exportCSV()" disabled>📥 CSV</button>
    </div>
  </div>

  <!-- 結果エリア -->
  <div id="result-area">
    <div class="empty">入庫日を選択して「追跡」を押してください</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy, limit }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

/* ===== Firebase ===== */
const app = initializeApp({
  apiKey:            "AIzaSyAOMRoojKv9Hnh3OjVGwYV_k1LBTGOKepY",
  authDomain:        "miyamaunitec-fb87a.firebaseapp.com",
  projectId:         "miyamaunitec-fb87a",
  storageBucket:     "miyamaunitec-fb87a.firebasestorage.app",
  messagingSenderId: "495316649507",
  appId:             "1:495316649507:web:1f98ee3dd851474fa39396"
});
const auth = getAuth(app);
const db   = getFirestore(app);

/* ===== STATE ===== */
let allHistory   = [];
let traceResults = [];
let filterStatus = 'all'; // 'all' | 'shipped' | 'instock'

/* ===== UTILS ===== */
function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escJs(s){ return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtTime(ms){
  if(!ms) return '—';
  const d=new Date(ms);
  return `${d.getMonth()+1}/${d.getDate()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function fmtDate(ms){
  if(!ms) return '—';
  const d=new Date(ms);
  return `${d.getFullYear()}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())}`;
}
function setStatus(t,c='var(--muted)'){
  const el=document.getElementById('status');
  el.textContent=`Firebase: ${t}`;
  el.style.color=c; el.style.webkitTextFillColor=c;
}
function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast${err?' err':''} show`;
  setTimeout(()=>t.className='toast',2200);
}

/* ===== INIT ===== */
try {
  await signInAnonymously(auth);
  setStatus('接続済み','var(--green)');
} catch(e) {
  setStatus('未接続','var(--red)');
}

// 今日をデフォルト
const today = new Date();
document.getElementById('trace-date').value =
  `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;
document.getElementById('trace-date').addEventListener('change', () => {
  document.getElementById('run-btn').disabled = false;
});

await loadHistory();

/* ===== LOAD ===== */
async function loadHistory(){
  setStatus('読み込み中...','var(--accent)');
  try {
    const q    = query(collection(db,'shelfHistory'), orderBy('atMs','desc'), limit(3000));
    const snap = await getDocs(q);
    allHistory = snap.docs.map(d=>d.data());
    setStatus(`接続済み（${allHistory.length}件）`,'var(--green)');
    buildProductSelect();
    document.getElementById('run-btn').disabled = false;
  } catch(e) {
    console.error(e);
    setStatus('読み込みエラー','var(--red)');
    showToast('データ読み込みエラー',true);
  }
}

function buildProductSelect(){
  const products = [...new Set(allHistory.map(h=>h.productId).filter(Boolean))].sort();
  document.getElementById('trace-product').innerHTML =
    '<option value="">すべての品番</option>' +
    products.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
}

/* ===== RUN TRACE ===== */
function runTrace(){
  const dateVal = document.getElementById('trace-date').value;
  const prodVal = document.getElementById('trace-product').value;
  if(!dateVal){ showToast('入庫日を選択してください',true); return; }

  const fromMs = new Date(dateVal+'T00:00:00').getTime();
  const toMs   = new Date(dateVal+'T23:59:59').getTime();

  // 入庫ボタンをローディング状態に
  const btn = document.getElementById('run-btn');
  btn.innerHTML = '<span class="spinner"></span>追跡中...';
  btn.disabled = true;

  setTimeout(()=>{
    try { computeTrace(fromMs, toMs, dateVal, prodVal); }
    finally { btn.innerHTML='🔍 追跡'; btn.disabled=false; }
  }, 30);
}

function computeTrace(fromMs, toMs, dateVal, prodVal){
  const area = document.getElementById('result-area');

  // ① 指定日の入庫レコード
  const inbounds = allHistory.filter(h=>
    h.type === 'inbound' &&
    (h.atMs||0) >= fromMs && (h.atMs||0) <= toMs &&
    (!prodVal || h.productId === prodVal)
  );

  if(!inbounds.length){
    area.innerHTML = `<div class="empty">📭 ${dateVal} に入庫レコードがありません</div>`;
    traceResults = [];
    document.getElementById('csv-btn').disabled = true;
    return;
  }

  // ② 出庫レコード（outbound / move-to-fixed）
  const outbounds = allHistory.filter(h=>
    h.type==='outbound' || h.type==='move-to-fixed'
  );

  traceResults = inbounds.map(ib=>{
    const matched = outbounds
      .filter(ob=>{
        if(ob.productId !== ib.productId) return false;
        if((ob.atMs||0) <= (ib.atMs||0))  return false;
        // move-to-fixed: fromShelf が入庫棚と一致するか
        if(ob.type === 'move-to-fixed') return ob.fromShelf === ib.shelfId;
        // outbound: 品番×時刻でマッチ（棚番は定番地なので一致しない）
        return ob.type === 'outbound';
      })
      .sort((a,b)=>(a.atMs||0)-(b.atMs||0));

    const ob = matched[0] || null;
    return {
      productId: ib.productId || '—',
      inShelf:   ib.shelfId   || '—',
      inAtMs:    ib.atMs      || 0,
      outAtMs:   ob?.atMs     || null,
      outShelf:  ob?.shelfId  || null,
      fromShelf: ob?.fromShelf|| null,
      stockDays: ob ? parseFloat(((ob.atMs-ib.atMs)/86400000).toFixed(1)) : null,
      status:    ob ? 'shipped' : 'instock',
    };
  }).sort((a,b)=>a.inAtMs-b.inAtMs);

  filterStatus = 'all';
  document.getElementById('csv-btn').disabled = false;
  renderResult(dateVal);
}

/* ===== RENDER ===== */
function renderResult(dateVal){
  const area = document.getElementById('result-area');

  const shippedCnt = traceResults.filter(r=>r.status==='shipped').length;
  const instockCnt = traceResults.length - shippedCnt;
  const daysArr    = traceResults.filter(r=>r.stockDays!==null).map(r=>r.stockDays);
  const avgDays    = daysArr.length ? (daysArr.reduce((s,v)=>s+v,0)/daysArr.length).toFixed(1) : '—';
  const maxDays    = daysArr.length ? Math.max(...daysArr).toFixed(1) : '—';

  // KPIカード
  const kpi = `<div class="kpi-strip">
    <div class="kpi-card">
      <div class="kpi-label">入庫件数</div>
      <div class="kpi-value">${traceResults.length}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">出庫済</div>
      <div class="kpi-value b">${shippedCnt}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">在庫中</div>
      <div class="kpi-value g">${instockCnt}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">平均在庫日数</div>
      <div class="kpi-value">${avgDays}<span class="kpi-unit">日</span></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">最長在庫日数</div>
      <div class="kpi-value" style="color:var(--red);-webkit-text-fill-color:var(--red)">${maxDays}<span class="kpi-unit">日</span></div>
    </div>
  </div>`;

  // ステータス絞り込みチップ
  const chips = `<div class="chip-row">
    <button class="chip ${filterStatus==='all'?'active':''}" onclick="window._setFilter('all')">
      すべて<span class="chip-cnt">${traceResults.length}</span>
    </button>
    <button class="chip ${filterStatus==='shipped'?'active shipped':''}" onclick="window._setFilter('shipped')">
      🚛 出庫済<span class="chip-cnt">${shippedCnt}</span>
    </button>
    <button class="chip ${filterStatus==='instock'?'active instock':''}" onclick="window._setFilter('instock')">
      📦 在庫中<span class="chip-cnt">${instockCnt}</span>
    </button>
  </div>`;

  area.innerHTML = kpi + chips + '<div id="table-container"></div>';
  renderTable();
}

function renderTable(){
  const display = filterStatus === 'all'
    ? traceResults
    : traceResults.filter(r=>r.status===filterStatus);

  const container = document.getElementById('table-container');
  if(!display.length){
    container.innerHTML = '<div class="empty">該当データがありません</div>'; return;
  }

  const rows = display.map(r=>{
    const dv  = r.stockDays;
    const dc  = dv===null ? 'none' : dv<=3 ? 'fast' : dv<=7 ? 'mid' : 'slow';
    const dd  = dv===null
      ? `在庫中<span style="font-size:10px;font-family:'Noto Sans JP';margin-left:3px;color:var(--muted);-webkit-text-fill-color:var(--muted)">(${((Date.now()-(r.inAtMs||0))/86400000).toFixed(0)}日経過)</span>`
      : `${dv}日`;
    const outShelfCell = r.outShelf
      ? (r.fromShelf
          ? `<span style="color:var(--muted);-webkit-text-fill-color:var(--muted)">${esc(r.fromShelf)}</span><span style="margin:0 4px;color:var(--muted)">→</span>${esc(r.outShelf)}`
          : esc(r.outShelf))
      : '<span style="color:var(--muted);-webkit-text-fill-color:var(--muted)">—</span>';
    const rowCls = r.status==='shipped' ? 'shipped-row' : 'instock-row';
    return `<tr class="${rowCls}">
      <td><strong style="font-family:'Rajdhani',sans-serif;font-size:14px">${esc(r.productId)}</strong></td>
      <td style="font-family:'Rajdhani',sans-serif;font-weight:700">${esc(r.inShelf)}</td>
      <td style="white-space:nowrap;font-size:11px">${fmtTime(r.inAtMs)}</td>
      <td style="white-space:nowrap;font-size:11px">${r.outAtMs ? fmtTime(r.outAtMs) : '<span style="color:var(--muted);-webkit-text-fill-color:var(--muted)">—</span>'}</td>
      <td style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px">${outShelfCell}</td>
      <td><span class="days ${dc}">${dd}</span></td>
      <td>${r.status==='shipped'
        ? '<span class="st-badge shipped">出庫済</span>'
        : '<span class="st-badge instock">在庫中</span>'}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `<div class="table-wrap">
    <div class="scroll-inner">
      <table>
        <thead>
          <tr>
            <th>品番</th>
            <th>入庫棚</th>
            <th>入庫日時</th>
            <th>出庫日時</th>
            <th>出庫棚（補充元 → 定番地）</th>
            <th>在庫日数</th>
            <th>ステータス</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

/* ===== CSV ===== */
function exportCSV(){
  if(!traceResults.length){ showToast('先に追跡を実行してください',true); return; }
  const dateVal = document.getElementById('trace-date').value;
  const display = filterStatus==='all' ? traceResults : traceResults.filter(r=>r.status===filterStatus);
  const rows = [['品番','入庫棚','入庫日時','出庫日時','出庫棚','在庫日数','ステータス']];
  for(const r of display){
    rows.push([
      r.productId,
      r.inShelf,
      fmtTime(r.inAtMs),
      r.outAtMs ? fmtTime(r.outAtMs) : '',
      r.outShelf ? (r.fromShelf ? `${r.fromShelf}→${r.outShelf}` : r.outShelf) : '',
      r.stockDays !== null ? r.stockDays : '',
      r.status==='shipped' ? '出庫済' : '在庫中',
    ]);
  }
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`入庫日トレース_${dateVal}${filterStatus!=='all'?'_'+(filterStatus==='shipped'?'出庫済':'在庫中'):''}.csv`;
  a.click();
  showToast('📥 CSVを出力しました');
}

/* ===== EXPOSE ===== */
window.runTrace    = runTrace;
window.exportCSV   = exportCSV;
window._setFilter  = function(status){
  filterStatus = status;
  // チップ再描画
  document.querySelectorAll('.chip').forEach(c=>{
    const s = c.getAttribute('onclick').match(/'(\w+)'/)?.[1];
    c.className = `chip${s===status ? (s==='all' ? ' active' : ` active ${s}`) : ''}`;
  });
  renderTable();
};
</script>
</body>
