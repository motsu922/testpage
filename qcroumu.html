<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<title>工数管理ダッシュボード</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:       #f0f4f8;
  --surface:  #ffffff;
  --card:     #ffffff;
  --card2:    #f5f7fa;
  --border:   rgba(15,30,60,.10);
  --border2:  rgba(15,30,60,.18);
  --win:      #00875a;
  --win-dim:  rgba(0,135,90,.10);
  --win-glow: rgba(0,135,90,.25);
  --loss:     #c9252d;
  --loss-dim: rgba(201,37,45,.10);
  --loss-glow:rgba(201,37,45,.25);
  --draw:     #b86800;
  --draw-dim: rgba(184,104,0,.10);
  --waste:    #d44800;
  --accent:   #0052cc;
  --accent2:  #0079bf;
  --text:     #172b4d;
  --muted:    #5e6c84;
  --muted2:   #42526e;
  --target:   #b86800;
  --font-num: 'Rajdhani', 'Noto Sans JP', sans-serif;
  --font-jp:  'Noto Sans JP', sans-serif;
}

body{
  font-family:var(--font-jp);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* =========== SCROLLBAR =========== */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#e4e9f0;}
::-webkit-scrollbar-thumb{background:rgba(15,30,60,.20);border-radius:3px;}

/* =========== HEADER =========== */
header{
  background: linear-gradient(135deg, #0747a6 0%, #0052cc 60%, #1a6ed8 100%);
  border-bottom:1px solid rgba(0,82,204,.30);
  padding:0 28px;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  position:sticky;top:0;z-index:100;
  box-shadow: 0 2px 12px rgba(0,52,130,.18);
}
header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 50%, rgba(255,255,255,.08) 0%, transparent 60%);
  pointer-events:none;
}
.hdr-brand{display:flex;align-items:center;gap:14px;}
.hdr-badge{
  font-family:var(--font-num);font-size:22px;font-weight:700;
  letter-spacing:3px;color:#fff;
  text-shadow: 0 1px 3px rgba(0,0,0,.3);
}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.75);letter-spacing:1px;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:12px;}

/* =========== FILTER STRIP =========== */
.filter-strip{
  display:flex;flex-wrap:wrap;align-items:center;gap:10px;
  padding:10px 28px;
  background:#ffffff;
  border-bottom:1px solid var(--border);
  font-size:12px;
}
.fl{font-weight:900;color:var(--muted);letter-spacing:.5px;}
.month-picker-wrap{display:flex;align-items:center;gap:6px;}
.mon-sel{
  background:#f4f5f7;color:var(--text);
  border:1px solid var(--border2);border-radius:8px;
  padding:7px 10px;font-family:var(--font-jp);font-size:12px;font-weight:700;
  outline:none;cursor:pointer;transition:border-color .15s;
}
.mon-sel:focus{border-color:var(--accent);}


.btn{
  padding:7px 16px;border-radius:8px;
  font-family:var(--font-jp);font-size:12px;font-weight:900;
  cursor:pointer;transition:all .15s;border:1px solid var(--border2);
  background:#ffffff;color:var(--text);
}
.btn:hover{background:#e8ecf0;border-color:var(--accent);}
.btn.primary{
  background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 2px 12px rgba(41,121,255,.35);
}
.btn.primary:hover{background:#1565c0;box-shadow:0 4px 20px rgba(41,121,255,.5);}

.sync-pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 14px;border-radius:999px;font-size:11px;font-weight:700;
}
.sync-pill.ok {background:rgba(0,135,90,.12);border:1px solid rgba(0,135,90,.35);color:#ffffff;}
.sync-pill.err{background:rgba(201,37,45,.20);border:1px solid rgba(201,37,45,.40);color:#ffffff;}
.sync-dot{width:7px;height:7px;border-radius:50%;}
.sync-dot.ok {background:#36b37e;}
.sync-dot.err{background:#ff5630;}

/* =========== MAIN =========== */
main{
  padding:12px 18px 16px;
  display:flex;flex-direction:column;gap:12px;
  max-width:1700px;width:100%;margin:0 auto;
}

/* =========== CARDS =========== */
.card{
  background:#ffffff;
  border:1px solid rgba(15,30,60,.10);
  border-radius:14px;
  padding:18px 20px;
  position:relative;
  box-shadow:0 1px 4px rgba(15,30,60,.08), 0 4px 16px rgba(15,30,60,.05);
}

.card-title{
  font-family:var(--font-num);
  font-size:13px;font-weight:700;letter-spacing:1.2px;
  color:var(--muted);text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
}
.card-title::before{
  content:'';width:3px;height:16px;
  border-radius:2px;background:var(--accent);
  flex-shrink:0;
}
.card-title.win-title::before{background:var(--win);}
.card-title.loss-title::before{background:var(--loss);}
.card-title.target-title::before{background:var(--target);}

/* =========== HERO SCOREBOARD =========== */
.scoreboard{
  display:grid;
  grid-template-columns:auto 1fr auto auto auto auto;
  align-items:center;gap:0;
  padding:0;
  background:linear-gradient(135deg, #0c1830 0%, #0e1a2e 100%);
  border:1px solid rgba(41,121,255,.20);
  border-radius:18px;
  overflow:hidden;
  min-height:130px;
}

.sb-team{
  padding:20px 28px;
  display:flex;flex-direction:column;gap:4px;
  border-right:1px solid var(--border);
}
.sb-team-label{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.sb-team-name{font-family:var(--font-num);font-size:28px;font-weight:700;letter-spacing:2px;color:#fff;}

.sb-score-area{
  display:flex;align-items:center;justify-content:center;
  gap:0;padding:0 20px;
}
.sb-score-block{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:16px 24px;
}
.sb-score-num{
  font-family:var(--font-num);font-size:56px;font-weight:700;
  line-height:1;letter-spacing:-1px;
}
.sb-score-num.win-num{color:var(--win);text-shadow:0 0 24px var(--win-glow);}
.sb-score-num.draw-num{color:var(--draw);text-shadow:0 0 18px rgba(255,171,0,.4);}
.sb-score-num.loss-num{color:var(--loss);text-shadow:0 0 24px var(--loss-glow);}
.sb-score-label{font-size:12px;font-weight:900;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;}
.sb-dash{
  font-family:var(--font-num);font-size:40px;color:var(--muted);
  padding:0 4px;line-height:1;
}

.sb-vs{
  padding:0 20px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
}
.sb-vs-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:900;}
.sb-vs-text{font-family:var(--font-num);font-size:22px;font-weight:700;color:var(--muted2);letter-spacing:2px;}

.sb-winrate{
  padding:20px 28px;
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.sb-winrate-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:900;}
.sb-winrate-num{font-family:var(--font-num);font-size:48px;font-weight:700;letter-spacing:-1px;color:var(--win);text-shadow:0 0 20px var(--win-glow);}
.sb-winrate-unit{font-size:14px;color:var(--muted2);font-weight:700;margin-top:-4px;}

.sb-kpis{
  padding:16px 20px;
  display:flex;flex-direction:column;gap:8px;
  border-left:1px solid var(--border);
}
.sb-kpi{display:flex;align-items:center;gap:10px;}
.sb-kpi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-kpi-label{font-size:11px;color:var(--muted2);font-weight:700;white-space:nowrap;}
.sb-kpi-val{font-family:var(--font-num);font-size:18px;font-weight:700;color:var(--text);margin-left:auto;}

/* WIN/LOSE/DRAW definition label */
.rule-strip{
  display:flex;flex-wrap:wrap;align-items:center;gap:8px;
  font-size:11px;color:var(--muted);
  padding:8px 4px 0;
}
.rule-badge{
  padding:3px 10px;border-radius:999px;font-weight:900;font-size:10px;letter-spacing:.5px;
}
.rule-win {background:rgba(0,135,90,.10);color:var(--win);border:1px solid rgba(0,135,90,.30);}
.rule-draw{background:rgba(184,104,0,.10);color:var(--draw);border:1px solid rgba(184,104,0,.30);}
.rule-loss{background:rgba(201,37,45,.10);color:var(--loss);border:1px solid rgba(201,37,45,.30);}

/* =========== CALENDAR =========== */
.cal-wrap{display:flex;flex-direction:column;gap:6px;}
.cal-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);gap:5px;
  font-size:13px;font-weight:900;color:var(--muted2);
  letter-spacing:.5px;text-align:center;margin-bottom:6px;
  padding:0 2px;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-cell{
  min-height:90px;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:default;position:relative;
  border:1px solid transparent;
  transition:transform .1s;
  padding:8px 4px;
  gap:4px;
}
.cal-cell:hover{transform:scale(1.05);z-index:2;}
.cal-cell.empty{background:#f5f7fa;border-color:transparent;}
.cal-cell.win {background:rgba(0,135,90,.10);border-color:rgba(0,135,90,.30);}
.cal-cell.loss{background:rgba(201,37,45,.10);border-color:rgba(201,37,45,.28);}
.cal-cell.draw{background:rgba(184,104,0,.10);border-color:rgba(184,104,0,.28);}
.cal-cell.nodata{background:#f5f7fa;border-color:rgba(15,30,60,.08);}
.cal-day{font-size:15px;font-weight:900;color:var(--muted);line-height:1;}
.cal-result{font-family:var(--font-num);font-size:26px;font-weight:700;line-height:1;}
.win  .cal-result{color:var(--win);}
.loss .cal-result{color:var(--loss);}
.draw .cal-result{color:var(--draw);}
.cal-cell .cal-hours{font-size:12px;font-weight:700;color:var(--muted);line-height:1;}

/* =========== LAYOUT GRIDS =========== */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;align-items:start;}
@media(max-width:1100px){.grid2{grid-template-columns:1fr;}}
@media(max-width:1400px){.grid3{grid-template-columns:1fr 1fr;}}
@media(max-width:900px){.grid3{grid-template-columns:1fr;}}

@media(orientation:landscape) and (min-width:1100px){
  .main-layout{
    display:grid;
    grid-template-columns:0.85fr 1.5fr;
    gap:18px;
    align-items:start;
  }
  .main-layout .right-col{display:flex;flex-direction:column;gap:18px;}
}

/* =========== CHART CONTAINERS =========== */
.ch{position:relative;width:100%;}
.ch-tall{height:400px;}
.ch-mid {height:300px;}
.ch-short{height:250px;}
.ch-cal {height:auto;}
@media(orientation:landscape) and (min-width:1100px){
  .ch-tall {height:calc(100vh - 350px);min-height:380px;max-height:560px;}
  .ch-mid  {height:calc((100vh - 400px) / 2);min-height:240px;max-height:340px;}
  .ch-short{height:calc(100vh - 360px);min-height:260px;max-height:400px;}
}

/* =========== LEGEND =========== */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(15,30,60,.09);}
.leg-chip{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 12px;border-radius:999px;
  background:#f4f5f7;border:1px solid rgba(15,30,60,.14);
  font-size:12px;font-weight:700;color:var(--text);
  cursor:pointer;user-select:none;transition:all .15s;
}
.leg-chip:hover{background:#e8ecf0;}
.leg-chip.off{opacity:.35;text-decoration:line-through;}
.leg-chip.waste-chip{border-color:rgba(212,72,0,.30);background:rgba(212,72,0,.07);}
.leg-sw{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

/* =========== TOOLTIP STYLE =========== */
/* applied via chart.js options */

/* =========== NO DATA =========== */
.no-data{font-size:13px;font-weight:700;color:var(--muted2);padding:6px 0 4px;}

/* =========== MEMBER TABLE =========== */
.member-table{width:100%;border-collapse:collapse;font-size:13px;}
.member-table th{
  font-size:11px;font-weight:900;color:var(--muted);
  letter-spacing:.5px;text-transform:uppercase;
  padding:8px 10px;border-bottom:1px solid var(--border);
  text-align:left;
}
.member-table td{padding:9px 10px;border-bottom:1px solid rgba(15,30,60,.06);}
.member-table tr:hover td{background:rgba(15,30,60,.02);}
.rank-num{font-family:var(--font-num);font-size:18px;font-weight:700;color:var(--muted);}
.member-name{font-weight:900;}
.badge{
  display:inline-block;padding:3px 10px;border-radius:999px;
  font-size:11px;font-weight:900;letter-spacing:.5px;
}
.badge.win {background:rgba(0,135,90,.10);color:var(--win);border:1px solid rgba(0,135,90,.30);}
.badge.loss{background:rgba(201,37,45,.10);color:var(--loss);border:1px solid rgba(201,37,45,.30);}
.badge.draw{background:rgba(184,104,0,.10);color:var(--draw);border:1px solid rgba(184,104,0,.30);}
.hours-bar-wrap{display:flex;align-items:center;gap:8px;}
.hours-bar-bg{flex:1;height:8px;background:rgba(15,30,60,.08);border-radius:4px;position:relative;overflow:visible;}
.hours-bar-fill{height:100%;border-radius:4px;position:absolute;top:0;left:0;transition:width .6s ease;}
.hours-bar-8h{
  position:absolute;top:-3px;height:14px;width:2px;border-radius:1px;
  background:var(--target);box-shadow:0 0 6px var(--target);
}
.hours-bar-val{font-family:var(--font-num);font-size:14px;font-weight:700;min-width:42px;text-align:right;}

/* =========== THRESHOLD PANEL =========== */
.th-panel{
  display:flex;flex-wrap:wrap;align-items:center;gap:14px 20px;
  padding:10px 28px;
  background:rgba(255,171,0,.04);
  border-bottom:1px solid rgba(255,171,0,.15);
  font-size:12px;
}
.th-group{display:flex;align-items:center;gap:9px;}
.th-label{font-weight:900;color:var(--muted2);letter-spacing:.3px;white-space:nowrap;}
.th-badge{
  padding:2px 9px;border-radius:999px;font-size:10px;font-weight:900;letter-spacing:.5px;
  margin-right:2px;
}
.th-badge.win {background:var(--win-dim);color:var(--win);border:1px solid rgba(0,230,118,.25);}
.th-badge.loss{background:var(--loss-dim);color:var(--loss);border:1px solid rgba(255,23,68,.25);}

input[type="range"]{
  -webkit-appearance:none;appearance:none;
  width:110px;height:4px;border-radius:2px;
  background:rgba(255,255,255,.12);outline:none;cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  border:2px solid var(--bg);cursor:pointer;
  transition:transform .1s;
}
input[type="range"]:hover::-webkit-slider-thumb{transform:scale(1.2);}
#thWinH::-webkit-slider-thumb {background:var(--win);}
#thLossH::-webkit-slider-thumb{background:var(--loss);}
#thWinWR::-webkit-slider-thumb {background:var(--win);}
#thLossWR::-webkit-slider-thumb{background:var(--loss);}

.th-val{
  font-family:var(--font-num);font-size:15px;font-weight:700;
  min-width:36px;text-align:center;letter-spacing:.5px;
}
#thWinH-val,#thWinWR-val  {color:var(--win);}
#thLossH-val,#thLossWR-val{color:var(--loss);}

.th-divider{width:1px;height:28px;background:rgba(255,255,255,.08);margin:0 4px;}
@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:.6;}
}
.pulse{animation:pulse 2.5s ease-in-out infinite;}

/* =========== FADE IN =========== */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeUp .5s ease both;}
.card:nth-child(1){animation-delay:.05s;}
.card:nth-child(2){animation-delay:.10s;}
.card:nth-child(3){animation-delay:.15s;}
.card:nth-child(4){animation-delay:.20s;}
.scoreboard{animation:fadeUp .4s ease both;}
/* =========== TOP ROW: scoreboard + monthly donuts =========== */
.top-row{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:12px;
  align-items:stretch;
}
@media(max-width:1000px){ .top-row{grid-template-columns:1fr;} }

/* スコアボードカード */
.sb-card{
  display:flex;align-items:center;gap:0;
  padding:0;overflow:hidden;
  min-width:0;
  background:linear-gradient(135deg,#f0f7ff 0%,#e8f0fe 100%);
  border-color:rgba(0,82,204,.18);
}
.sb-inner{display:flex;align-items:center;padding:16px 20px;gap:0;}
.sb-block{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 18px;}
.sb-num{font-family:var(--font-num);font-size:48px;font-weight:700;line-height:1;letter-spacing:-1px;}
.sb-num.win-num {color:var(--win);}
.sb-num.draw-num{color:var(--draw);}
.sb-num.loss-num{color:var(--loss);}
.sb-lbl{font-family:var(--font-num);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.sb-sep{font-family:var(--font-num);font-size:30px;color:var(--border2);line-height:1;}
.sb-divider{width:1px;height:80%;background:rgba(15,30,60,.12);align-self:stretch;margin:0 4px;}
.sb-donut-area{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 18px;}
.sb-donut-label{font-size:10px;font-weight:900;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;}
.sb-kpis{display:flex;flex-direction:column;gap:8px;padding:14px 18px;}
.sb-kpi{display:flex;align-items:center;gap:8px;}
.sb-kpi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-kpi-label{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;}
.sb-kpi-val{font-family:var(--font-num);font-size:16px;font-weight:700;color:var(--text);margin-left:auto;padding-left:12px;}

/* 月別ドーナツカード */
.monthly-card{ overflow-x:auto; }

/* =========== RULE STRIP =========== */
.rule-strip{
  display:flex;flex-wrap:wrap;align-items:center;gap:8px;
  font-size:11px;color:var(--muted);
  padding:6px 2px 0;
}
.rule-badge{padding:3px 10px;border-radius:999px;font-weight:900;font-size:10px;letter-spacing:.5px;}
.rule-win {background:rgba(0,135,90,.10);color:var(--win);border:1px solid rgba(0,135,90,.30);}
.rule-draw{background:rgba(184,104,0,.10);color:var(--draw);border:1px solid rgba(184,104,0,.30);}
.rule-loss{background:rgba(201,37,45,.10);color:var(--loss);border:1px solid rgba(201,37,45,.30);}

/* =========== MID ROW: calendar + charts =========== */
.mid-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  align-items:start;
}
@media(max-width:1100px){ .mid-row{grid-template-columns:1fr;} }
.mid-right{display:flex;flex-direction:column;gap:12px;}

/* =========== CHART HEIGHTS =========== */
.ch-trend{height:210px;}
@media(min-height:900px){.ch-trend{height:230px;}}

.cal-cell.cal-clickable{ cursor:pointer; }
.cal-cell.cal-clickable:hover{ transform:scale(1.08);z-index:2;box-shadow:0 4px 12px rgba(15,30,60,.15); }

.cal-cell{min-height:68px;gap:2px;padding:5px 2px;}
.cal-result{font-size:18px;}
.cal-day{font-size:12px;}
.cal-cell .cal-hours{font-size:10px;}

/* =========== TASK BREAKDOWN compact =========== */
.tb-member-block{margin-bottom:18px;}
.tb-bar-bg{height:22px;}


.tb-member-block{ margin-bottom:28px; }
.tb-member-block:last-child{ margin-bottom:0; }
.tb-member-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.tb-member-name{ font-size:15px;font-weight:900;color:var(--text);font-family:var(--font-jp); }
.tb-member-total{ font-family:var(--font-num);font-size:13px;font-weight:700;color:var(--muted2);margin-left:4px; }
.tb-row{
  display:grid;

<script>
// ============================================================
// CONFIG
// ============================================================
const firebaseConfig = { apiKey:"AIzaSyAwZQMhF5qIv1XSADce2JiN_qAV88TxEQ8", projectId:"qcnippo" };
const DOC_PATH = "timeTracker/state";

const TASK_COLORS = {
  /* ムダ系 — 色相を大きく分散させて視認性確保 */
  "不具合対応":  "#ff1744",   /* 鮮赤 */
  "異常処置":    "#ff6d00",   /* ディープオレンジ */
  "保留品対応":  "#ffd600",   /* 黄 */
  "選別":        "#00e5ff",   /* シアン */
  "修正":        "#d500f9",   /* 紫 */
  "選別・修正":  "#76ff03",   /* ライムグリーン */
  /* 通常業務 */
  "朝礼":        "#ffab00",
  "打合せ":      "#2979ff",
  "資料作成":    "#00e676",
  "メール":      "#29b6f6",
  "外出":        "#1de9b6",
  "来客対応":    "#e040fb",
  "その他":      "#546e7a"
};
const WASTE_TASKS = ["異常処置","不具合対応","保留品対応","選別","修正","選別・修正"];
const isWaste = t => {
  if (!t) return false;
  if (WASTE_TASKS.includes(t)) return true;
  return t.includes("選別")||t.includes("修正")||t.includes("不具合")||t.includes("異常")||t.includes("保留");
};
const PALETTE = ["#2979ff","#00e676","#ffab00","#00b0ff","#e040fb","#1de9b6","#ff9100","#7c4dff","#5a6e90"];
const taskColor = (t,i) => TASK_COLORS[t] || (isWaste(t) ? "#ff1744" : PALETTE[(i||0)%PALETTE.length]);

// WIN/LOSS thresholds — UIから動的に読む（労働時間のみ）
function getThresholds() {
  return { winMaxH: 9.0, lossMinH: 10.5 };
}
const MEMBER_MIN_HOURS = 4;

function getResult(avgH) {
  const th = getThresholds();
  if (avgH <= th.winMaxH)  return "win";
  if (avgH >  th.lossMinH) return "loss";
  return "draw";
}

// ============================================================
// CHART STYLE
// ============================================================
const FONT = "'Rajdhani','Noto Sans JP',sans-serif";
const FONTJP = "'Noto Sans JP',sans-serif";
const INK = "#172b4d";
const MUTED = "#5e6c84";
const GRID_C = "rgba(15,30,60,.07)";
const TARGET_C = "#b86800";
const WIN_C = "#00875a";
const LOSS_C = "#c9252d";
const DRAW_C = "#b86800";

Chart.defaults.color = "#5e6c84";
Chart.defaults.font.family = FONTJP;
Chart.defaults.animation.duration = 700;

const TT_STYLE = {
  backgroundColor:"rgba(255,255,255,.98)",
  titleColor:"#172b4d", bodyColor:"#42526e",
  borderColor:"rgba(15,30,60,.15)", borderWidth:1,
  cornerRadius:10, padding:12
};
function axisX(extra={}) {
  return { ticks:{color:MUTED,font:{size:12,weight:"700",family:FONTJP},maxRotation:0},
           grid:{color:GRID_C}, border:{dash:[3,4]}, ...extra };
}
function axisY(title="", extra={}) {
  return { ticks:{color:MUTED,font:{size:12,weight:"700",family:FONTJP}},
           grid:{color:GRID_C}, border:{dash:[3,4]},
           title:{display:!!title,text:title,color:MUTED,font:{size:12,weight:"700",family:FONTJP}},
           ...extra };
}
function chartTitle(text, size=16) {
  return { display:true, text,
    color:INK, font:{size,weight:"700",family:FONT},
    padding:{bottom:14} };
}
const fmt1 = v => (Math.round(v*10)/10).toFixed(1);

// ============================================================
// THRESHOLD SYNC
// ============================================================
function syncThresholds() {}


let records=[], fbUnsub=null;
let charts = { member:null, trend:null, waste:null, task:null, winRate:null };
const hidden = { member:{}, trend:{"勝ち平均":false,"チーム平均":false,"定時":false},
                 waste:{}, task:{} };

function updateSync(ok, msg) {
  const el = document.getElementById("syncStatus");
  if (!el) return;
  el.className = ok ? "sync-pill ok" : "sync-pill err";
  el.innerHTML = `<span class="sync-dot ${ok?"ok":"err"}"></span>${msg}`;
}

function initFB() {
  try {
    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const ref = db.doc(DOC_PATH);
    updateSync(true,"同期中");
    if (fbUnsub) fbUnsub();
    fbUnsub = ref.onSnapshot(snap => {
      records = (snap.exists ? snap.data() : {}).records || [];
      renderAll();
    }, err => { console.error(err); updateSync(false,"通信エラー"); });
  } catch(e) { console.error(e); updateSync(false,"接続エラー"); }
}

// ============================================================
// DATE UTILS
// ============================================================
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function parseD(s) {
  if (!s) return null;
  const p=s.split("-");
  if (p.length!==3) return null;
  return new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));
}
function calcH(s,e) {
  if (!s||!e) return 0;
  const [sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);
  const v=((eh||0)*60+(em||0)-((sh||0)*60+(sm||0)))/60;
  return isFinite(v)&&v>0?v:0;
}
function weekStart(d) {
  const t=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  t.setDate(t.getDate()-(t.getDay()+6)%7);
  return t;
}
// ============================================================
// MONTH PICKER
// ============================================================
function buildMonthSelects() {
  const now = new Date();
  const thisYear = now.getFullYear();
  const years = [];
  for (let y = thisYear - 3; y <= thisYear + 1; y++) years.push(y);
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  ['startYear','endYear'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.innerHTML = years.map(y => `<option value="${y}">${y}年</option>`).join('');
    sel.value = thisYear;
  });
  ['startMonth','endMonth'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.innerHTML = months.map((m,i) => `<option value="${i+1}">${m}</option>`).join('');
  });

  // default: this month
  document.getElementById('startYear').value  = thisYear;
  document.getElementById('startMonth').value = now.getMonth() + 1;
  document.getElementById('endYear').value    = thisYear;
  document.getElementById('endMonth').value   = now.getMonth() + 1;
}

function getMonthRange() {
  const sy = parseInt(document.getElementById('startYear')?.value  || new Date().getFullYear());
  const sm = parseInt(document.getElementById('startMonth')?.value || 1);
  const ey = parseInt(document.getElementById('endYear')?.value    || new Date().getFullYear());
  const em = parseInt(document.getElementById('endMonth')?.value   || 12);
  const start = new Date(sy, sm - 1, 1);
  const end   = new Date(ey, em, 0);   // last day of end month
  if (start > end) {
    document.getElementById('endYear').value  = sy;
    document.getElementById('endMonth').value = sm;
    return { start, end: new Date(sy, sm, 0) };
  }
  start.setHours(0,0,0,0); end.setHours(23,59,59,999);
  return { start, end };
}

function onMonthChange() {
  const sy = parseInt(document.getElementById('startYear').value);
  const sm = parseInt(document.getElementById('startMonth').value);
  const ey = parseInt(document.getElementById('endYear').value);
  const em = parseInt(document.getElementById('endMonth').value);
  // clamp: end must be >= start
  if (ey < sy || (ey === sy && em < sm)) {
    document.getElementById('endYear').value  = sy;
    document.getElementById('endMonth').value = sm;
  }
  renderAll();
}

function setThisMonth() {
  const n = new Date();
  document.getElementById('startYear').value  = n.getFullYear();
  document.getElementById('startMonth').value = n.getMonth() + 1;
  document.getElementById('endYear').value    = n.getFullYear();
  document.getElementById('endMonth').value   = n.getMonth() + 1;
  renderAll();
}
function setLastMonth() {
  const n = new Date();
  const d = new Date(n.getFullYear(), n.getMonth() - 1, 1);
  document.getElementById('startYear').value  = d.getFullYear();
  document.getElementById('startMonth').value = d.getMonth() + 1;
  document.getElementById('endYear').value    = d.getFullYear();
  document.getElementById('endMonth').value   = d.getMonth() + 1;
  renderAll();
}
function set3Months() {
  const n = new Date();
  const s = new Date(n.getFullYear(), n.getMonth() - 2, 1);
  document.getElementById('startYear').value  = s.getFullYear();
  document.getElementById('startMonth').value = s.getMonth() + 1;
  document.getElementById('endYear').value    = n.getFullYear();
  document.getElementById('endMonth').value   = n.getMonth() + 1;
  renderAll();
}
function setThisYear() {
  const n = new Date();
  const fy = n.getMonth() >= 3 ? n.getFullYear() : n.getFullYear() - 1;
  document.getElementById('startYear').value  = fy;
  document.getElementById('startMonth').value = 4;
  document.getElementById('endYear').value    = fy + 1;
  document.getElementById('endMonth').value   = 3;
  renderAll();
}

function getMode() { return document.getElementById("aggMode")?.value||"week"; }

// ============================================================
// AGGREGATE
// ============================================================
function aggregate() {
  const range = getMonthRange();
  const filtered = records.filter(r => { const d=parseD(r.date); return d&&d>=range.start&&d<=range.end; });

  // per-day analysis
  const dayMap = {}; // key=dateStr, val={total, waste, memberTotal:{}, memberWaste:{}}
  const perMember = {}; // member -> {total, waste, days, byTask}
  const perPeriodMember = { day:{}, week:{}, month:{} };
  const buckets = { day:{}, week:{}, month:{} };
  const wasteBuckets = { day:{}, week:{}, month:{} };
  const aftercareBuckets = { day:{}, week:{}, month:{} };

  let totalH=0, totalW=0;

  filtered.forEach(r => {
    const d=parseD(r.date); if (!d) return;
    const h=calcH(r.startTime,r.endTime); if (!h) return;
    const m=r.member||"未設定", t=r.task||"未分類", iw=isWaste(t);

    if (!dayMap[r.date]) dayMap[r.date]={total:0,waste:0,memberTotal:{},memberWaste:{}};
    dayMap[r.date].total+=h;
    if (iw) dayMap[r.date].waste+=h;
    dayMap[r.date].memberTotal[m]=(dayMap[r.date].memberTotal[m]||0)+h;
    if (iw) dayMap[r.date].memberWaste[m]=(dayMap[r.date].memberWaste[m]||0)+h;

    if (!perMember[m]) perMember[m]={total:0,waste:0,days:new Set(),byTask:{}};
    perMember[m].total+=h;
    if (iw) perMember[m].waste+=h;
    perMember[m].days.add(r.date);
    perMember[m].byTask[t]=(perMember[m].byTask[t]||0)+h;

    const ds=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    const dK=String(ds.getTime());
    const ws=weekStart(d), wK=String(ws.getTime());
    const ms=new Date(d.getFullYear(),d.getMonth(),1), mK=String(ms.getTime());

    // 期間別メンバータスク集計
    ["day","week","month"].forEach((mode,i)=>{
      const k=[dK,wK,mK][i], st=[ds,ws,ms][i];
      if (!perPeriodMember[mode][k]) perPeriodMember[mode][k]={start:st,members:{}};
      if (!perPeriodMember[mode][k].members[m]) perPeriodMember[mode][k].members[m]={total:0,byTask:{}};
      perPeriodMember[mode][k].members[m].total+=h;
      perPeriodMember[mode][k].members[m].byTask[t]=(perPeriodMember[mode][k].members[m].byTask[t]||0)+h;
    });

    ["day","week","month"].forEach((mode,i)=>{
      const k=[dK,wK,mK][i], st=[ds,ws,ms][i];
      if (!buckets[mode][k]) buckets[mode][k]={total:0,waste:0,start:st};
      buckets[mode][k].total+=h;
      if (iw) buckets[mode][k].waste+=h;
    });

    if (iw) {
      totalW+=h;
      ["day","week","month"].forEach((mode,i)=>{
        const k=[dK,wK,mK][i], st=[ds,ws,ms][i];
        if (!aftercareBuckets[mode][k]) aftercareBuckets[mode][k]={start:st,tasks:{}};
        aftercareBuckets[mode][k].tasks[t]=(aftercareBuckets[mode][k].tasks[t]||0)+h;
      });
    }
    totalH+=h;
  });

  // daily battle results
  const dayResults = {};
  Object.entries(dayMap).forEach(([dateStr,day]) => {
    const mt=day.memberTotal;
    const qualified=Object.keys(mt).filter(m=>(mt[m]||0)>=MEMBER_MIN_HOURS);
    const n=qualified.length;
    if (!n) return;
    const avgH=day.total/n;
    const wr=day.total>0?day.waste/day.total:0;
    dayResults[dateStr]={ avgH, wasteRate:wr, result:getResult(avgH), n };
  });

  // 週次・月次ごとの勝敗集計
  const battleBuckets = { week:{}, month:{} };
  Object.entries(dayResults).forEach(([dateStr, dr]) => {
    const d=parseD(dateStr); if (!d) return;
    const ws=weekStart(d), wK=String(ws.getTime());
    const ms=new Date(d.getFullYear(),d.getMonth(),1), mK=String(ms.getTime());
    ["week","month"].forEach((mode,i)=>{
      const k=[wK,mK][i], st=[ws,ms][i];
      if (!battleBuckets[mode][k]) battleBuckets[mode][k]={start:st,win:0,draw:0,loss:0};
      battleBuckets[mode][k][dr.result]++;
    });
  });

  return { range, filtered, dayMap, dayResults, perMember, perPeriodMember,
           buckets, aftercareBuckets, totalH, totalW, battleBuckets };
}

function legend(id, items, toggle) {

function showDayModal(dateStr) {
  if (!lastAgg) return;
  const d = parseD(dateStr);
  if (!d) return;

  const dayResult = lastAgg.dayResults[dateStr];
  const ds = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dK = String(ds.getTime());
  const periodData = lastAgg.perPeriodMember.day[dK];

  // header
  document.getElementById('modalDate').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;

  const badgeRow = document.getElementById('modalBadgeRow');
  badgeRow.innerHTML = '';
  if (dayResult) {
    const rc = dayResult.result;
    const label = rc==='win'?'WIN':rc==='loss'?'LOSE':'DRAW';
    const colors = {win:'rgba(0,135,90,.12)',draw:'rgba(184,104,0,.12)',loss:'rgba(201,37,45,.12)'};
    const textC  = {win:'var(--win)',draw:'var(--draw)',loss:'var(--loss)'};
    const border = {win:'rgba(0,135,90,.30)',draw:'rgba(184,104,0,.30)',loss:'rgba(201,37,45,.30)'};
    badgeRow.innerHTML =
      `<span style="padding:3px 12px;border-radius:999px;font-size:12px;font-weight:900;
        background:${colors[rc]};color:${textC[rc]};border:1px solid ${border[rc]};">${label}</span>
       <span style="font-size:12px;color:var(--muted);font-weight:700;">平均 ${fmt1(dayResult.avgH)}h ／ ${dayResult.n}名</span>`;
  } else {
    badgeRow.innerHTML = `<span style="font-size:12px;color:var(--muted);">記録なし</span>`;
  }

  // body — per member
  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  if (!periodData || !Object.keys(periodData.members).length) {
    body.innerHTML = `<div class="no-data">この日のデータがありません</div>`;
  } else {
    const members = Object.entries(periodData.members)
      .sort((a,b) => b[1].total - a[1].total);

    // global max for bar scale
    const allVals = members.flatMap(([,md]) => Object.values(md.byTask));
    const maxVal = Math.max(...allVals, 1);

    // consistent task index
    const taskIdx = {};
    let ti = 0;
    Object.values(lastAgg.perMember).forEach(d => Object.keys(d.byTask).forEach(t => {
      if (!(t in taskIdx)) taskIdx[t] = ti++;
    }));

    members.forEach(([name, md]) => {
      const total = md.total;
      const waste = Object.entries(md.byTask)
        .filter(([t]) => isWaste(t))
        .reduce((s,[,v])=>s+v, 0);
      const wr = total > 0 ? waste/total : 0;
      const result = getResult(total); // single day = same threshold
      const rc = result;
      const textC = {win:'var(--win)',draw:'var(--draw)',loss:'var(--loss)'};

      // top task
      const topTask = Object.entries(md.byTask).sort((a,b)=>b[1]-a[1])[0];
      const topColor = topTask ? taskColor(topTask[0], taskIdx[topTask[0]]??0) : '#999';

      // task rows sorted desc
      const taskRows = Object.entries(md.byTask).sort((a,b)=>b[1]-a[1]);

      const div = document.createElement('div');
      div.className = 'dm-member';
      div.innerHTML = `
        <div class="dm-member-header">
          <span style="font-size:16px;">👤</span>
          <span class="dm-member-name">${name}</span>
          ${topTask ? `<span class="dm-top-task" style="background:${topColor}20;color:${topColor};border:1px solid ${topColor}40;">
            <span style="width:8px;height:8px;border-radius:2px;background:${topColor};display:inline-block;flex-shrink:0;"></span>
            ${topTask[0]} 主
          </span>` : ''}
          <span class="dm-member-total" style="color:${textC[rc] || 'var(--text)'};">${fmt1(total)}h</span>
        </div>
        <div class="dm-tasks">
          ${taskRows.map(([task, val]) => {
            const color = taskColor(task, taskIdx[task]??ti++);
            const pct   = Math.max(val/maxVal*100, 1);
            const waste = isWaste(task);
            return `<div class="dm-task-row">
              <div class="dm-task-label">
                <span class="dm-dot" style="background:${color};"></span>
                <span>${task}${waste?`<span style="font-size:9px;background:rgba(201,37,45,.12);color:var(--loss);border-radius:3px;padding:1px 4px;margin-left:4px;font-weight:900;">ムダ</span>`:''}</span>
              </div>
              <div class="dm-bar-bg">
                <div class="dm-bar-fill" style="width:${pct}%;background:${color};">
                  ${val>=0.3?`<span class="dm-bar-text">${fmt1(val)}h</span>`:''}
                </div>
              </div>
              <div class="dm-val">${fmt1(val)}h</div>
            </div>`;
          }).join('')}
        </div>`;
      body.appendChild(div);
    });
  }

  document.getElementById('dayModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDayModal(e) {
  if (e && e.target !== document.getElementById('dayModal')) return;
  document.getElementById('dayModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDayModal();
});

function renderCalendar(agg) {
  const range = agg.range;
  const container = document.getElementById("calContainer");
  if (!container) return;

  // build all days in range
  const days = [];
  const cur = new Date(range.start);
  while (cur <= range.end) {
    days.push(fmtDate(cur));
    cur.setDate(cur.getDate()+1);
  }

  if (!days.length) { container.innerHTML="<div class='no-data'>データなし</div>"; return; }

  // group by month
  const months = {};
  days.forEach(ds => {
    const d=parseD(ds);
    const mk=`${d.getFullYear()}-${d.getMonth()}`;
    if (!months[mk]) months[mk]={year:d.getFullYear(),month:d.getMonth(),days:[]};
    months[mk].days.push(ds);
  });

  let html = "";
  const WD = ["月","火","水","木","金","土","日"];

  Object.values(months).reverse().forEach(({year,month,days:mdays}) => {
    const firstD = new Date(year,month,1);
    const lastD  = new Date(year,month+1,0);
    const firstDow = (firstD.getDay()+6)%7; // 0=Mon

    html += `<div style="margin-bottom:16px;">
      <div style="font-family:var(--font-num);font-size:14px;font-weight:700;color:var(--muted2);letter-spacing:1px;margin-bottom:8px;">${year}年 ${month+1}月</div>
      <div class="cal-wrap">
        <div class="cal-weekdays">${WD.map(w=>`<div>${w}</div>`).join("")}</div>
        <div class="cal-grid">`;

    // empty cells before month start
    for (let i=0;i<firstDow;i++) html+=`<div class="cal-cell empty"></div>`;

    for (let day=1;day<=lastD.getDate();day++) {
      const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      const r=agg.dayResults[ds];
      if (r) {
        const cls=r.result;
        const label=cls==="win"?"W":cls==="loss"?"L":"D";
        const hoursText=fmt1(r.avgH)+"h";
        html+=`<div class="cal-cell ${cls} cal-clickable" onclick="showDayModal('${ds}')" title="クリックで詳細を表示">
          <div class="cal-day">${day}</div>
          <div class="cal-result">${label}</div>
          <div class="cal-hours">${hoursText}</div>
        </div>`;
      } else {
        const d2=parseD(ds);
        if (d2&&d2>=range.start&&d2<=range.end) {
          html+=`<div class="cal-cell nodata cal-clickable" onclick="showDayModal('${ds}')" title="クリックで詳細を表示"><div class="cal-day">${day}</div></div>`;
        } else {
          html+=`<div class="cal-cell empty"></div>`;
        }
      }
    }
    // fill remaining cells
    const total=(firstDow+lastD.getDate());
    const rem=(7-total%7)%7;
    for (let i=0;i<rem;i++) html+=`<div class="cal-cell empty"></div>`;

    html+=`</div></div></div>`;
  });

  container.innerHTML=html;
}

        },

// ⑤ TASK BREAKDOWN — HTML per-member bars (with period select)
// ============================================================
let taskPageIndex = 0; // current page index within periods

function taskPageMove(dir) {
  taskPageIndex += dir;
  renderAll();
}

function getTaskPeriods(agg) {
  const mode = document.getElementById("taskMode")?.value || "total";
  if (mode === "total") return [{ label:"期間合計", data: agg.perMember }];

  // Build per-period perMember maps
  const filtered = agg.filtered;
  const periodMap = {}; // key -> { label, start, members:{name:{total,waste,byTask}} }

  filtered.forEach(r => {
    const d = parseD(r.date); if (!d) return;
    const h = calcH(r.startTime, r.endTime); if (!h) return;
    const m = r.member||"未設定", t = r.task||"未分類", iw = isWaste(t);

    let k, label, start;
    if (mode === "week") {
      const ws = weekStart(d);
      k = String(ws.getTime());
      start = ws;
      label = `${ws.getMonth()+1}/${ws.getDate()}週`;
    } else {
      const ds = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      k = String(ds.getTime());
      start = ds;
      label = `${d.getMonth()+1}/${d.getDate()}`;
    }

    if (!periodMap[k]) periodMap[k] = { label, start, members:{} };
    const pm = periodMap[k].members;
    if (!pm[m]) pm[m] = { total:0, waste:0, days:new Set(), byTask:{} };
    pm[m].total += h;
    if (iw) pm[m].waste += h;
    pm[m].days.add(r.date);
    pm[m].byTask[t] = (pm[m].byTask[t]||0) + h;
  });

  return Object.values(periodMap)
    .sort((a,b) => a.start - b.start)
    .map(p => ({ label: p.label, data: p.members }));
}

function renderTaskChart(agg) {
  const wrap = document.getElementById("taskBreakdownWrap");
  if (!wrap) return;

  const periods = getTaskPeriods(agg);
  if (!periods.length) { wrap.innerHTML = "<div class='no-data'>データなし</div>"; return; }

  // clamp page index
  taskPageIndex = Math.max(0, Math.min(taskPageIndex, periods.length - 1));
  const period = periods[taskPageIndex];

  // update nav UI
  const modeVal = document.getElementById("taskMode")?.value || "total";
  const periodLabel = document.getElementById("taskPeriodLabel");
  const prevBtn = document.getElementById("taskPrev");
  const nextBtn = document.getElementById("taskNext");
  if (periodLabel) periodLabel.textContent = period.label;
  if (prevBtn) prevBtn.disabled = (taskPageIndex === 0);
  if (nextBtn) nextBtn.disabled = (taskPageIndex === periods.length - 1);
  if (prevBtn) prevBtn.style.opacity = taskPageIndex === 0 ? ".3" : "1";
  if (nextBtn) nextBtn.style.opacity = taskPageIndex === periods.length-1 ? ".3" : "1";
  // hide nav in total mode
  const isTotal = modeVal === "total";
  [prevBtn, nextBtn, periodLabel].forEach(el => { if (el) el.style.display = isTotal ? "none" : ""; });

  const entries = Object.entries(period.data).sort((a,b) => b[1].total - a[1].total);
  if (!entries.length) { wrap.innerHTML = "<div class='no-data'>データなし</div>"; return; }

  // consistent color index across all periods
  const taskIndexMap = {};
  let ti = 0;
  // Use full agg for consistent colors
  Object.values(agg.perMember).forEach(d => Object.keys(d.byTask).forEach(t => {
    if (!(t in taskIndexMap)) taskIndexMap[t] = ti++;
  }));

  const allVals = [];
  entries.forEach(([,d]) => Object.values(d.byTask).forEach(v => allVals.push(v)));
  const maxVal = Math.max(...allVals, 1);

  let html = "";
  entries.forEach(([name, data]) => {
    const total = data.total;
    const rows = Object.entries(data.byTask).sort((a,b) => b[1] - a[1]);

    html += `<div class="tb-member-block">
      <div class="tb-member-header">
        <span style="font-size:16px;">👤</span>
        <span class="tb-member-name">${name}</span>
        <span class="tb-member-total">合計: ${fmt1(total)}h</span>
      </div>`;

    rows.forEach(([task, val]) => {
      const color = taskColor(task, taskIndexMap[task] ?? ti++);
      const pct   = Math.max((val / maxVal) * 100, 1);
      const waste = isWaste(task);
      const labelInBar = val >= 0.4;

      html += `<div class="tb-row">
        <div class="tb-task-label">
          <span class="tb-dot" style="background:${color};"></span>
          <span>${task}${waste ? '<span class="tb-waste-tag">ムダ</span>' : ""}</span>
        </div>
        <div class="tb-bar-bg">
          <div class="tb-bar-fill" style="width:${pct}%;background:${color};">
            ${labelInBar ? `<span class="tb-bar-label">${fmt1(val)}h</span>` : ""}
          </div>
        </div>
        <div class="tb-val">${fmt1(val)}h</div>
      </div>`;
    });

    html += `</div>`;
  });

  wrap.innerHTML = html;
}

function renderMemberTable(agg) {

    return { name, avgH, wasteH:data.waste/n, total:data.total, wasteTotal:data.waste, wr, result:getResult(avgH), days:n };

    const th=getThresholds();

    html+=`<tr>
      <td><div class="rank-num">${i+1}</div></td>

            <div class="hours-bar-fill" style="width:${bpct}%;background:${bc}30;border-radius:5px;height:100%;"></div>
            <div class="hours-bar-8h" style="left:${pct8}%;"></div>
          </div>
          <div class="hours-bar-val" style="color:${bc};">${fmt1(m.avgH)}h</div>
        </div>
      </td>
      <td style="font-family:var(--font-num);font-size:15px;font-weight:700;color:${m.wr>=th.lossMinWR?LOSS_C:m.wr>=th.winMaxWR?DRAW_C:WIN_C};">${(m.wr*100).toFixed(0)}%</td>
      <td style="font-family:var(--font-num);font-size:14px;font-weight:700;color:var(--waste);">${fmt1(m.wasteTotal)}h</td>
    </tr>`;
  });

  html+="</tbody></table>";
  wrap.innerHTML=html;
}

// ============================================================
// INIT
// ============================================================
document.addEventListener("DOMContentLoaded",()=>{
  Chart.register(ChartDataLabels);
  buildMonthSelects();
  syncThresholds();
  initFB();
});
</script>
</body>
</html>
