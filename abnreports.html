<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>URL移行のお知らせ | 異常履歴入力ツール</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --line: #d9e2ef;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --accent: #0f766e;
      --warning: #b45309;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Meiryo", "Yu Gothic", sans-serif;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, .08), transparent 38%),
        linear-gradient(315deg, rgba(15, 118, 110, .10), transparent 42%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(100%, 760px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(31, 41, 55, .12);
      padding: clamp(24px, 5vw, 44px);
    }

    .label {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #fff7ed;
      color: var(--warning);
      font-weight: 700;
      font-size: .9rem;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.25;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .lead {
      color: var(--text);
      font-size: 1.08rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .links {
      display: grid;
      gap: 12px;
      margin: 28px 0;
    }

    .link-card {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }

    .link-card:hover,
    .link-card:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 10px 24px rgba(37, 99, 235, .14);
      transform: translateY(-1px);
      outline: none;
    }

    .link-title {
      display: block;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .link-url {
      display: block;
      color: var(--muted);
      overflow-wrap: anywhere;
      font-size: .92rem;
    }

    .arrow {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    .note {
      border-top: 1px solid var(--line);
      padding-top: 20px;
    }

    .note strong {
      color: var(--accent);
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      main {
        padding: 24px;
      }

      .link-card {
        align-items: flex-start;
      }

      .arrow {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="label">旧URLは廃止しました</div>
    <h1>異常履歴入力ツールのURLが変わりました</h1>
    <p class="lead">このページでは入力・閲覧機能は利用できません。下記の新しいURLからアクセスしてください。</p>
    <p>ブックマーク、ホーム画面、共有リンクを新しいURLへ更新してください。</p>

    <div class="links" aria-label="新しいURL">
      <a class="link-card" href="https://miyama-kogyo.github.io/apps/abnreport.html">
        <span>
          <span class="link-title">異常履歴入力ツール</span>
          <span class="link-url">https://miyama-kogyo.github.io/apps/abnreport.html</span>
        </span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <a class="link-card" href="https://miyama-kogyo.github.io/apps/abnbiew.html">
        <span>
          <span class="link-title">異常履歴データシート</span>
          <span class="link-url">https://miyama-kogyo.github.io/apps/abnbiew.html</span>
        </span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>
    </div>

    <p class="note"><strong>初回アクセス時は端末申請が必要です。</strong><br>申請者名とPC・スマホ名を入力し、管理者の承認後に利用できます。</p>
  </main>
</body>
</html>
