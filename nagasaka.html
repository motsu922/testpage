// иЈҪе“Ғж®өеҸ–гӮҠгҒҜж®өеҸ–гӮҠA/BгҒ®е®ҢдәҶгӮ’зөҢгҒҰж®өеҸ–гӮҠгғҲгғјгӮҝгғ«гҒ«йӣҶзҙ„гҒ•гӮҢгӮӢгҒҹгӮҒгҖҒйҖІжҚ—иЎЁзӨәжҷӮгҒҜгҒқгҒЎгӮүгӮ’еҸӮз…§гҒҷгӮӢ
function roleCompletion(item,role){
  const key=role==='иЈҪе“Ғж®өеҸ–гӮҠ'?'ж®өеҸ–гӮҠгғҲгғјгӮҝгғ«':role;
  return item&&item.completions?item.completions[key]:undefined;
}

function toHHMM(s){
  if(!s)return'';
  const p=s.trim().split(':');
  if(p.length>=3){
    const hh=p[0].padStart(2,'0');
    const mm=p[1].padStart(2,'0');
    const ss=p[2].replace(/\..*/,'').padStart(2,'0'); // гӮөгғ–з§’еҲҮгӮҠжҚЁгҒҰгғ»з§’гҒҜдҝқжҢҒ
    return `${hh}:${mm}:${ss}`;
  }
  return p.length>=2?p[0].padStart(2,'0')+':'+p[1].padStart(2,'0'):s;
}
const isTime=s=>s&&/^\d{1,2}:\d{2}/.test(s.trim());
function mkItem(line,cols,offset=0){
  const num=x=>parseInt(x)||0;
  const[k,o,r,s,p,mb,hn,hc,fr,kw,w,v,vm,fb,ow]=cols.slice(offset,offset+15);
  if(!s||!isTime(k))return null;
  return{line,seiban:s,kakeTime:toHHMM(k),orosiTime:toHHMM(o),reqTime:toHHMM(r),
    products:num(p),materialBoxes:num(mb),hangerName:hn||'',hangers:num(hc),fraction:num(fr),
    kakeWorkers:num(kw),width:num(w),voltage:num(v),voltageMax:num(vm),
    finishedBoxes:num(fb),orosiWorkers:num(ow)};
}
/* 15еҲ—вҶ’selectedLineеҚҳзӢ¬гҖҒ16еҲ—зӣ®д»ҘйҷҚгҒ«жҷӮеҲ»гҒҢгҒӮгӮҢгҒ°A+BеҗҲз®— */
function parseExcel(text,selectedLine){
  const rows=text.split('\n').map(r=>r.split('\t').map(c=>c.trim())).filter(r=>r.some(v=>v));
  const items=[];
  rows.forEach(cols=>{
    const combined=cols.length>=16&&isTime(cols[15]);
    const a=mkItem(combined?'A':selectedLine,cols,0);
    if(a)items.push(a);
    if(combined){const b=mkItem('B',cols,15);if(b)items.push(b);}
  });
  return items;
}
function getFields(role,item,master){
  const f=[];
  const add=(l,v)=>f.push([l,(v==null||v===''||v===0||v==='0')?'вҖ”':String(v)]);
  if(!["йҷҚгӮҚгҒ—жӨңжҹ»","еҮәиҚ·"].includes(role))add("жҺӣгҒ‘жҷӮй–“",item.kakeTime);else add("йҷҚгӮҚгҒ—жҷӮй–“",item.orosiTime||'вҖ”');
  add("жүҖиҰҒжҷӮй–“",item.reqTime);
  if(["иЈҪе“Ғж®өеҸ–гӮҠ","йҷҚгӮҚгҒ—жӨңжҹ»","гғӘгғ•гғҲгғһгғі"].includes(role))add("иЈҪе“Ғж•°",item.products?item.products+"еҖӢ":"вҖ”");
  if(["иЈҪе“Ғж®өеҸ–гӮҠ","гғӘгғ•гғҲгғһгғі"].includes(role))add("зҙ жқҗз®ұж•°",item.materialBoxes?item.materialBoxes+"з®ұ":"вҖ”");
  if(["гғҸгғігӮ¬гғјж®өеҸ–гӮҠ","жҺӣгҒ‘","гғӘгғ•гғҲгғһгғі"].includes(role)){
    add("гғҸгғігӮ¬гғјеҗҚз§°",item.hangerName||"вҖ”");
    add("гғҸгғігӮ¬гғјжң¬ж•°",item.hangers?item.hangers+"жң¬":"вҖ”");
  }
  if(["иЈҪе“Ғж®өеҸ–гӮҠ","жҺӣгҒ‘","йҷҚгӮҚгҒ—жӨңжҹ»"].includes(role))add("гғҸгғігӮ¬гғјеҶ…з«Ҝж•°дәҲе®ҡ",item.fraction?item.fraction+"еҖӢ":"вҖ”");
  if(role==="гғҸгғігӮ¬гғјж®өеҸ–гӮҠ"){
    add("иЁӯе®ҡйӣ»ең§",item.voltage?item.voltage+"V":"вҖ”");
    if(item.voltageMax)add("йӣ»ең§дёҠйҷҗ",item.voltageMax+"V");
  }
  if(role==="жҺӣгҒ‘"){
    add("жҺӣгҒ‘дәәж•°",item.kakeWorkers?item.kakeWorkers+"дәә":"вҖ”");
    add("жҺӣе№…",item.width?item.width+"cm":"вҖ”");
  }
  if(role==="йҷҚгӮҚгҒ—жӨңжҹ»")add("йҷҚгӮҚгҒ—дәәж•°",item.orosiWorkers?item.orosiWorkers+"дәә":"вҖ”");
  if(["еҮәиҚ·","гғӘгғ•гғҲгғһгғі"].includes(role))add("е®ҢжҲҗе“Ғз®ұж•°",item.finishedBoxes?item.finishedBoxes+"з®ұ":"вҖ”");
  if(role==="гғӘгғ•гғҲгғһгғі"&&item.width)add("жҺӣе№…",item.width+"cm");
  return f;
}

function QRDisplay({value,size=120}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!value)return;
    const gen=()=>{
      if(!window.QRious){setTimeout(gen,300);return;}
      try{new window.QRious({element:ref.current,value,size,padding:4,level:'M'});}
      catch(e){console.warn('QRious:',e);}
    };
    gen();
  },[value,size]);
  return <canvas ref={ref} style={{display:'block',borderRadius:4,width:size+'px',height:size+'px'}}/>;
}

function NumPadModal({value,onConfirm,onClose,label,color}){
  const[expr,setExpr]=React.useState(value!=null&&value!==''?String(value):'');
  const c=color||'#185FA5';
  const ops=['+','-','Г—','Г·'];
  function lastIsOp(){return ops.includes(expr.slice(-1));}
  function calcResult(e){
    try{
      const s=e.replace(/Г—/g,'*').replace(/Г·/g,'/');
      const r=Function('"use strict";return ('+s+')')();
      return isFinite(r)?String(Math.round(r*100)/100):'гӮЁгғ©гғј';
    }catch{return 'гӮЁгғ©гғј';}
  }
  function press(v){
    if(v==='C'){setExpr('');}
    else if(v==='вҶҗ'){setExpr(s=>s.slice(0,-1));}
    else if(v==='='){
      if(!expr)return;
      const r=calcResult(expr);
      setExpr(r==='гӮЁгғ©гғј'?'':r);
    }
    else if(ops.includes(v)){
      if(!expr||lastIsOp())return;
      setExpr(s=>s+v);
    }
    else{
      if(expr==='гӮЁгғ©гғј'){setExpr(v);return;}
      setExpr(s=>s+v);
    }
  }
  const display=expr||'0';
  const keys=[
    ['C','вҶҗ','Г·','Г—'],
    ['7','8','9','-'],
    ['4','5','6','+'],
    ['1','2','3','='],
  ];
  function btnStyle(k){
    if(k==='C')return{background:'#FECACA',color:'#B91C1C'};
    if(k==='вҶҗ')return{background:'#E0DED8',color:'#555'};
    if(k==='=')return{background:c,color:'#fff'};
    if(ops.includes(k))return{background:'#FFF3CD',color:'#7B5800'};
    return{background:'#F4F2EC',color:'#111'};
  }
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'#fff',borderRadius:16,overflow:'hidden',width:280,boxShadow:'0 8px 40px rgba(0,0,0,.3)'}}>
        <div style={{background:c,padding:'12px 16px'}}>
          <div style={{fontSize:12,color:'rgba(255,255,255,.8)',marginBottom:2}}>{label||'ж•°еҖӨе…ҘеҠӣ'}</div>
          <div style={{fontSize:28,fontWeight:700,color:'#fff',minHeight:38,letterSpacing:1,wordBreak:'break-all'}}>{display}</div>
        </div>
        <div style={{padding:10,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7}}>
          {keys.map(row=>row.map(k=>(
            <button key={k} onClick={()=>press(k)}
              style={{height:54,borderRadius:10,border:'none',fontSize:18,fontWeight:700,cursor:'pointer',...btnStyle(k)}}>
              {k}
            </button>
          )))}
          <button onClick={()=>press('0')} style={{gridColumn:'span 2',height:54,borderRadius:10,border:'none',fontSize:18,fontWeight:700,background:'#F4F2EC',color:'#111',cursor:'pointer'}}>0</button>
          <button onClick={()=>{press('=');}} style={{height:54,borderRadius:10,border:'none',fontSize:18,fontWeight:700,...btnStyle('=')}}>пјқ</button>
          <button onClick={()=>{
            const val=expr&&expr!=='гӮЁгғ©гғј'?Number(calcResult(expr)):null;
            onConfirm(val!=null&&isFinite(val)?Math.round(val):'');
            onClose();
          }} style={{height:54,borderRadius:10,border:`2px solid ${c}`,background:'#fff',color:c,fontSize:15,fontWeight:700,cursor:'pointer'}}>OK</button>
        </div>
      </div>
    </div>
  );
}

const LangCtx=React.createContext({lang:'ja',setLang:()=>{},fontScale:1,setFontScale:()=>{}});
function useLang(){
  const ctx=React.useContext(LangCtx);
  const t=s=>ctx.lang==='en'?(EN[s]||s):s;
  return{...ctx,t};
}
const FONT_STEPS=[0.8,0.9,1.0,1.1,1.2,1.3];
function LangProvider({children}){
  const[lang,setLangRaw]=useState(()=>{try{return localStorage.getItem('appLang')||'ja';}catch{return'ja';}});
  function setLang(l){setLangRaw(l);try{localStorage.setItem('appLang',l);}catch{}}
  const[fontScale,setFontScaleRaw]=useState(()=>{try{return parseFloat(localStorage.getItem('fontScale'))||1.0;}catch{return 1.0;}});
  function setFontScale(v){setFontScaleRaw(v);try{localStorage.setItem('fontScale',v);}catch{}}
  return<LangCtx.Provider value={{lang,setLang,fontScale,setFontScale}}>{children}</LangCtx.Provider>;
}

function QRScannerModal({expectedValue,label,onSuccess,onClose}){
  const{t}=useLang();
  const inputRef=useRef(null);
  const[scanned,setScanned]=useState('');
  const[feedback,setFeedback]=useState(null);
  const[done,setDone]=useState(false);

  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),150);},[]);

  function check(text){
    const t=text.trim();
    if(!t)return;
    if(t.includes(expectedValue)||expectedValue.includes(t)){
      setFeedback({ok:true,text:'з…§еҗҲжҲҗеҠҹ вң“'});
      setDone(true);
      setTimeout(()=>onSuccess(t),600);
    }else{
      setFeedback({ok:false,text:'дёҚдёҖиҮҙ: "'+t.slice(0,24)+'"'});
      setTimeout(()=>{setFeedback(null);setScanned('');inputRef.current?.focus();},2200);
    }
  }

  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{background:'#fff',borderRadius:24,width:'100%',maxWidth:400,overflow:'hidden'}}>
        <div style={{background:'#0F6E56',padding:'16px 20px'}}>
          <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>QRз…§еҗҲ</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.7)',marginTop:2}}>з…§еҗҲе“Ғз•Ә: {label}</div>
        </div>
        <div style={{padding:'28px 24px 20px',textAlign:'center'}}>
          <div style={{fontSize:56,lineHeight:1,marginBottom:16,color:'#0F6E56'}}>в–Ұ</div>
          <div style={{fontSize:15,fontWeight:600,color:'#111',marginBottom:6}}>гғҸгғігғҮгӮЈгӮ№гӮӯгғЈгғҠгғјгҒ§гӮ№гӮӯгғЈгғігҒ—гҒҰгҒҸгҒ гҒ•гҒ„</div>
          <div style={{fontSize:12,color:'#888',marginBottom:16}}>гӮ№гӮӯгғЈгғігҒҷгӮӢгҒЁиҮӘеӢ•гҒ§з…§еҗҲгҒ•гӮҢгҒҫгҒҷ</div>
          {/* йҡ гҒ—е…ҘеҠӣ - гғҸгғігғҮгӮЈгӮ№гӮӯгғЈгғҠгғје°Ӯз”ЁпјҲд»®жғігӮӯгғјгғңгғјгғүйқһиЎЁзӨәпјү */}
          <input ref={inputRef} value={scanned}
            onChange={e=>setScanned(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&check(scanned)}
            inputMode="none" autoFocus
            style={{position:'fixed',top:-9999,left:-9999,opacity:0,width:1,height:1}}/>
          {/* гӮ№гӮӯгғЈгғізҠ¶ж…ӢиЎЁзӨә */}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,marginBottom:14,width:'100%'}}>
            <div style={{width:'100%',padding:'14px 16px',borderRadius:12,border:`2px solid ${feedback?feedback.ok?'#3B6D11':'#D32F2F':'#CBD3DC'}`,background:scanned?'#F0F7FF':'#F8F7F3',display:'flex',alignItems:'center',gap:10,minHeight:52,boxSizing:'border-box'}}>
              <span style={{fontSize:22}}>{done?'вң…':scanned?'вҢӣ':'рҹ“·'}</span>
              <span style={{flex:1,fontFamily:'monospace',fontSize:15,color:scanned?'#111':'#aaa',letterSpacing:1,wordBreak:'break-all',textAlign:'left'}}>
                {scanned||'гӮ№гӮӯгғЈгғіеҫ…ж©ҹдёӯ...'}
              </span>
              {scanned&&!done&&<span style={{fontSize:11,color:'#185FA5',fontWeight:700,whiteSpace:'nowrap'}}>в–¶ з…§еҗҲдёӯ</span>}
            </div>
            {scanned&&!done&&(
              <button onClick={()=>check(scanned)} style={{width:'100%',minHeight:48,borderRadius:12,border:'none',background:'#0F6E56',color:'#fff',fontSize:15,fontWeight:700}}>з…§еҗҲгҒҷгӮӢ</button>
            )}
          </div>
          {feedback&&(
            <div style={{padding:'14px',borderRadius:12,background:feedback.ok?'#EAF3DE':'#FCEBEB',color:feedback.ok?'#27500A':'#A32D2D',fontSize:16,fontWeight:700}}>
              {feedback.text}
            </div>
          )}
        </div>
        <div style={{padding:'0 24px 24px',display:'flex',gap:10}}>
          <button onClick={onClose} style={{flex:1,minHeight:48,borderRadius:12,border:'1px solid #C0BEB5',background:'#fff',fontSize:14,color:'#555'}}>гӮӯгғЈгғігӮ»гғ«</button>
          <button onClick={()=>onSuccess('QRз„ЎгҒ—')} style={{flex:1,minHeight:48,borderRadius:12,border:'2px solid #888',background:'#F1EFE8',fontSize:14,fontWeight:700,color:'#444'}}>QRз„ЎгҒ—</button>
        </div>
      </div>
    </div>
  );
}

  {key:'finishedBoxes',label:'е®ҢжҲҗе“Ғз®ұж•°',unit:'з®ұ'},
];

function mergeTimeline(aItems,bItems){
  const rows=[];
  let ai=0,bi=0;
  while(ai<aItems.length||bi<bItems.length){
    const a=aItems[ai],b=bItems[bi];
    if(!b){rows.push({a,b:null});ai++;}
    else if(!a){rows.push({a:null,b});bi++;}
    else if(a.kakeTime===b.kakeTime){rows.push({a,b});ai++;bi++;}
    else if(a.kakeTime<b.kakeTime){rows.push({a,b:null});ai++;}
    else{rows.push({a:null,b});bi++;}
  }
  return rows;
}

        </div>
      )}
    </div>
  );
}

function HangerScreen({plans,master,anomalyTypes,onComplete,onBack}){
  const acol='#185FA5',bcol='#534AB7';
  const role='гғҸгғігӮ¬гғјж®өеҸ–гӮҠ';
  const[lang,setLang]=useState('ja');
  const HID={
    'вҶҗ жҲ»гӮӢ':'вҶҗ Kembali','гғҸгғігӮ¬гғјж®өеҸ–гӮҠ':'Persiapan Hanger','йҖІжҚ—':'Progres','д»¶':'item',
    'з•°еёё':'Kelainan','A гғ©гӮӨгғі':'Jalur A','B гғ©гӮӨгғі':'Jalur B',
    'жҺӣгҒ‘жҷӮй–“':'Waktu Pasang','жүҖиҰҒжҷӮй–“':'Waktu Proses','иғҢз•ӘеҸ·':'No. Seri',
    'гғҸгғігӮ¬гғјеҗҚз§°':'Nama Hanger','жң¬ж•°':'Jumlah','иЁӯе®ҡйӣ»ең§':'Volt Set',
    'з©әгғ•гғғгӮҜ':'Kait Kosong','йҖЈз¶ҡжң¬ж•°':'Beruntun','йӣ»ең§зўәиӘҚ':'Cek Volt','ж“ҚдҪң':'Operasi',
    'йӣ»ең§еҲҮжӣҝ':'Ganti Volt','вң“е®ҢдәҶ':'вң“Selesai','зўәиӘҚ':'Konfirmasi','е®ҢдәҶ':'Selesai',
    'еҫ…ж©ҹдёӯвҖҰ':'TungguвҖҰ','е®ҢдәҶеҫҢ':'Setelah selesai',
    'иЁҲз”»гҒҢзҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“':'Tidak ada rencana yang terdaftar',
    'гғҸгғігӮ¬гғјзўәиӘҚ':'Konfirmasi Hanger','иғҢз•ӘеҸ·:':'No. Seri:',
    'гғҸгғігӮ¬гғјз”»еғҸжңӘзҷ»йҢІ':'Gambar hanger belum terdaftar',
    'гӮӯгғЈгғігӮ»гғ«':'Batal','е®ҢдәҶгҒ«гҒ—гҒҫгҒҷгҒӢпјҹ':'Konfirmasi selesai?',
    'йӣ»ең§еӨүжӣҙгҒ®зўәиӘҚ':'Konfirmasi Ganti Volt',
    'иЁӯе®ҡйӣ»ең§:':'Volt Set:','гҒёгҒ®еӨүжӣҙгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ':'harap konfirmasi perubahan ke voltase ini.',
    'еҫҢгҒ§':'Nanti','вң“ зўәиӘҚжёҲгҒҝ':'вң“ Dikonfirmasi',
    'жң¬':'btg','еҖӢ':'pcs',
    'йӣ»ең§еӨүжӣҙжІ»е…·зўәиӘҚ':'Konfirmasi Jig Volt','жІ»е…·':'Jig','з•Ә':'No.','вң“жІ»е…·зўәиӘҚжёҲ':'вң“Jig OK',
    'жІ»е…·зўәиӘҚеҫҢгҒ«е®ҢдәҶгҒ§гҒҚгҒҫгҒҷ':'Bisa Selesai setelah Cek Jig',
    'еҸ–ж¶Ҳ':'Batalkan','е®ҢдәҶгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ':'Batalkan penyelesaian ini?',
  };
  const t=k=>lang==='id'?(HID[k]??k):k;
  const[saving,setSaving]=useState({});
  const[vChecking,setVChecking]=useState({});
  const[confirmItem,setConfirmItem]=useState(null);
  const[completeItem,setCompleteItem]=useState(null);
  const[showAnomaly,setShowAnomaly]=useState(false);
  const[tick,setTick]=useState(0);
  const[dismissedAlerts,setDismissedAlerts]=useState(()=>{
    try{const s=sessionStorage.getItem('vcDismissed');return s?new Set(JSON.parse(s)):new Set();}catch{return new Set();}
  });
  const firstIncompleteRef=useRef(null);
  const scrollRef=useRef(null);

  const itemsA=plans.filter(p=>p.line==='A').sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const itemsB=plans.filter(p=>p.line==='B').sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const rows=mergeTimeline(itemsA,itemsB);
  const totalDone=plans.filter(p=>p.completions?.[role]?.done).length;
  const pct=plans.length?Math.round(totalDone/plans.length*100):0;

  function addMin(t,m){if(!t)return null;const[h,mi]=t.split(':').map(Number);const tot=h*60+mi+m;return`${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;}

  // йӣ»ең§гҒҢеӨүгӮҸгҒЈгҒҹиЎҢгӮ’зү№е®ҡпјҲгғ©гӮӨгғіеҶ…гҒ®еүҚиЎҢгҒЁжҜ”ијғгғ»и©ҰдҪңе“ҒгҒҜйҷӨеӨ–пјү
  const voltageChangeIds=useMemo(()=>{
    const ids=new Set();
    for(const lineItems of[itemsA,itemsB]){
      for(let i=1;i<lineItems.length;i++){
        const currName=master[lineItems[i].seiban]?.hangerName??lineItems[i].hangerName??'';
        if(currName.includes('и©ҰдҪң'))continue; // и©ҰдҪңе“ҒгҒҜйӣ»ең§еӨүжӣҙзўәиӘҚдёҚиҰҒ
        const prevV=String(master[lineItems[i-1].seiban]?.voltage??lineItems[i-1].voltage??'');
        const currV=String(master[lineItems[i].seiban]?.voltage??lineItems[i].voltage??'');
        if(prevV&&currV&&prevV!==currV)ids.add(lineItems[i].id);
      }
    }
    return ids;
  },[plans,master]);

  const ALERT_MS=23*60*1000;

  // йӣ»ең§еӨүжӣҙиЎҢгҒ®жҺӣгҒ‘жҷӮй–“гҒӢгӮү23еҲҶеҫҢгҒ«гӮўгғ©гғјгғҲпјҲйӣ»жіўжҷӮиЁҲеҹәжә–пјү
  const voltageAlert=useMemo(()=>{
    const now=Date.now();
    for(const item of plans){
      if(!voltageChangeIds.has(item.id))continue;
      if(item.voltageCheck?.done)continue;
      if(dismissedAlerts.has(item.id))continue;
      const kakeTime=item.kakeTime;
      if(!kakeTime)continue;
      const[h,m]=kakeTime.split(':').map(Number);
      const kakeDate=new Date();kakeDate.setHours(h,m,0,0);
      if(now>=kakeDate.getTime()+ALERT_MS)return{item};
    }
    return null;
  },[plans,voltageChangeIds,tick,dismissedAlerts]);

  useEffect(()=>{
    const id=setInterval(()=>setTick(t=>t+1),30000);
    return()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    if(firstIncompleteRef.current&&scrollRef.current){
      const c=scrollRef.current,r=firstIncompleteRef.current;
      c.scrollTop=Math.max(0,r.offsetTop-c.offsetTop-8);
    }
  },[]);

  async function handleComplete(item){
    if(saving[item.id])return;
    setSaving(s=>({...s,[item.id]:true}));
    try{await onComplete(item.id,role,'');}
    catch(e){alert('дҝқеӯҳгҒ«еӨұж•—: '+e.message);}
    finally{setSaving(s=>({...s,[item.id]:false}));}
  }

  async function handleUndo(item){
    if(!window.confirm(`${t('е®ҢдәҶгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ')}\n${t('иғҢз•ӘеҸ·:')} ${item.seiban}`))return;
    try{
      await db.collection('plans').doc(item.id).update({
        [`completions.${role}`]:firebase.firestore.FieldValue.delete(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){alert('еҸ–ж¶ҲгҒ«еӨұж•—: '+e.message);}
  }

  async function handleVoltageConfirm(item){
    if(vChecking[item.id])return;
    setVChecking(s=>({...s,[item.id]:true}));
    try{
      const now=new Date().toTimeString().slice(0,5);
      await db.collection('plans').doc(item.id).update({voltageCheck:{done:true,time:now},updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(e){alert('дҝқеӯҳгҒ«еӨұж•—: '+e.message);}
    finally{setVChecking(s=>({...s,[item.id]:false}));}
  }

  const[jigChecking,setJigChecking]=useState({});
  async function handleJigConfirm(item){
    if(jigChecking[item.id])return;
    setJigChecking(s=>({...s,[item.id]:true}));
    try{
      const now=new Date().toTimeString().slice(0,5);
      await db.collection('plans').doc(item.id).update({jigCheck:{done:true,time:now},updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(e){alert('дҝқеӯҳгҒ«еӨұж•—: '+e.message);}
    finally{setJigChecking(s=>({...s,[item.id]:false}));}
  }

  // йӣ»ең§гҒӢгӮүжІ»е…·з•ӘеҸ·гӮ’иҝ”гҒҷпјҲ330VвҶ’1з•Ә, 250VвҶ’2з•Ә, 210VвҶ’3з•Әпјү
  function jigNum(v){
    const n=parseInt(v)||0;
    if(n>=300)return lang==='id'?'Jig No.1':'жІ»е…·1з•Ә';
    if(n>=240)return lang==='id'?'Jig No.2':'жІ»е…·2з•Ә';
    return lang==='id'?'Jig No.3':'жІ»е…·3з•Ә';
  }

  function voltageColor(v){const n=parseInt(v);if(n>=330)return'#D32F2F';if(n>=250)return'#185FA5';return'#222';}

  function cellVal(col,item){
    const v=col.ms?(master[item.seiban]?.[col.key]??item[col.key]):item[col.key];
    if(v==null||v==='')return'вҖ”';
    return col.unit?v+t(col.unit):v;
  }

  const HCOLS=[
    {key:'kakeTime',label:'жҺӣгҒ‘жҷӮй–“'},{key:'reqTime',label:'жүҖиҰҒжҷӮй–“'},{key:'seiban',label:'иғҢз•ӘеҸ·'},
    {key:'hangerName',label:'гғҸгғігӮ¬гғјеҗҚз§°',ms:true},{key:'hangers',label:'жң¬ж•°',ms:true,unit:'жң¬'},
    {key:'voltage',label:'иЁӯе®ҡйӣ»ең§',ms:true,unit:'V'},{key:'emptyHooks',label:'з©әгғ•гғғгӮҜ',ms:true,unit:'еҖӢ'},
    {key:'continuous',label:'йҖЈз¶ҡжң¬ж•°',ms:true,unit:'жң¬'},
  ];
  const colCount=HCOLS.length+3;
  const TH={padding:'3px 4px',fontSize:11,fontWeight:700,color:'#fff',whiteSpace:'normal',wordBreak:'break-all',lineHeight:1.3,textAlign:'center',borderRight:'1px solid rgba(255,255,255,.25)'};

  function renderSide(item,lc,lb){
    if(!item)return[
      ...HCOLS.flatMap(c=>{
        const base=<td key={c.key} style={{padding:'2px 3px',borderRight:'1px solid #E8E6E0',background:'#F8F8F8'}}/>;
        if(c.key==='voltage')return[base,<td key="jc-e" style={{padding:'2px 3px',borderRight:'1px solid #E8E6E0',background:'#F8F8F8'}}/>];
        return[base];
      }),
      <td key="vc" style={{padding:'2px 3px',borderRight:'1px solid #E8E6E0',background:'#F8F8F8'}}/>,
      <td key="op" style={{padding:'2px 3px',background:'#F8F8F8'}}/>,
    ];
    const isDone=item.completions?.[role]?.done;
    const isSaving=saving[item.id];
    const needsVC=voltageChangeIds.has(item.id);
    const isVChecked=item.voltageCheck?.done;
    const isJChecked=item.jigCheck?.done;
    const img=master[item.seiban]?.hangerImageUrl||master[item.seiban]?.imageUrl;
    const bg=isDone?'#F4FAF0':'inherit';
    const op=isDone?0.6:1;
    return[
      ...HCOLS.flatMap(c=>{
        const disp=cellVal(c,item);
        const isVolt=c.key==='voltage';
        const isSei=c.key==='seiban';
        const rawV=master[item.seiban]?.[c.key]??item[c.key];
        const color=isVolt?voltageColor(rawV):isSei?lc:'#222';
        const mainCell=<td key={c.key} style={{padding:'2px 3px',fontSize:isSei?13:11,fontWeight:isSei||isVolt?700:400,color,textAlign:'center',verticalAlign:'middle',borderRight:'1px solid #E8E6E0',whiteSpace:'nowrap',wordBreak:'break-all',background:bg,opacity:op}}>{disp}</td>;
        if(isVolt){
          const jLabel=jigNum(rawV);
          const jigCell=<td key="jc" style={{padding:'2px 3px',textAlign:'center',verticalAlign:'middle',borderRight:'1px solid #E8E6E0',background:bg,opacity:op}}>
            {needsVC?(
              isJChecked
                ?<div style={{fontSize:10,fontWeight:700,color:'#3B6D11'}}>вң“{jLabel}<br/>{item.jigCheck.time}</div>
                :<button onClick={()=>handleJigConfirm(item)} disabled={jigChecking[item.id]}
                    style={{padding:'3px 4px',background:jigChecking[item.id]?'#B4B2A9':'#FFF8E1',color:'#7B5800',border:'1.5px solid #F9A825',borderRadius:5,fontSize:10,fontWeight:700,whiteSpace:'normal',wordBreak:'keep-all',lineHeight:1.3,cursor:'pointer',width:'100%'}}>
                    {jLabel}<br/>{t('вң“жІ»е…·зўәиӘҚжёҲ')}
                  </button>
            ):<span style={{color:'#ddd',fontSize:10}}>вҖ”</span>}
          </td>;
          return[mainCell,jigCell];
        }
        return[mainCell];
      }),
      <td key="vc" style={{padding:'2px 3px',textAlign:'center',verticalAlign:'middle',borderRight:'1px solid #E8E6E0',background:bg,opacity:op}}>
        {needsVC?(
          isVChecked
            ?<div style={{fontSize:10,fontWeight:700,color:'#3B6D11'}}>вң“{item.voltageCheck.time}</div>
            :isDone
              ?<div style={{fontSize:10,color:'#E65100',fontWeight:600}}>{t('еҫ…ж©ҹдёӯвҖҰ')}</div>
              :<div style={{fontSize:10,color:'#aaa'}}>{t('е®ҢдәҶеҫҢ')}</div>
        ):<span style={{color:'#ddd',fontSize:10}}>вҖ”</span>}
      </td>,
      <td key="op" style={{padding:'2px 3px',textAlign:'center',verticalAlign:'middle',background:bg,opacity:op}}>
        {isDone?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
            <span style={{fontSize:11,fontWeight:700,color:'#3B6D11'}}>{t('вң“е®ҢдәҶ')}</span>
            <button onClick={()=>handleUndo(item)} style={{fontSize:9,color:'#999',background:'none',border:'none',padding:0,cursor:'pointer',textDecoration:'underline'}}>{t('еҸ–ж¶Ҳ')}</button>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:3}}>
            <button onClick={()=>setConfirmItem({item,img,lc,lb})}
              style={{padding:'3px 4px',background:lb,color:lc,border:`1.5px solid ${lc}`,borderRadius:5,fontSize:11,fontWeight:700,whiteSpace:'nowrap',minWidth:44}}>{t('зўәиӘҚ')}</button>
            <button onClick={()=>setCompleteItem({item,lc})} disabled={isSaving||(needsVC&&!isJChecked)}
              title={needsVC&&!isJChecked?t('жІ»е…·зўәиӘҚеҫҢгҒ«е®ҢдәҶгҒ§гҒҚгҒҫгҒҷ'):''}
              style={{padding:'3px 4px',background:(isSaving||(needsVC&&!isJChecked))?'#B4B2A9':lc,color:'#fff',border:'none',borderRadius:5,fontSize:11,fontWeight:700,whiteSpace:'nowrap',minWidth:44,cursor:(needsVC&&!isJChecked)?'not-allowed':'pointer'}}>{isSaving?'..':t('е®ҢдәҶ')}</button>
          </div>
        )}
      </td>,
    ];
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#F1EFE8',overflow:'hidden'}}>
      <div style={{background:'#fff',borderBottom:'1px solid #E0DED8',padding:'8px 16px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button className="btn-ghost" onClick={onBack} style={{minHeight:40,minWidth:56,fontSize:13}}>{t('вҶҗ жҲ»гӮӢ')}</button>
        <span style={{fontSize:17,fontWeight:700,color:'#111',flex:1}}>{t('гғҸгғігӮ¬гғјж®өеҸ–гӮҠ')}</span>
        {voltageChangeIds.size>0&&(
          <div style={{fontSize:12,color:'#E65100',fontWeight:700,background:'#FFF3E0',padding:'4px 10px',borderRadius:8,border:'1px solid #E65100',flexShrink:0}}>
            вҡЎ {t('йӣ»ең§еҲҮжӣҝ')} {voltageChangeIds.size}{t('д»¶')}
          </div>
        )}
        <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#888'}}>
          <span>{t('йҖІжҚ—')}</span>
          <div style={{width:100,height:8,background:'#E0DED8',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',background:acol,width:pct+'%',transition:'width .5s'}}/>
          </div>
          <span style={{fontWeight:600,color:'#111'}}>{totalDone}/{plans.length}{t('д»¶')}</span>
        </div>
        <FontSizeCtrl/>
        <button onClick={()=>setLang(l=>l==='ja'?'id':'ja')} style={{minHeight:40,padding:'0 14px',borderRadius:10,border:'2px solid #4A90D9',background:lang==='id'?'#4A90D9':'#EBF3FC',color:lang==='id'?'#fff':'#1A5FA0',fontSize:13,fontWeight:700}}>
          {lang==='ja'?'ID':'JP'}
        </button>
        <button onClick={()=>setShowAnomaly(true)} style={{minHeight:40,padding:'0 14px',borderRadius:10,border:'2px solid #E24B4A',background:'#FCEBEB',color:'#A32D2D',fontSize:13,fontWeight:700}}>{t('з•°еёё')}</button>
      </div>
      <div ref={scrollRef} style={{flex:1,overflow:'auto',padding:'8px'}}>
        {rows.length===0?(
          <div style={{textAlign:'center',padding:'64px 0',color:'#aaa'}}>{t('иЁҲз”»гҒҢзҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“')}</div>
        ):(
          <div style={{borderRadius:12,border:'1px solid #E0DED8',background:'#fff',width:'fit-content',minWidth:'100%'}}>
            <table style={{borderCollapse:'collapse',minWidth:'100%'}}>
              <thead style={{position:'sticky',top:0,zIndex:10}}>
                <tr>
                  <th colSpan={colCount} style={{...TH,background:acol,textAlign:'center',fontSize:13,padding:'5px 8px',borderRadius:'12px 0 0 0'}}>{t('A гғ©гӮӨгғі')}</th>
                  <th style={{width:3,background:'#E0DED8',padding:0}}/>
                  <th colSpan={colCount} style={{...TH,background:bcol,textAlign:'center',fontSize:13,padding:'5px 8px',borderRadius:'0 12px 0 0'}}>{t('B гғ©гӮӨгғі')}</th>
                </tr>
                <tr>
                  {HCOLS.flatMap(c=>{
                    const th=<th key={'a-'+c.key} style={{...TH,background:acol+'EE'}}>{t(c.label)}</th>;
                    if(c.key==='voltage')return[th,<th key="a-jc" style={{...TH,background:acol+'EE'}}>{t('йӣ»ең§еӨүжӣҙжІ»е…·зўәиӘҚ')}</th>];
                    return[th];
                  })}
                  <th style={{...TH,background:acol+'EE'}}>{t('йӣ»ең§зўәиӘҚ')}</th>
                  <th style={{...TH,background:acol+'EE'}}>{t('ж“ҚдҪң')}</th>
                  <th style={{width:3,background:'#E0DED8',padding:0}}/>
                  {HCOLS.flatMap(c=>{
                    const th=<th key={'b-'+c.key} style={{...TH,background:bcol+'EE'}}>{t(c.label)}</th>;
                    if(c.key==='voltage')return[th,<th key="b-jc" style={{...TH,background:bcol+'EE'}}>{t('йӣ»ең§еӨүжӣҙжІ»е…·зўәиӘҚ')}</th>];
                    return[th];
                  })}
                  <th style={{...TH,background:bcol+'EE'}}>{t('йӣ»ең§зўәиӘҚ')}</th>
                  <th style={{...TH,background:bcol+'EE'}}>{t('ж“ҚдҪң')}</th>
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  let foundFirst=false;
                  return rows.map((row,idx)=>{
                    const aInc=row.a&&!row.a.completions?.[role]?.done;
                    const bInc=row.b&&!row.b.completions?.[role]?.done;
                    const isFirst=!foundFirst&&(aInc||bInc);
                    if(isFirst)foundFirst=true;
                    return(
                      <tr key={idx} ref={isFirst?firstIncompleteRef:null} style={{borderBottom:'1px solid #EEECE6',background:idx%2===0?'#fff':'#FAFAF8'}}>
                        {renderSide(row.a,acol,'#E6F1FB')}
                        <td style={{width:3,background:'#E0DED8',padding:0}}/>
                        {renderSide(row.b,bcol,'#EEEDFE')}
                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* зўәиӘҚгғўгғјгғҖгғ«пјҲгғҸгғігӮ¬гғјеҶҷзңҹпјү */}
      {confirmItem&&(
        <div onClick={e=>e.target===e.currentTarget&&setConfirmItem(null)}
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:480,overflow:'hidden',boxShadow:'0 8px 40px rgba(0,0,0,.3)'}}>
            <div style={{background:confirmItem.lc,padding:'16px 20px'}}>
              <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>{t('гғҸгғігӮ¬гғјзўәиӘҚ')}</div>
              <div style={{fontSize:13,color:'rgba(255,255,255,.8)',marginTop:2}}>{t('иғҢз•ӘеҸ·:')} {confirmItem.item.seiban}</div>
            </div>
            <div style={{padding:20}}>
              {confirmItem.img
                ?<img src={confirmItem.img} style={{width:'100%',maxHeight:280,objectFit:'contain',borderRadius:10,border:'1px solid #E0DED8',marginBottom:16}}/>
                :<div style={{height:140,display:'flex',alignItems:'center',justifyContent:'center',background:'#F8F7F4',borderRadius:10,border:'1px dashed #D0CEC8',marginBottom:16}}><span style={{color:'#bbb',fontSize:14}}>{t('гғҸгғігӮ¬гғјз”»еғҸжңӘзҷ»йҢІ')}</span></div>
              }
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px',marginBottom:20,padding:'12px 14px',background:'#F8F7F4',borderRadius:10}}>
                {[
                  [t('гғҸгғігӮ¬гғјеҗҚз§°'),master[confirmItem.item.seiban]?.hangerName||confirmItem.item.hangerName||'вҖ”'],
                  [t('жң¬ж•°'),(master[confirmItem.item.seiban]?.hangers||confirmItem.item.hangers||'')?((master[confirmItem.item.seiban]?.hangers||confirmItem.item.hangers)+t('жң¬')):'вҖ”'],
                  [t('иЁӯе®ҡйӣ»ең§'),(master[confirmItem.item.seiban]?.voltage||confirmItem.item.voltage||'')?((master[confirmItem.item.seiban]?.voltage||confirmItem.item.voltage)+'V'):'вҖ”'],
                  [t('з©әгғ•гғғгӮҜ'),(master[confirmItem.item.seiban]?.emptyHooks||confirmItem.item.emptyHooks||'')?((master[confirmItem.item.seiban]?.emptyHooks||confirmItem.item.emptyHooks)+t('еҖӢ')):'вҖ”'],
                ].map(([l,v])=>(
                  <div key={l}><div style={{fontSize:11,color:'#999',marginBottom:2}}>{l}</div><div style={{fontSize:16,fontWeight:600,color:'#111'}}>{v}</div></div>
                ))}
              </div>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>setConfirmItem(null)} style={{flex:1,padding:'14px',background:'#fff',border:'1.5px solid #C0BEB5',borderRadius:12,fontSize:15,fontWeight:700,color:'#555'}}>{t('гӮӯгғЈгғігӮ»гғ«')}</button>
                <button onClick={()=>setConfirmItem(null)} style={{flex:2,padding:'14px',background:confirmItem.lc,border:'none',borderRadius:12,fontSize:15,fontWeight:700,color:'#fff'}}>OK</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* йӣ»ең§еӨүжӣҙзўәиӘҚгғқгғғгғ—гӮўгғғгғ—пјҲе®ҢдәҶгҒӢгӮү23еҲҶеҫҢпјү */}
      {voltageAlert&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:24,width:'100%',maxWidth:420,padding:'32px 28px',textAlign:'center',boxShadow:'0 12px 60px rgba(0,0,0,.4)'}}>
            <div style={{fontSize:56,marginBottom:12}}>вҡ пёҸ</div>
            <div style={{fontSize:22,fontWeight:700,color:'#D32F2F',marginBottom:10}}>{t('йӣ»ең§еӨүжӣҙгҒ®зўәиӘҚ')}</div>
            <div style={{fontSize:15,color:'#444',lineHeight:1.7,marginBottom:8}}>
              {t('иғҢз•ӘеҸ·:')} <strong style={{color:'#111'}}>{voltageAlert.item.seiban}</strong>
            </div>
            <div style={{fontSize:14,color:'#666',marginBottom:28}}>
              {t('иЁӯе®ҡйӣ»ең§:')} <strong style={{color:voltageColor(master[voltageAlert.item.seiban]?.voltage??voltageAlert.item.voltage),fontSize:18}}>
                {master[voltageAlert.item.seiban]?.voltage??voltageAlert.item.voltage??'вҖ”'}V
              </strong>гҖҖ{t('гҒёгҒ®еӨүжӣҙгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ')}
            </div>
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>{const s=new Set([...dismissedAlerts,voltageAlert.item.id]);setDismissedAlerts(s);try{sessionStorage.setItem('vcDismissed',JSON.stringify([...s]));}catch{}}}
                style={{flex:1,padding:'14px',background:'#fff',border:'1.5px solid #C0BEB5',borderRadius:12,fontSize:14,fontWeight:700,color:'#555'}}>{t('еҫҢгҒ§')}</button>
              <button disabled={vChecking[voltageAlert.item.id]}
                onClick={async()=>{
                  await handleVoltageConfirm(voltageAlert.item);
                  const s=new Set([...dismissedAlerts,voltageAlert.item.id]);
                  setDismissedAlerts(s);
                  try{sessionStorage.setItem('vcDismissed',JSON.stringify([...s]));}catch{}
                }}
                style={{flex:2,padding:'14px',background:'#D32F2F',border:'none',borderRadius:12,fontSize:15,fontWeight:700,color:'#fff'}}>
                {vChecking[voltageAlert.item.id]?'..':t('вң“ зўәиӘҚжёҲгҒҝ')}
              </button>
            </div>
          </div>
        </div>
      )}

      {showAnomaly&&<AnomalyModal seiban={''} role={role} line={null} types={anomalyTypes} onClose={()=>setShowAnomaly(false)} onDone={()=>setShowAnomaly(false)}/>}
      {completeItem&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:360,padding:'28px 24px',textAlign:'center',boxShadow:'0 8px 40px rgba(0,0,0,.35)'}}>
            <div style={{fontSize:36,marginBottom:12}}>вң…</div>
            <div style={{fontSize:18,fontWeight:700,color:'#111',marginBottom:6}}>{t('е®ҢдәҶгҒ«гҒ—гҒҫгҒҷгҒӢпјҹ')}</div>
            <div style={{fontSize:14,color:'#666',marginBottom:24}}>{t('иғҢз•ӘеҸ·:')} <strong>{completeItem.item.seiban}</strong></div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setCompleteItem(null)} style={{flex:1,padding:'14px',background:'#fff',border:'1.5px solid #C0BEB5',borderRadius:12,fontSize:15,fontWeight:700,color:'#555'}}>{t('гӮӯгғЈгғігӮ»гғ«')}</button>
              <button onClick={async()=>{const it=completeItem.item;setCompleteItem(null);await handleComplete(it);}} style={{flex:2,padding:'14px',background:completeItem.lc,border:'none',borderRadius:12,fontSize:15,fontWeight:700,color:'#fff'}}>{t('е®ҢдәҶ')}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DantoriScreen({plans,master,anomalyTypes,onComplete,onBack,line}){
  const role=line==='A'?'ж®өеҸ–гӮҠA':'ж®өеҸ–гӮҠB';
  const lc='#185FA5',lb='#E6F1FB';
  const{lang,setLang}=useLang();
  const DID={
    'вҶҗ жҲ»гӮӢ':'вҶҗ Kembali','иЈҪе“Ғж®өеҸ–гӮҠ':'Persiapan Produk','гғ©гӮӨгғі':'Jalur',
    'йҖІжҚ—':'Progres','д»¶':'item','з•°еёё':'Kelainan',
    'жҺӣгҒ‘жҷӮй–“':'Waktu Pasang','жүҖиҰҒжҷӮй–“':'Waktu Proses','иғҢз•ӘеҸ·':'No. Seri',
    'зҙ жқҗз®ұж•°':'Kotak Bahan','QRз…§еҗҲ':'Cek QR','1еҖӢзўәиӘҚ':'Cek 1 pcs','ж“ҚдҪң':'Operasi',
    'вң“е®ҢдәҶ':'вң“Selesai','зўәиӘҚ':'Konfirmasi','е®ҢдәҶ':'Selesai',
    'иЁҲз”»гҒҢзҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“':'Tidak ada rencana yang terdaftar',
    'иЈҪе“ҒеҶҷзңҹ':'Foto Produk','QRгӮ№гӮӯгғЈгғі':'Scan QR',
    'QRгӮігғјгғүгӮ’гӮ№гӮӯгғЈгғіпјҲгғҸгғігғҮгӮЈгӮ№гӮӯгғЈгғҠгғјгҒ§иӘӯгҒҝеҸ–гӮҠпјү':'Scan QR code (gunakan scanner)',
    'гӮ№гӮӯгғЈгғіеҫ…ж©ҹдёӯ...':'Menunggu scan...',
    'з…§еҗҲOK вҖ” QRз…§еҗҲгғҒгӮ§гғғгӮҜе®ҢдәҶ':'Cek OK вҖ” QR sesuai','з…§еҗҲNG вҖ” еҶҚгӮ№гӮӯгғЈгғігҒ—гҒҰгҒҸгҒ гҒ•гҒ„':'Cek NG вҖ” Harap scan ulang',
    'вң” QRз…§еҗҲжёҲ':'вң” QR OK','вң” 1еҖӢзўәиӘҚжёҲ':'вң” 1 pcs OK','рҹ”Қ 1еҖӢзўәиӘҚгҒҷгӮӢ вҶ’':'рҹ”Қ Cek 1 pcs вҶ’',
    'QR Skip':'QR Skip','QRгӮ’гӮ№гӮӯгғғгғ—гҒ—гҒҫгҒ—гҒҹ':'QR di-skip','гӮ№гӮӯгғғгғ—':'Skip',
    'е·ҰгҒ®гҖҢзўәиӘҚгҖҚгғңгӮҝгғігӮ’жҠјгҒ—гҒҰгҒҸгҒ гҒ•гҒ„':'Tekan tombol "Konfirmasi" di kiri',
    'иЈҪе“ҒеҶҷзңҹжңӘзҷ»йҢІ':'Foto produk belum terdaftar','еҶҷзңҹжңӘзҷ»йҢІ':'Foto belum terdaftar',
    '1еҖӢзўәиӘҚ':'Cek 1 pcs','гӮӯгғЈгғігӮ»гғ«':'Batal','зўәиӘҚжёҲгҒҝ':'Sudah dikonfirmasi',
    'дҝқеӯҳдёӯ...':'Menyimpan...','гҒ®\nиЈҪе“ҒгӮ’1еҖӢе®ҹзү©зўәиӘҚгҒ—гҒҫгҒ—гҒҹгҒӢпјҹ':'apakah sudah dicek 1 pcs?',
    'зҙ жқҗз®ұж•°пјҡ':'Kotak Bahan:','з®ұ':'kotak',
    'еҸ–ж¶Ҳ':'Batalkan','е®ҢдәҶгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ':'Batalkan penyelesaian ini?',
    'QRз…§еҗҲгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ':'Batalkan cek QR ini?','1еҖӢзўәиӘҚгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ':'Batalkan cek 1 pcs ini?',
    'иғҢз•ӘеҸ·:':'No. Seri:',
  };
  const dt=s=>lang==='id'?(DID[s]??s):s;
  const[saving,setSaving]=useState({});
  const[qrSaving,setQrSaving]=useState({});
  const[qrSkipSaving,setQrSkipSaving]=useState({});
  const[sampleSaving,setSampleSaving]=useState({});
  const[selectedItem,setSelectedItem]=useState(null);
  const[qrInput,setQrInput]=useState('');
  const[qrResult,setQrResult]=useState(null); // null|'ok'|'ng'
  const[showSampleConfirm,setShowSampleConfirm]=useState(false);
  const[showAnomaly,setShowAnomaly]=useState(false);
  const scrollRef=useRef(null);
  const qrRef=useRef(null);
  const firstIncompleteRef=useRef(null);

  const items=plans.filter(p=>p.line===line).sort((a,b)=>a.kakeTime.localeCompare(b.kakeTime));
  const totalDone=items.filter(p=>p.completions?.[role]?.done).length;
  const pct=items.length?Math.round(totalDone/items.length*100):0;
  const currentSelected=selectedItem?items.find(i=>i.id===selectedItem.id):null;

  useEffect(()=>{if(selectedItem&&qrRef.current)setTimeout(()=>qrRef.current?.focus(),100);},[selectedItem?.id]);
  useEffect(()=>{
    const keepFocus=()=>{if(selectedItem&&qrRef.current&&!showSampleConfirm&&!showAnomaly)setTimeout(()=>qrRef.current?.focus(),50);};
    document.addEventListener('click',keepFocus);
    return()=>document.removeEventListener('click',keepFocus);
  },[selectedItem,showSampleConfirm,showAnomaly]);
  useEffect(()=>{
    if(firstIncompleteRef.current&&scrollRef.current){
      const c=scrollRef.current,r=firstIncompleteRef.current;
      c.scrollTop=Math.max(0,r.offsetTop-c.offsetTop-8);
    }
  },[]);

  function validateQR(value){
    if(!selectedItem)return false;
    const m=master[selectedItem.seiban];
    const target=m?.qrText||selectedItem.seiban;
    return value.includes(target);
  }

  async function handleQRScan(e){
    if(e.key!=='Enter')return;
    const value=qrInput.trim();
    if(!value||!selectedItem)return;
    const ok=validateQR(value);
    setQrResult(ok?'ok':'ng');
    setQrInput('');
    if(!ok)return;
    setQrSaving(s=>({...s,[selectedItem.id]:true}));
    try{
      const now=new Date().toTimeString().slice(0,5);
      await db.collection('plans').doc(selectedItem.id).update({
        [`qrCheck_${line}`]:{done:true,time:now},
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      setTimeout(()=>setShowSampleConfirm(true),400);
    }catch(e){alert('дҝқеӯҳгҒ«еӨұж•—: '+e.message);}
    finally{setQrSaving(s=>({...s,[selectedItem.id]:false}));}
  }

  async function handleQRSkip(){
    if(!selectedItem||qrSkipSaving[selectedItem.id])return;
    setQrSkipSaving(s=>({...s,[selectedItem.id]:true}));
    try{
      const now=new Date().toTimeString().slice(0,5);
      await db.collection('plans').doc(selectedItem.id).update({
        [`qrCheck_${line}`]:{done:true,skipped:true,time:now},
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      setTimeout(()=>setShowSampleConfirm(true),300);
    }catch(e){alert('дҝқеӯҳгҒ«еӨұж•—: '+e.message);}
    finally{setQrSkipSaving(s=>({...s,[selectedItem.id]:false}));}
  }

  async function handleSampleConfirm(){
    if(!currentSelected)return;
    const doneId=currentSelected.id;
    setSampleSaving(s=>({...s,[doneId]:true}));
    try{
      const now=new Date().toTimeString().slice(0,5);
      await db.collection('plans').doc(doneId).update({
        [`sampleCheck_${line}`]:{done:true,time:now},
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      setShowSampleConfirm(false);
      setQrInput('');
      setQrResult(null);
      // QRпјҶ1еҖӢзўәиӘҚгҒҢгҒҫгҒ жёҲгӮ“гҒ§гҒ„гҒӘгҒ„ж¬ЎгҒ®гӮўгӮӨгғҶгғ гҒёиҮӘеӢ•з§»еӢ•
      const currentIdx=items.findIndex(i=>i.id===doneId);
      const candidates=items.filter(i=>
        i.id!==doneId&&
        !i.completions?.[role]?.done&&
        !(i[`qrCheck_${line}`]?.done&&i[`sampleCheck_${line}`]?.done)
      );
      const nextItem=candidates.find(i=>items.indexOf(i)>currentIdx)||candidates[0]||null;
      setTimeout(()=>setSelectedItem(nextItem),300);
    }catch(e){alert('дҝқеӯҳгҒ«еӨұж•—: '+e.message);}
    finally{setSampleSaving(s=>({...s,[doneId]:false}));}
  }

  async function handleComplete(item){
    if(saving[item.id])return;
    setSaving(s=>({...s,[item.id]:true}));
    try{await onComplete(item.id,role,'');}
    catch(e){alert('дҝқеӯҳгҒ«еӨұж•—: '+e.message);}
    finally{setSaving(s=>({...s,[item.id]:false}));}
  }

  async function handleUndo(item){
    if(!window.confirm(`${dt('е®ҢдәҶгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ')}\n${dt('иғҢз•ӘеҸ·:')} ${item.seiban}`))return;
    try{
      await db.collection('plans').doc(item.id).update({
        [`completions.${role}`]:firebase.firestore.FieldValue.delete(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){alert('еҸ–ж¶ҲгҒ«еӨұж•—: '+e.message);}
  }

  async function handleUndoQR(item){
    if(!window.confirm(`${dt('QRз…§еҗҲгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ')}\n${dt('иғҢз•ӘеҸ·:')} ${item.seiban}`))return;
    try{
      await db.collection('plans').doc(item.id).update({
        [`qrCheck_${line}`]:firebase.firestore.FieldValue.delete(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){alert('еҸ–ж¶ҲгҒ«еӨұж•—: '+e.message);}
  }

  async function handleUndoSample(item){
    if(!window.confirm(`${dt('1еҖӢзўәиӘҚгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ')}\n${dt('иғҢз•ӘеҸ·:')} ${item.seiban}`))return;
    try{
      await db.collection('plans').doc(item.id).update({
        [`sampleCheck_${line}`]:firebase.firestore.FieldValue.delete(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){alert('еҸ–ж¶ҲгҒ«еӨұж•—: '+e.message);}
  }

  const TH={padding:'4px 6px',fontSize:12,fontWeight:700,color:'#fff',whiteSpace:'normal',wordBreak:'break-all',lineHeight:1.3,textAlign:'center',borderRight:'1px solid rgba(255,255,255,.25)'};

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#F1EFE8',overflow:'hidden'}}>
      {/* гғҳгғғгғҖгғј */}
      <div style={{background:'#fff',borderBottom:'1px solid #E0DED8',padding:'8px 16px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button className="btn-ghost" onClick={onBack} style={{minHeight:40,minWidth:56,fontSize:13}}>{dt('вҶҗ жҲ»гӮӢ')}</button>
        <span style={{fontSize:17,fontWeight:700,color:'#111',flex:1}}>{dt('иЈҪе“Ғж®өеҸ–гӮҠ')}гҖҖ{lang==='id'?`${dt('гғ©гӮӨгғі')} ${line}`:`${line}гғ©гӮӨгғі`}</span>
        <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#888'}}>
          <span>{dt('йҖІжҚ—')}</span>
          <div style={{width:100,height:8,background:'#E0DED8',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',background:lc,width:pct+'%',transition:'width .5s'}}/>
          </div>
          <span style={{fontWeight:600,color:'#111'}}>{totalDone}/{items.length}{dt('д»¶')}</span>
        </div>
        <FontSizeCtrl/>
        <button onClick={()=>setLang(l=>l==='ja'?'id':'ja')} style={{minHeight:40,padding:'0 14px',borderRadius:10,border:'2px solid #4A90D9',background:lang==='id'?'#4A90D9':'#EBF3FC',color:lang==='id'?'#fff':'#1A5FA0',fontSize:13,fontWeight:700}}>
          {lang==='ja'?'ID':'JP'}
        </button>
        <button onClick={()=>setShowAnomaly(true)} style={{minHeight:40,padding:'0 14px',borderRadius:10,border:'2px solid #E24B4A',background:'#FCEBEB',color:'#A32D2D',fontSize:13,fontWeight:700}}>{dt('з•°еёё')}</button>
      </div>

      {/* гғЎгӮӨгғіпјҡе·ҰгғҶгғјгғ–гғ« + еҸігғ‘гғҚгғ« */}
      <div style={{display:'flex',flex:1,overflow:'hidden',gap:8,padding:8}}>

        {/* е·ҰпјҡгӮ№гӮҜгғӯгғјгғ«гғҶгғјгғ–гғ« */}
        <div ref={scrollRef} style={{flex:'0 0 56%',overflow:'auto'}}>
          <div style={{borderRadius:12,border:'1px solid #E0DED8',background:'#fff',width:'fit-content',minWidth:'100%'}}>
            <table style={{borderCollapse:'collapse',minWidth:'100%'}}>
              <thead style={{position:'sticky',top:0,zIndex:5}}>
                <tr>
                  <th colSpan={7} style={{...TH,background:lc,textAlign:'center',fontSize:13,padding:'6px 12px',borderRadius:'12px 12px 0 0'}}>{lang==='id'?`${dt('гғ©гӮӨгғі')} ${line}`:`${line}гғ©гӮӨгғі`}</th>
                </tr>
                <tr>
                  {['жҺӣгҒ‘жҷӮй–“','жүҖиҰҒжҷӮй–“','иғҢз•ӘеҸ·','зҙ жқҗз®ұж•°','QRз…§еҗҲ','1еҖӢзўәиӘҚ','ж“ҚдҪң'].map(h=>(
                    <th key={h} style={{...TH,background:lc+'EE'}}>{dt(h)}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {items.length===0?(
                  <tr><td colSpan={7} style={{textAlign:'center',padding:'48px',color:'#aaa'}}>{dt('иЁҲз”»гҒҢзҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“')}</td></tr>
                ):(()=>{
                  let foundFirst=false;
                  return items.map(item=>{
                    const isDone=item.completions?.[role]?.done;
                    const isQRDone=item[`qrCheck_${line}`]?.done;
                    const isSampleDone=item[`sampleCheck_${line}`]?.done;
                    const ready=isQRDone&&isSampleDone;
                    const isSelected=currentSelected?.id===item.id;
                    const isFirst=!foundFirst&&!isDone;
                    if(isFirst)foundFirst=true;
                    const bg=isSelected?'#EBF3FC':isDone?'#F4FAF0':'inherit';
                    const op=isDone?0.65:1;
                    const TD={padding:'3px 6px',fontSize:13,textAlign:'center',verticalAlign:'middle',borderRight:'1px solid #E8E6E0',background:bg,opacity:op,whiteSpace:'nowrap'};
                    return(
                      <tr key={item.id} ref={isFirst?firstIncompleteRef:null}>
                        <td style={TD}>{item.kakeTime}</td>
                        <td style={TD}>{item.reqTime}</td>
                        <td style={{...TD,fontWeight:700,color:lc,fontSize:14}}>{item.seiban}</td>
                        <td style={TD}>{item.materialBoxes||'вҖ”'}</td>
                        <td style={{...TD,color:isQRDone?item[`qrCheck_${line}`]?.skipped?'#999':'#3B6D11':'#bbb',fontWeight:isQRDone?700:400}}>
                          {isQRDone?<span>{item[`qrCheck_${line}`]?.skipped?'Skip':'вң”'}<br/><span style={{fontSize:10}}>{item[`qrCheck_${line}`].time}</span>
                            {!isDone&&<><br/><button onClick={()=>handleUndoQR(item)} style={{fontSize:9,color:'#999',background:'none',border:'none',padding:0,cursor:'pointer',textDecoration:'underline'}}>{dt('еҸ–ж¶Ҳ')}</button></>}
                            </span>:'вҖ”'}
                        </td>
                        <td style={{...TD,color:isSampleDone?'#3B6D11':'#bbb',fontWeight:isSampleDone?700:400}}>
                          {isSampleDone?<span>вң”<br/><span style={{fontSize:10}}>{item[`sampleCheck_${line}`].time}</span>
                            {!isDone&&<><br/><button onClick={()=>handleUndoSample(item)} style={{fontSize:9,color:'#999',background:'none',border:'none',padding:0,cursor:'pointer',textDecoration:'underline'}}>{dt('еҸ–ж¶Ҳ')}</button></>}
                            </span>:'вҖ”'}
                        </td>
                        <td style={{...TD,padding:'3px 5px',borderRight:'none'}}>
                          {isDone?(
                            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                              <span style={{fontSize:12,fontWeight:700,color:'#3B6D11'}}>{dt('вң“е®ҢдәҶ')}</span>
                              <button onClick={()=>handleUndo(item)} style={{fontSize:9,color:'#999',background:'none',border:'none',padding:0,cursor:'pointer',textDecoration:'underline'}}>{dt('еҸ–ж¶Ҳ')}</button>
                            </div>
                          ):(
                            <div style={{display:'flex',flexDirection:'column',gap:3}}>
                              <button onClick={()=>{setSelectedItem(item);setQrResult(null);}}
                                style={{padding:'3px 8px',background:lb,color:lc,border:`1.5px solid ${lc}`,borderRadius:6,fontSize:12,fontWeight:700,whiteSpace:'nowrap',minWidth:44}}>{dt('зўәиӘҚ')}</button>
                              <button onClick={()=>handleComplete(item)} disabled={!ready||saving[item.id]}
                                style={{padding:'3px 8px',background:(!ready||saving[item.id])?'#C8C6C0':lc,color:(!ready||saving[item.id])?'#888':'#fff',border:'none',borderRadius:6,fontSize:12,fontWeight:700,whiteSpace:'nowrap',minWidth:44,cursor:ready?'pointer':'default'}}>
                                {saving[item.id]?'..':dt('е®ҢдәҶ')}</button>
                            </div>
                          )}
                        </td>
                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        </div>

        {/* еҸіпјҡи©ізҙ°гғ‘гғҚгғ« */}
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:8,minWidth:0}}>
          {currentSelected?(
            <>
              {/* иЈҪе“ҒеҶҷзңҹ */}
              <div style={{flex:'0 0 54%',background:'#fff',borderRadius:12,border:'1px solid #E0DED8',display:'flex',flexDirection:'column',overflow:'hidden'}}>
                <div style={{padding:'6px 12px',borderBottom:'1px solid #E8E6E0',fontSize:12,fontWeight:700,color:'#555',flexShrink:0}}>
                  {dt('иЈҪе“ҒеҶҷзңҹ')}гҖҖ<span style={{color:lc}}>{currentSelected.seiban}</span>
                  {currentSelected.materialBoxes?<span style={{marginLeft:12,color:'#888',fontWeight:400}}>{dt('зҙ жқҗз®ұж•°пјҡ')}{currentSelected.materialBoxes}{dt('з®ұ')}</span>:null}
                </div>
                <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:8,overflow:'hidden'}}>
                  {master[currentSelected.seiban]?.imageUrl?(
                    <img src={master[currentSelected.seiban].imageUrl} alt={dt('иЈҪе“ҒеҶҷзңҹ')}
                      style={{maxHeight:'100%',maxWidth:'100%',objectFit:'contain',borderRadius:6}}/>
                  ):(
                    <div style={{color:'#bbb',fontSize:13,textAlign:'center'}}>
                      <div style={{fontSize:36,marginBottom:6}}>рҹ“·</div>{dt('иЈҪе“ҒеҶҷзңҹжңӘзҷ»йҢІ')}
                    </div>
                  )}
                </div>
              </div>

              {/* QRгӮ№гӮӯгғЈгғігӮЁгғӘгӮў */}
              <div style={{flex:1,background:'#fff',borderRadius:12,border:'1px solid #E0DED8',padding:'12px 16px',display:'flex',flexDirection:'column',gap:10,overflow:'auto'}}>
                <div style={{fontSize:13,fontWeight:700,color:'#333'}}>{dt('QRгӮ№гӮӯгғЈгғі')}</div>
                {currentSelected[`qrCheck_${line}`]?.done?(
                  /* QRжёҲгҒҝпјҲгӮ№гӮӯгғЈгғі or гӮ№гӮӯгғғгғ—пјү */
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {currentSelected[`qrCheck_${line}`]?.skipped?(
                      <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'#F8F7F3',borderRadius:8,border:'1.5px solid #C0BEB5'}}>
                        <span style={{fontSize:18}}>вҸӯпёҸ</span>
                        <span style={{fontWeight:700,color:'#888',fontSize:13}}>{dt('QRгӮ’гӮ№гӮӯгғғгғ—гҒ—гҒҫгҒ—гҒҹ')}</span>
                        <span style={{color:'#aaa',fontSize:11,marginLeft:'auto'}}>{currentSelected[`qrCheck_${line}`].time}</span>
                        {!currentSelected.completions?.[role]?.done&&<button onClick={()=>handleUndoQR(currentSelected)} style={{fontSize:11,color:'#999',background:'none',border:'none',padding:0,cursor:'pointer',textDecoration:'underline'}}>{dt('еҸ–ж¶Ҳ')}</button>}
                      </div>
                    ):(
                      <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'#F4FAF0',borderRadius:8,border:'1.5px solid #3B6D11'}}>
                        <span style={{fontSize:18}}>вң…</span>
                        <span style={{fontWeight:700,color:'#3B6D11',fontSize:13}}>{dt('вң” QRз…§еҗҲжёҲ')}</span>
                        <span style={{color:'#888',fontSize:11,marginLeft:'auto'}}>{currentSelected[`qrCheck_${line}`].time}</span>
                        {!currentSelected.completions?.[role]?.done&&<button onClick={()=>handleUndoQR(currentSelected)} style={{fontSize:11,color:'#999',background:'none',border:'none',padding:0,cursor:'pointer',textDecoration:'underline'}}>{dt('еҸ–ж¶Ҳ')}</button>}
                      </div>
                    )}
                    {currentSelected[`sampleCheck_${line}`]?.done&&(
                      <div style={{fontSize:12,color:'#3B6D11',display:'flex',alignItems:'center',gap:6}}>
                        <span>{dt('вң” 1еҖӢзўәиӘҚжёҲ')}</span><span style={{color:'#888'}}>{currentSelected[`sampleCheck_${line}`].time}</span>
                        {!currentSelected.completions?.[role]?.done&&<button onClick={()=>handleUndoSample(currentSelected)} style={{fontSize:11,color:'#999',background:'none',border:'none',padding:0,cursor:'pointer',textDecoration:'underline',marginLeft:'auto'}}>{dt('еҸ–ж¶Ҳ')}</button>}
                      </div>
                    )}
                    {!currentSelected[`sampleCheck_${line}`]?.done&&(
                      <button onClick={()=>setShowSampleConfirm(true)}
                        style={{padding:'10px',background:'#185FA5',color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer'}}>
                        {dt('рҹ”Қ 1еҖӢзўәиӘҚгҒҷгӮӢ вҶ’')}
                      </button>
                    )}
                  </div>
                ):(
                  /* QRжңӘз…§еҗҲ - гӮ№гӮӯгғЈгғіе…ҘеҠӣ + SkipгғңгӮҝгғі */
                  <>
                    {/* йҡ гҒ—е…ҘеҠӣ - гғҸгғігғҮгӮЈгӮ№гӮӯгғЈгғҠгғје°Ӯз”ЁпјҲд»®жғігӮӯгғјгғңгғјгғүйқһиЎЁзӨәпјү */}
                    <input ref={qrRef} value={qrInput}
                      onChange={e=>{setQrInput(e.target.value);setQrResult(null);}}
                      onKeyDown={handleQRScan}
                      onBlur={()=>{if(selectedItem&&!showSampleConfirm&&!showAnomaly)setTimeout(()=>qrRef.current?.focus(),50);}}
                      inputMode="none"
                      style={{position:'fixed',top:-9999,left:-9999,opacity:0,width:1,height:1}}/>
                    {/* гӮ№гӮӯгғЈгғізҠ¶ж…ӢиЎЁзӨә */}
                    <div style={{width:'100%',fontSize:13,padding:'8px 12px',borderRadius:8,border:`2px solid ${qrResult==='ok'?'#3B6D11':qrResult==='ng'?'#D32F2F':'#CBD3DC'}`,boxSizing:'border-box',background:qrInput?'#F0F7FF':'#F8F7F3',display:'flex',alignItems:'center',gap:8,minHeight:38}}>
                      <span style={{fontSize:16}}>{qrResult==='ok'?'вң…':qrResult==='ng'?'вқҢ':qrInput?'вҢӣ':'рҹ“·'}</span>
                      <span style={{flex:1,fontFamily:'monospace',color:qrInput?'#111':'#aaa',wordBreak:'break-all'}}>
                        {qrInput||dt('гӮ№гӮӯгғЈгғіеҫ…ж©ҹдёӯ...')}
                      </span>
                    </div>
                    {qrResult==='ng'&&(
                      <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'#FFF0F0',borderRadius:8,border:'1.5px solid #D32F2F'}}>
                        <span style={{fontSize:18}}>вқҢ</span>
                        <span style={{fontWeight:700,color:'#D32F2F',fontSize:13}}>{dt('з…§еҗҲNG вҖ” еҶҚгӮ№гӮӯгғЈгғігҒ—гҒҰгҒҸгҒ гҒ•гҒ„')}</span>
                      </div>
                    )}
                    {/* Skip гғңгӮҝгғі */}
                    <button onClick={handleQRSkip} disabled={qrSkipSaving[selectedItem?.id]}
                      style={{width:'100%',padding:'9px',background:qrSkipSaving[selectedItem?.id]?'#C8C6C0':'#F8F7F3',border:'1.5px solid #C0BEB5',borderRadius:10,fontSize:13,fontWeight:700,color:'#888',cursor:'pointer'}}>
                      {qrSkipSaving[selectedItem?.id]?'...':dt('гӮ№гӮӯгғғгғ—')} QR Skip
                    </button>
                  </>
                )}
              </div>
            </>
          ):(
            <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'#fff',borderRadius:12,border:'1px solid #E0DED8',flexDirection:'column',gap:12,color:'#bbb'}}>
              <div style={{fontSize:40}}>рҹ‘Ҷ</div>
              <div style={{fontSize:14}}>{dt('е·ҰгҒ®гҖҢзўәиӘҚгҖҚгғңгӮҝгғігӮ’жҠјгҒ—гҒҰгҒҸгҒ гҒ•гҒ„')}</div>
            </div>
          )}
        </div>
      </div>

      {/* 1еҖӢзўәиӘҚгғқгғғгғ—гӮўгғғгғ— */}
      {showSampleConfirm&&currentSelected&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}>
          <div style={{background:'#fff',borderRadius:20,padding:'32px 40px',maxWidth:520,width:'92%',textAlign:'center',boxShadow:'0 8px 32px rgba(0,0,0,.2)'}}>
            <div style={{fontSize:36,marginBottom:12}}>рҹ”Қ</div>
            <div style={{fontSize:18,fontWeight:700,color:'#111',marginBottom:8}}>{dt('1еҖӢзўәиӘҚ')}</div>
            {master[currentSelected.seiban]?.imageUrl
              ? <img src={master[currentSelected.seiban].imageUrl} alt={dt('иЈҪе“ҒеҶҷзңҹ')}
                  style={{maxHeight:200,maxWidth:'100%',objectFit:'contain',borderRadius:10,marginBottom:16,border:'1px solid #E0DED8'}}/>
              : <div style={{height:80,display:'flex',alignItems:'center',justifyContent:'center',color:'#aaa',fontSize:13,marginBottom:16,background:'#F5F4F0',borderRadius:10,border:'1px solid #E0DED8'}}>{dt('еҶҷзңҹжңӘзҷ»йҢІ')}</div>
            }
            <div style={{fontSize:14,color:'#555',marginBottom:24}}>
              {lang==='id'
                ? <>No. Seri <strong style={{color:lc}}>{currentSelected.seiban}</strong> apakah sudah dicek 1 pcs?</>
                : <>иғҢз•ӘеҸ· <strong style={{color:lc}}>{currentSelected.seiban}</strong> гҒ®<br/>иЈҪе“ҒгӮ’1еҖӢе®ҹзү©зўәиӘҚгҒ—гҒҫгҒ—гҒҹгҒӢпјҹ</>
              }
            </div>
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>setShowSampleConfirm(false)}
                style={{flex:1,padding:14,background:'#fff',border:'1.5px solid #C0BEB5',borderRadius:12,fontSize:14,fontWeight:700,color:'#555'}}>{dt('гӮӯгғЈгғігӮ»гғ«')}</button>
              <button onClick={handleSampleConfirm} disabled={sampleSaving[currentSelected.id]}
                style={{flex:1,padding:14,background:sampleSaving[currentSelected.id]?'#B4B2A9':lc,border:'none',borderRadius:12,fontSize:14,fontWeight:700,color:'#fff'}}>
                {sampleSaving[currentSelected.id]?dt('дҝқеӯҳдёӯ...'):'вң“ '+dt('зўәиӘҚжёҲгҒҝ')}
              </button>
            </div>
          </div>
        </div>
      )}

      {showAnomaly&&<AnomalyModal seiban={currentSelected?.seiban||''} role={role} line={line} types={anomalyTypes} onClose={()=>setShowAnomaly(false)} onDone={()=>setShowAnomaly(false)}/>}
    </div>
  );
}

/* в”Җв”Җ гғҲгғјгӮҝгғ«ж®өеҸ–гӮҠз”»йқўпјҲA+BдёЎгғ©гӮӨгғіпјү в”Җв”Җ */
function TotalDantoriScreen({plans,master,anomalyTypes,onComplete,onBack}){
  const acol='#185FA5',bcol='#534AB7';
  const{lang,setLang}=useLang();
  const DID={
    'вҶҗ жҲ»гӮӢ':'вҶҗ Kembali','иЈҪе“Ғж®өеҸ–гӮҠ гғҲгғјгӮҝгғ«':'Persiapan Produk Total','йҖІжҚ—':'Progres','д»¶':'item',
    'з•°еёё':'Kelainan','A гғ©гӮӨгғі':'Jalur A','B гғ©гӮӨгғі':'Jalur B',
    'жҺӣгҒ‘жҷӮй–“':'Waktu Pasang','жүҖиҰҒжҷӮй–“':'Waktu Proses','иғҢз•ӘеҸ·':'No. Seri',
    'зҙ жқҗз®ұж•°':'Kotak Bahan','QRз…§еҗҲ':'Cek QR','з®ұж•°':'Jml Kotak','жҠңгҒ‘гҒӢгӮ“гҒ°гӮ“':'Kanban Hilang','ж“ҚдҪң':'Operasi',
    'вң“е®ҢдәҶ':'вң“Selesai','зўәиӘҚ':'Konfirmasi','е®ҢдәҶ':'Selesai',
    'иЁҲз”»гҒҢзҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“':'Tidak ada rencana yang terdaftar',
    'иЈҪе“ҒеҶҷзңҹ':'Foto Produk','гғҸгғігӮ¬гғјжғ…е ұ':'Info Hanger',
    'гғҸгғігӮ¬гғјеҗҚз§°':'Nama Hanger','гғҸгғігӮ¬гғјжң¬ж•°':'Jml Hanger',
    'иЁӯе®ҡйӣ»ең§':'Volt Set','з©әгғ•гғғгӮҜ':'Kait Kosong','йҖЈз¶ҡжң¬ж•°':'Beruntun',
    'гӮӯгғЈгғігӮ»гғ«':'Batal','жң¬':'btg','еҖӢ':'pcs','V':'V','з®ұ':'kotak','жһҡ':'lbr',
    'иЈҪе“ҒеҶҷзңҹжңӘзҷ»йҢІ':'Foto produk belum terdaftar',
    'з®ұж•°гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„':'Masukkan jumlah kotak',
    'жҠңгҒ‘гҒӢгӮ“гҒ°гӮ“гӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„':'Konfirmasi kanban hilang',
    'Skip':'Skip','SkipжёҲгҒҝ':'Sudah Skip','гғӘгӮ»гғғгғҲ':'Reset',
    'еҸ–ж¶Ҳ':'Batalkan','е®ҢдәҶгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ':'Batalkan penyelesaian ini?','иғҢз•ӘеҸ·:':'No. Seri:',
  };
  const dt=s=>lang==='id'?(DID[s]??s):s;

  const[saving,setSaving]=useState({});
  const[boxCount,setBoxCount]=useState({});    // item.id вҶ’ ж–Үеӯ—еҲ—пјҲз®ұж•°пјү
  const[kanbanCount,setKanbanCount]=useState({}); // item.id вҶ’ ж–Үеӯ—еҲ—пјҲжҠңгҒ‘гҒӢгӮ“гҒ°гӮ“ж•°пјүгҖҒundefined=жңӘзўәиӘҚ
  const[confirmItem,setConfirmItem]=useState(null);
  const[showAnomaly,setShowAnomaly]=useState(false);
  const firstIncompleteRef=useRef(null);
  const scrollRef=useRef(null);

  const itemsA=plans.filter(p=>p.line==='A').sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const itemsB=plans.filter(p=>p.line==='B').sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const rows=mergeTimeline(itemsA,itemsB);
  const totalAll=plans.length;
  const totalDone=plans.filter(p=>p.completions?.['ж®өеҸ–гӮҠгғҲгғјгӮҝгғ«']?.done).length;
  const pct=totalAll?Math.round(totalDone/totalAll*100):0;

  useEffect(()=>{
    if(firstIncompleteRef.current&&scrollRef.current){
      const c=scrollRef.current,r=firstIncompleteRef.current;
      c.scrollTop=Math.max(0,r.offsetTop-c.offsetTop-8);
    }
  },[]);

  async function handleComplete(item,boxes,kanbans){
    if(saving[item.id])return;
    setSaving(s=>({...s,[item.id]:true}));
    try{
      const now=new Date().toTimeString().slice(0,5);
      await db.collection('plans').doc(item.id).update({
        'completions.ж®өеҸ–гӮҠгғҲгғјгӮҝгғ«':{done:true,time:now},
        totalBoxCount:parseInt(boxes)||0,
        missingKanban:kanbans==='skip'?null:(parseInt(kanbans)||0),
        missingKanbanSkipped:kanbans==='skip',
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    catch(e){alert('дҝқеӯҳгҒ«еӨұж•—: '+e.message);}
    finally{setSaving(s=>({...s,[item.id]:false}));}
  }

  async function handleUndo(item){
    if(!window.confirm(`${dt('е®ҢдәҶгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ')}\n${dt('иғҢз•ӘеҸ·:')} ${item.seiban}`))return;
    try{
      await db.collection('plans').doc(item.id).update({
        'completions.ж®өеҸ–гӮҠгғҲгғјгӮҝгғ«':firebase.firestore.FieldValue.delete(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){alert('еҸ–ж¶ҲгҒ«еӨұж•—: '+e.message);}
  }

  const TH={padding:'3px 5px',fontSize:11,fontWeight:700,color:'#fff',whiteSpace:'normal',wordBreak:'break-all',lineHeight:1.3,textAlign:'center',borderRight:'1px solid rgba(255,255,255,.25)'};
  const DCOLS=['жҺӣгҒ‘жҷӮй–“','жүҖиҰҒжҷӮй–“','иғҢз•ӘеҸ·','зҙ жқҗз®ұж•°','QRз…§еҗҲ','з®ұж•°','жҠңгҒ‘гҒӢгӮ“гҒ°гӮ“','ж“ҚдҪң'];
  const colCount=DCOLS.length;

  function renderSide(item,lc,lb){
    if(!item)return DCOLS.map((_,i)=><td key={i} style={{padding:'3px 5px',borderRight:'1px solid #E8E6E0',background:'#F8F8F8'}}/>);
    const isDone=item.completions?.['ж®өеҸ–гӮҠгғҲгғјгӮҝгғ«']?.done;
    const isSaving=saving[item.id];
    const isQRDone=item[`qrCheck_${item.line}`]?.done;
    const cnt=boxCount[item.id]??'';
    const cntNum=parseInt(cnt)||0;
    const hasCount=cntNum>0;
    const kb=kanbanCount[item.id];          // undefined=жңӘзўәиӘҚ, ж–Үеӯ—еҲ—=зўәиӘҚжёҲгҒҝ
    const kbConfirmed=kb!==undefined;
    const kbNum=parseInt(kb)||0;
    const img=master[item.seiban]?.imageUrl;
    const bg=isDone?'#F4FAF0':'inherit';
    const op=isDone?0.65:1;
    const TD={padding:'3px 5px',fontSize:11,textAlign:'center',verticalAlign:'middle',borderRight:'1px solid #E8E6E0',background:bg,opacity:op,whiteSpace:'nowrap'};
    const adjBox=delta=>setBoxCount(s=>({...s,[item.id]:String(Math.max(0,(parseInt(s[item.id])||0)+delta))}));
    const adjKb=delta=>setKanbanCount(s=>({...s,[item.id]:String(Math.max(0,(parseInt(s[item.id])||0)+delta))}));
    return[
      <td key="kt" style={{...TD,fontWeight:700}}>{item.kakeTime}</td>,
      <td key="rt" style={TD}>{item.reqTime||'вҖ”'}</td>,
      <td key="sb" style={{...TD,fontWeight:700,color:lc,fontSize:13,whiteSpace:'normal',wordBreak:'break-all'}}>{item.seiban}</td>,
      <td key="mb" style={TD}>{item.materialBoxes?item.materialBoxes+(lang==='id'?'':'з®ұ'):'вҖ”'}</td>,
      <td key="qr" style={{...TD,color:isQRDone?'#3B6D11':'#bbb',fontWeight:isQRDone?700:400}}>

      </td>,
      <td key="bc" style={{...TD,padding:'2px 3px'}}>
        {isDone
          ?<span style={{color:lc,fontWeight:700}}>{item.totalBoxCount!=null?item.totalBoxCount+dt('з®ұ'):'вң”'}</span>

            {/* +10/-10 иЎҢ */}
            <div style={{display:'flex',gap:2}}>
              <button onPointerDown={e=>{e.preventDefault();adjBox(-10);}}
