function toHHMM(s){
  if(!s)return'';
  const p=s.trim().split(':');
  return p.length>=2?p[0].padStart(2,'0')+':'+p[1].padStart(2,'0'):s;
}
const isTime=s=>s&&/^\d{1,2}:\d{2}/.test(s.trim());
function mkItem(line,cols,offset=0){
  const num=x=>parseInt(x)||0;
  const[k,o,r,s,p,mb,hn,hc,fr,kw,w,v,vm,fb,ow]=cols.slice(offset,offset+15);
  if(!s||!isTime(k))return null;
  return{line,seiban:s,kakeTime:toHHMM(k),orosiTime:toHHMM(o),reqTime:toHHMM(r),
    products:num(p),materialBoxes:num(mb),hangerName:hn||'',hangers:num(hc),fraction:num(fr),
    kakeWorkers:num(kw),width:num(w),voltage:num(v),voltageMax:num(vm),
    finishedBoxes:num(fb),orosiWorkers:num(ow)};
}
/* 15列→selectedLine単独、16列目以降に時刻があればA+B合算 */
function parseExcel(text,selectedLine){
  const rows=text.split('\n').map(r=>r.split('\t').map(c=>c.trim())).filter(r=>r.some(v=>v));
  const items=[];
  rows.forEach(cols=>{
    const combined=cols.length>=16&&isTime(cols[15]);
    const a=mkItem(combined?'A':selectedLine,cols,0);
    if(a)items.push(a);
    if(combined){const b=mkItem('B',cols,15);if(b)items.push(b);}
  });
  return items;
}
function getFields(role,item,master){
  const f=[];
  const add=(l,v)=>f.push([l,(v==null||v===''||v===0||v==='0')?'—':String(v)]);
  if(!["降ろし検査","出荷"].includes(role))add("掛け時間",item.kakeTime);else add("降ろし時間",item.orosiTime||'—');
  add("所要時間",item.reqTime);
  if(["製品段取り","降ろし検査","リフトマン"].includes(role))add("製品数",item.products?item.products+"個":"—");
  if(["製品段取り","リフトマン"].includes(role))add("素材箱数",item.materialBoxes?item.materialBoxes+"箱":"—");
  if(["ハンガー段取り","掛け","リフトマン"].includes(role)){
    add("ハンガー名称",item.hangerName||"—");
    add("ハンガー本数",item.hangers?item.hangers+"本":"—");
  }
  if(["製品段取り","掛け","降ろし検査"].includes(role))add("ハンガー内端数予定",item.fraction?item.fraction+"個":"—");
  if(role==="ハンガー段取り"){
    add("設定電圧",item.voltage?item.voltage+"V":"—");
    if(item.voltageMax)add("電圧上限",item.voltageMax+"V");
  }
  if(role==="掛け"){
    add("掛け人数",item.kakeWorkers?item.kakeWorkers+"人":"—");
    add("掛幅",item.width?item.width+"cm":"—");
  }
  if(role==="降ろし検査")add("降ろし人数",item.orosiWorkers?item.orosiWorkers+"人":"—");
  if(["出荷","リフトマン"].includes(role))add("完成品箱数",item.finishedBoxes?item.finishedBoxes+"箱":"—");
  if(role==="リフトマン"&&item.width)add("掛幅",item.width+"cm");
  return f;
}

function QRDisplay({value,size=120}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!value)return;
    const gen=()=>{
      if(!window.QRious){setTimeout(gen,300);return;}
      try{new window.QRious({element:ref.current,value,size,padding:4,level:'M'});}
      catch(e){console.warn('QRious:',e);}
    };
    gen();
  },[value,size]);
  return <canvas ref={ref} style={{display:'block',borderRadius:4,width:size+'px',height:size+'px'}}/>;
}

  const[lang,setLangRaw]=useState(()=>{try{return localStorage.getItem('appLang')||'ja';}catch{return'ja';}});

function QRScannerModal({expectedValue,label,onSuccess,onClose}){
  const{t}=useLang();
  const inputRef=useRef(null);
  const[scanned,setScanned]=useState('');
  const[feedback,setFeedback]=useState(null);
  const[done,setDone]=useState(false);

  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),150);},[]);

  function check(text){
    const t=text.trim();
    if(!t)return;
    if(t.includes(expectedValue)||expectedValue.includes(t)){
      setFeedback({ok:true,text:'照合成功 ✓'});
      setDone(true);
      setTimeout(()=>onSuccess(t),600);
    }else{
      setFeedback({ok:false,text:'不一致: "'+t.slice(0,24)+'"'});

const LIFT_COLS=[
  {key:'kakeTime',label:'掛け時間'},
  {key:'reqTime',label:'所要時間'},
  {key:'seiban',label:'背番号'},
  {key:'products',label:'製品数',unit:'個'},
  {key:'materialBoxes',label:'素材箱数',unit:'箱'},
  {key:'finishedBoxes',label:'完成品箱数',unit:'箱'},
];

function mergeTimeline(aItems,bItems){
  const rows=[];
  let ai=0,bi=0;
  while(ai<aItems.length||bi<bItems.length){
    const a=aItems[ai],b=bItems[bi];
    if(!b){rows.push({a,b:null});ai++;}
    else if(!a){rows.push({a:null,b});bi++;}
    else if(a.kakeTime===b.kakeTime){rows.push({a,b});ai++;bi++;}
    else if(a.kakeTime<b.kakeTime){rows.push({a,b:null});ai++;}
    else{rows.push({a:null,b});bi++;}
  }
  return rows;
}

function LiftmanScreen({plans,master,anomalyTypes,onComplete,onBack}){
  const acol='#185FA5',bcol='#534AB7';
  const[saving,setSaving]=useState({});

  const[completeItem,setCompleteItem]=useState(null);
  const[showAnomaly,setShowAnomaly]=useState(false);
  const role='リフトマン';
  const firstIncompleteRef=useRef(null);
  const scrollRef=useRef(null);
  const[lang,setLang]=useState('ja');
  const ID={
    '← 戻る':'← Kembali','リフトマン':'Liftman','進捗':'Progres','件':'item',
    '異常':'Kelainan','A ライン':'Jalur A','B ライン':'Jalur B',
    '掛け時間':'Waktu Pasang','所要時間':'Waktu Proses','背番号':'No. Seri',
    '製品数':'Jml Produk','素材箱数':'Kotak Bahan','完成品箱数':'Kotak Jadi',
    '操作':'Operasi','✓完了':'✓Selesai','確認':'Konfirmasi','完了':'Selesai',

    '製品確認':'Konfirmasi Produk','背番号:':'No. Seri:',
    '製品画像未登録':'Gambar produk belum terdaftar',
    'キャンセル':'Batal','個':'pcs','箱':'kotak',
  };
  const t=k=>lang==='id'?(ID[k]??k):k;

  const itemsA=plans.filter(p=>p.line==='A').sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const itemsB=plans.filter(p=>p.line==='B').sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const rows=mergeTimeline(itemsA,itemsB);
  const totalDone=plans.filter(p=>p.completions?.[role]?.done).length;
  const pct=plans.length?Math.round(totalDone/plans.length*100):0;

  useEffect(()=>{
    if(firstIncompleteRef.current&&scrollRef.current){
      const container=scrollRef.current;
      const row=firstIncompleteRef.current;
      const offset=row.offsetTop-container.offsetTop-8;
      container.scrollTop=Math.max(0,offset);
    }
  },[]);

  async function handleComplete(item){
    if(saving[item.id])return;
    setSaving(s=>({...s,[item.id]:true}));
    try{await onComplete(item.id,role,'');}
    catch(e){alert('保存に失敗: '+e.message);}
    finally{setSaving(s=>({...s,[item.id]:false}));}
  }

  function cellVal(col,item){
    const v=item[col.key];
    if(v==null||v==='')return'—';
    return col.unit?v+col.unit:v;
  }

  function renderSide(item,lc,lb){
    if(!item)return LIFT_COLS.map(c=><td key={c.key} style={{padding:'4px 8px',borderRight:'1px solid #E8E6E0',background:'#F8F8F8'}}/>).concat(
      <td key="op" style={{padding:'4px 8px',background:'#F8F8F8',borderLeft:'none'}}/>

    const isDone=item.completions?.[role]?.done;

    const img=master[item.seiban]?.imageUrl;

        </div>
      )}
      {showAnomaly&&<AnomalyModal seiban={''} role={role} line={null} types={anomalyTypes} onClose={()=>setShowAnomaly(false)} onDone={()=>setShowAnomaly(false)}/>}
      {completeItem&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:360,padding:'28px 24px',textAlign:'center',boxShadow:'0 8px 40px rgba(0,0,0,.35)'}}>
            <div style={{fontSize:36,marginBottom:12}}>✅</div>
            <div style={{fontSize:18,fontWeight:700,color:'#111',marginBottom:6}}>{t('完了')}にしますか？</div>
            <div style={{fontSize:14,color:'#666',marginBottom:24}}>{t('背番号:')} <strong>{completeItem.item.seiban}</strong></div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setCompleteItem(null)} style={{flex:1,padding:'14px',background:'#fff',border:'1.5px solid #C0BEB5',borderRadius:12,fontSize:15,fontWeight:700,color:'#555'}}>{t('キャンセル')}</button>
              <button onClick={async()=>{const it=completeItem.item;setCompleteItem(null);await handleComplete(it);}} style={{flex:2,padding:'14px',background:completeItem.lc,border:'none',borderRadius:12,fontSize:15,fontWeight:700,color:'#fff'}}>{t('完了')}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function HangerScreen({plans,master,anomalyTypes,onComplete,onBack}){
  const acol='#185FA5',bcol='#534AB7';
  const role='ハンガー段取り';
  const[saving,setSaving]=useState({});
  const[vChecking,setVChecking]=useState({});
  const[confirmItem,setConfirmItem]=useState(null);
  const[completeItem,setCompleteItem]=useState(null);
  const[showAnomaly,setShowAnomaly]=useState(false);
  const[tick,setTick]=useState(0);
  const[dismissedAlerts,setDismissedAlerts]=useState(()=>{
    try{const s=sessionStorage.getItem('vcDismissed');return s?new Set(JSON.parse(s)):new Set();}catch{return new Set();}
  });
  const firstIncompleteRef=useRef(null);
  const scrollRef=useRef(null);

  const itemsA=plans.filter(p=>p.line==='A').sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const itemsB=plans.filter(p=>p.line==='B').sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const rows=mergeTimeline(itemsA,itemsB);
  const totalDone=plans.filter(p=>p.completions?.[role]?.done).length;
  const pct=plans.length?Math.round(totalDone/plans.length*100):0;

  function addMin(t,m){if(!t)return null;const[h,mi]=t.split(':').map(Number);const tot=h*60+mi+m;return`${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;}

  // 電圧が変わった行を特定（ライン内の前行と比較）
  const voltageChangeIds=useMemo(()=>{
    const ids=new Set();
    for(const lineItems of[itemsA,itemsB]){
      for(let i=1;i<lineItems.length;i++){
        const prevV=String(master[lineItems[i-1].seiban]?.voltage??lineItems[i-1].voltage??'');
        const currV=String(master[lineItems[i].seiban]?.voltage??lineItems[i].voltage??'');
        if(prevV&&currV&&prevV!==currV)ids.add(lineItems[i].id);
      }
    }
    return ids;
  },[plans,master]);

  const ALERT_MS=23*60*1000;

  // 電圧変更行が完了してから23分後にアラート（タイムスタンプ比較）
  const voltageAlert=useMemo(()=>{
    const now=Date.now();
    for(const item of plans){
      if(!voltageChangeIds.has(item.id))continue;
      if(!item.completions?.[role]?.done)continue;
      if(item.voltageCheck?.done)continue;
      if(dismissedAlerts.has(item.id))continue;
      const ts=item.completions[role].ts;
      if(!ts)continue;
      if(now>=ts+ALERT_MS)return{item};
    }
    return null;
  },[plans,voltageChangeIds,tick,dismissedAlerts]);

  useEffect(()=>{
    const id=setInterval(()=>setTick(t=>t+1),30000);
    return()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    if(firstIncompleteRef.current&&scrollRef.current){
      const c=scrollRef.current,r=firstIncompleteRef.current;
      c.scrollTop=Math.max(0,r.offsetTop-c.offsetTop-8);
    }
  },[]);

  async function handleComplete(item){
    if(saving[item.id])return;
    setSaving(s=>({...s,[item.id]:true}));
    try{await onComplete(item.id,role,'');}
    catch(e){alert('保存に失敗: '+e.message);}
    finally{setSaving(s=>({...s,[item.id]:false}));}
  }

  async function handleVoltageConfirm(item){
    if(vChecking[item.id])return;
    setVChecking(s=>({...s,[item.id]:true}));
    try{
      const t=new Date().toTimeString().slice(0,5);
      await db.collection('plans').doc(item.id).update({voltageCheck:{done:true,time:t},updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(e){alert('保存に失敗: '+e.message);}
    finally{setVChecking(s=>({...s,[item.id]:false}));}
  }

  function voltageColor(v){const n=parseInt(v);if(n>=330)return'#D32F2F';if(n>=250)return'#185FA5';return'#222';}

  function cellVal(col,item){
    const v=col.ms?(master[item.seiban]?.[col.key]??item[col.key]):item[col.key];
    if(v==null||v==='')return'—';
    return col.unit?v+col.unit:v;
  }

  const HCOLS=[
    {key:'kakeTime',label:'掛け時間'},{key:'reqTime',label:'所要時間'},{key:'seiban',label:'背番号'},
    {key:'hangerName',label:'ハンガー名称',ms:true},{key:'hangers',label:'本数',ms:true,unit:'本'},
    {key:'voltage',label:'設定電圧',ms:true,unit:'V'},{key:'emptyHooks',label:'空フック',ms:true,unit:'個'},
    {key:'continuous',label:'連続本数',ms:true,unit:'本'},
  ];
  const colCount=HCOLS.length+2;
  const TH={padding:'4px 6px',fontSize:12,fontWeight:700,color:'#fff',whiteSpace:'normal',wordBreak:'keep-all',lineHeight:1.3,textAlign:'center',borderRight:'1px solid rgba(255,255,255,.25)'};

  function renderSide(item,lc,lb){
    if(!item)return[
      ...HCOLS.map(c=><td key={c.key} style={{padding:'4px 6px',borderRight:'1px solid #E8E6E0',background:'#F8F8F8'}}/>),
      <td key="vc" style={{padding:'4px 6px',borderRight:'1px solid #E8E6E0',background:'#F8F8F8'}}/>,
      <td key="op" style={{padding:'4px 6px',background:'#F8F8F8'}}/>,
    ];
    const isDone=item.completions?.[role]?.done;
    const isSaving=saving[item.id];
    const needsVC=voltageChangeIds.has(item.id);
    const isVChecked=item.voltageCheck?.done;
    const img=master[item.seiban]?.imageUrl;
    const bg=isDone?'#F4FAF0':'inherit';
    const op=isDone?0.6:1;
    return[
      ...HCOLS.map(c=>{
        const disp=cellVal(c,item);
        const isVolt=c.key==='voltage';
        const isSei=c.key==='seiban';
        const rawV=master[item.seiban]?.[c.key]??item[c.key];
        const color=isVolt?voltageColor(rawV):isSei?lc:'#222';
        return<td key={c.key} style={{padding:'4px 6px',fontSize:isSei?16:14,fontWeight:isSei||isVolt?700:400,color,textAlign:'center',verticalAlign:'middle',borderRight:'1px solid #E8E6E0',whiteSpace:isSei?'normal':'nowrap',wordBreak:'break-all',background:bg,opacity:op}}>{disp}</td>;
      }),
      <td key="vc" style={{padding:'4px 6px',textAlign:'center',verticalAlign:'middle',borderRight:'1px solid #E8E6E0',background:bg,opacity:op}}>
        {needsVC?(
          isVChecked
            ?<div style={{fontSize:11,fontWeight:700,color:'#3B6D11'}}>✓{item.voltageCheck.time}</div>
            :isDone
              ?<div style={{fontSize:11,color:'#E65100',fontWeight:600}}>待機中…</div>
              :<div style={{fontSize:11,color:'#aaa'}}>完了後</div>
        ):<span style={{color:'#ddd',fontSize:11}}>—</span>}
      </td>,
      <td key="op" style={{padding:'4px 6px',textAlign:'center',verticalAlign:'middle',background:bg,opacity:op}}>
        {isDone?(
          <span style={{fontSize:12,fontWeight:700,color:'#3B6D11'}}>✓完了</span>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <button onClick={()=>setConfirmItem({item,img,lc,lb})}
              style={{padding:'4px 6px',background:lb,color:lc,border:`1.5px solid ${lc}`,borderRadius:6,fontSize:12,fontWeight:700,whiteSpace:'nowrap',minWidth:52}}>確認</button>
            <button onClick={()=>setCompleteItem({item,lc})} disabled={isSaving}
              style={{padding:'4px 6px',background:isSaving?'#B4B2A9':lc,color:'#fff',border:'none',borderRadius:6,fontSize:12,fontWeight:700,whiteSpace:'nowrap',minWidth:52}}>{isSaving?'..':'完了'}</button>
          </div>
        )}
      </td>,
    ];
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#F1EFE8',overflow:'hidden'}}>
      <div style={{background:'#fff',borderBottom:'1px solid #E0DED8',padding:'8px 16px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button className="btn-ghost" onClick={onBack} style={{minHeight:40,minWidth:56,fontSize:13}}>← 戻る</button>
        <span style={{fontSize:17,fontWeight:700,color:'#111',flex:1}}>ハンガー段取り</span>
        {voltageChangeIds.size>0&&(
          <div style={{fontSize:12,color:'#E65100',fontWeight:700,background:'#FFF3E0',padding:'4px 10px',borderRadius:8,border:'1px solid #E65100',flexShrink:0}}>
            ⚡ 電圧切替 {voltageChangeIds.size}件
          </div>
        )}
        <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#888'}}>
          <span>進捗</span>
          <div style={{width:100,height:8,background:'#E0DED8',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',background:acol,width:pct+'%',transition:'width .5s'}}/>
          </div>
          <span style={{fontWeight:600,color:'#111'}}>{totalDone}/{plans.length}件</span>
        </div>
        <FontSizeCtrl/>
        <button onClick={()=>setShowAnomaly(true)} style={{minHeight:40,padding:'0 14px',borderRadius:10,border:'2px solid #E24B4A',background:'#FCEBEB',color:'#A32D2D',fontSize:13,fontWeight:700}}>異常</button>
      </div>
      <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'8px'}}>
        {rows.length===0?(
          <div style={{textAlign:'center',padding:'64px 0',color:'#aaa'}}>計画が登録されていません</div>
        ):(
          <div style={{borderRadius:12,border:'1px solid #E0DED8',background:'#fff'}}>
            <table style={{width:'100%',borderCollapse:'collapse',tableLayout:'fixed'}}>
              <thead style={{position:'sticky',top:0,zIndex:10}}>
                <tr>
                  <th colSpan={colCount} style={{...TH,background:acol,textAlign:'center',fontSize:14,padding:'8px 12px',borderRadius:'12px 0 0 0'}}>A ライン</th>
                  <th style={{width:3,background:'#E0DED8',padding:0}}/>
                  <th colSpan={colCount} style={{...TH,background:bcol,textAlign:'center',fontSize:14,padding:'8px 12px',borderRadius:'0 12px 0 0'}}>B ライン</th>
                </tr>
                <tr>
                  {HCOLS.map(c=><th key={'a-'+c.key} style={{...TH,background:acol+'EE'}}>{c.label}</th>)}
                  <th style={{...TH,background:acol+'EE'}}>電圧確認</th>
                  <th style={{...TH,background:acol+'EE'}}>操作</th>
                  <th style={{width:3,background:'#E0DED8',padding:0}}/>
                  {HCOLS.map(c=><th key={'b-'+c.key} style={{...TH,background:bcol+'EE'}}>{c.label}</th>)}
                  <th style={{...TH,background:bcol+'EE'}}>電圧確認</th>
                  <th style={{...TH,background:bcol+'EE'}}>操作</th>
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  let foundFirst=false;
                  return rows.map((row,idx)=>{
                    const aInc=row.a&&!row.a.completions?.[role]?.done;
                    const bInc=row.b&&!row.b.completions?.[role]?.done;
                    const isFirst=!foundFirst&&(aInc||bInc);
                    if(isFirst)foundFirst=true;
                    return(
                      <tr key={idx} ref={isFirst?firstIncompleteRef:null} style={{borderBottom:'1px solid #EEECE6',background:idx%2===0?'#fff':'#FAFAF8'}}>
                        {renderSide(row.a,acol,'#E6F1FB')}
                        <td style={{width:3,background:'#E0DED8',padding:0}}/>
                        {renderSide(row.b,bcol,'#EEEDFE')}
                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* 確認モーダル（ハンガー写真） */}
      {confirmItem&&(
        <div onClick={e=>e.target===e.currentTarget&&setConfirmItem(null)}
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:480,overflow:'hidden',boxShadow:'0 8px 40px rgba(0,0,0,.3)'}}>
            <div style={{background:confirmItem.lc,padding:'16px 20px'}}>
              <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>ハンガー確認</div>
              <div style={{fontSize:13,color:'rgba(255,255,255,.8)',marginTop:2}}>背番号: {confirmItem.item.seiban}</div>
            </div>
            <div style={{padding:20}}>
              {confirmItem.img
                ?<img src={confirmItem.img} style={{width:'100%',maxHeight:280,objectFit:'contain',borderRadius:10,border:'1px solid #E0DED8',marginBottom:16}}/>
                :<div style={{height:140,display:'flex',alignItems:'center',justifyContent:'center',background:'#F8F7F4',borderRadius:10,border:'1px dashed #D0CEC8',marginBottom:16}}><span style={{color:'#bbb',fontSize:14}}>ハンガー画像未登録</span></div>
              }
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px',marginBottom:20,padding:'12px 14px',background:'#F8F7F4',borderRadius:10}}>
                {[
                  ['ハンガー名称',master[confirmItem.item.seiban]?.hangerName||confirmItem.item.hangerName||'—'],
                  ['本数',(master[confirmItem.item.seiban]?.hangers||confirmItem.item.hangers||'')?((master[confirmItem.item.seiban]?.hangers||confirmItem.item.hangers)+'本'):'—'],
                  ['設定電圧',(master[confirmItem.item.seiban]?.voltage||confirmItem.item.voltage||'')?((master[confirmItem.item.seiban]?.voltage||confirmItem.item.voltage)+'V'):'—'],
                  ['空フック',(master[confirmItem.item.seiban]?.emptyHooks||confirmItem.item.emptyHooks||'')?((master[confirmItem.item.seiban]?.emptyHooks||confirmItem.item.emptyHooks)+'個'):'—'],
                ].map(([l,v])=>(
                  <div key={l}><div style={{fontSize:11,color:'#999',marginBottom:2}}>{l}</div><div style={{fontSize:16,fontWeight:600,color:'#111'}}>{v}</div></div>
                ))}
              </div>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>setConfirmItem(null)} style={{flex:1,padding:'14px',background:'#fff',border:'1.5px solid #C0BEB5',borderRadius:12,fontSize:15,fontWeight:700,color:'#555'}}>キャンセル</button>
                <button onClick={()=>setConfirmItem(null)} style={{flex:2,padding:'14px',background:confirmItem.lc,border:'none',borderRadius:12,fontSize:15,fontWeight:700,color:'#fff'}}>OK</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 電圧変更確認ポップアップ（完了から23分後） */}
      {voltageAlert&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:24,width:'100%',maxWidth:420,padding:'32px 28px',textAlign:'center',boxShadow:'0 12px 60px rgba(0,0,0,.4)'}}>
            <div style={{fontSize:56,marginBottom:12}}>⚠️</div>
            <div style={{fontSize:22,fontWeight:700,color:'#D32F2F',marginBottom:10}}>電圧変更の確認</div>
            <div style={{fontSize:15,color:'#444',lineHeight:1.7,marginBottom:8}}>
              背番号 <strong style={{color:'#111'}}>{voltageAlert.item.seiban}</strong> の完了から23分が経過しました。
            </div>
            <div style={{fontSize:14,color:'#666',marginBottom:28}}>
              設定電圧: <strong style={{color:voltageColor(master[voltageAlert.item.seiban]?.voltage??voltageAlert.item.voltage),fontSize:18}}>
                {master[voltageAlert.item.seiban]?.voltage??voltageAlert.item.voltage??'—'}V
              </strong>　への変更を確認してください。
            </div>
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>{const s=new Set([...dismissedAlerts,voltageAlert.item.id]);setDismissedAlerts(s);try{sessionStorage.setItem('vcDismissed',JSON.stringify([...s]));}catch{}}}
                style={{flex:1,padding:'14px',background:'#fff',border:'1.5px solid #C0BEB5',borderRadius:12,fontSize:14,fontWeight:700,color:'#555'}}>後で</button>
              <button disabled={vChecking[voltageAlert.item.id]}
                onClick={async()=>{
                  await handleVoltageConfirm(voltageAlert.item);
                  const s=new Set([...dismissedAlerts,voltageAlert.item.id]);
                  setDismissedAlerts(s);
                  try{sessionStorage.setItem('vcDismissed',JSON.stringify([...s]));}catch{}
                }}
                style={{flex:2,padding:'14px',background:'#D32F2F',border:'none',borderRadius:12,fontSize:15,fontWeight:700,color:'#fff'}}>
                {vChecking[voltageAlert.item.id]?'記録中…':'✓ 確認済み'}
              </button>
            </div>
          </div>
        </div>
      )}

      {showAnomaly&&<AnomalyModal seiban={''} role={role} line={null} types={anomalyTypes} onClose={()=>setShowAnomaly(false)} onDone={()=>setShowAnomaly(false)}/>}
      {completeItem&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:360,padding:'28px 24px',textAlign:'center',boxShadow:'0 8px 40px rgba(0,0,0,.35)'}}>
            <div style={{fontSize:36,marginBottom:12}}>✅</div>
            <div style={{fontSize:18,fontWeight:700,color:'#111',marginBottom:6}}>完了にしますか？</div>
            <div style={{fontSize:14,color:'#666',marginBottom:24}}>背番号: <strong>{completeItem.item.seiban}</strong></div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setCompleteItem(null)} style={{flex:1,padding:'14px',background:'#fff',border:'1.5px solid #C0BEB5',borderRadius:12,fontSize:15,fontWeight:700,color:'#555'}}>キャンセル</button>
              <button onClick={async()=>{const it=completeItem.item;setCompleteItem(null);await handleComplete(it);}} style={{flex:2,padding:'14px',background:completeItem.lc,border:'none',borderRadius:12,fontSize:15,fontWeight:700,color:'#fff'}}>完了</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function WorkerScreen({role,line,plans,master,anomalyTypes,onComplete,onUndo,onBack}){
  const{t}=useLang();
  const a=RA[role],l=RL[role];
  const[frac,setFrac]=useState('');
  const[flash,setFlash]=useState(false);
  const[modalImg,setModalImg]=useState(null);
  const[lastDone,setLastDone]=useState(null);
  const[saving,setSaving]=useState(false);
  const[showAnomaly,setShowAnomaly]=useState(false);
  const[showQRScan,setShowQRScan]=useState(false);
  const[imgSize,setImgSize]=useState(()=>{try{return parseInt(localStorage.getItem('imgSize'))||120;}catch{return 120;}});
  function changeImgSize(v){const s=parseInt(v);setImgSize(s);try{localStorage.setItem('imgSize',s);}catch{}}
  const ll=(role==='リフトマン'||role==='製品段取り'||role==='出荷'||role==='ハンガー段取り')?null:line;
  const items=plans.filter(p=>ll?p.line===ll:true).sort((x,y)=>x.kakeTime.localeCompare(y.kakeTime));
  const done=items.filter(p=>p.completions?.[role]?.done);
  const pend=items.filter(p=>!p.completions?.[role]?.done);
  const cur=pend[0]||null,nxt=pend[1]||null;
  const pct=items.length?Math.round(done.length/items.length*100):0;
  const needsFrac=["掛け","降ろし検査"].includes(role);
  const curImg=cur?master[cur.seiban]?.imageUrl:null;
  const nxtImg=nxt?master[nxt.seiban]?.imageUrl:null;
  const fields=cur?getFields(role,cur,master):[];
  const isListRole=role==='リフトマン'||role==='ハンガー段取り';
  useEffect(()=>setFrac(''),[cur?.id]);

  async function handleComplete(){
    if(!cur||saving)return;
    setSaving(true);
    try{
      await onComplete(cur.id,role,needsFrac?frac:'');
      setLastDone({id:cur.id,role});
      setFlash(true);setTimeout(()=>setFlash(false),350);
    }catch(e){alert('保存に失敗: '+e.message);}
    finally{setSaving(false);}
  }
  async function handleUndo(){
    if(!lastDone||saving)return;
    setSaving(true);
    try{await onUndo(lastDone.id,lastDone.role);setLastDone(null);}
    catch(e){alert('取り消しに失敗: '+e.message);}
    finally{setSaving(false);}
  }

  if(role==='リフトマン')return <LiftmanScreen plans={plans} master={master} anomalyTypes={anomalyTypes} onComplete={onComplete} onBack={onBack}/>;
  if(role==='ハンガー段取り')return <HangerScreen plans={plans} master={master} anomalyTypes={anomalyTypes} onComplete={onComplete} onBack={onBack}/>;

  return(
    <div className="screen" style={{background:flash?l:'#F1EFE8',transition:'background .35s'}}>
      {modalImg&&<ImageModal src={modalImg} onClose={()=>setModalImg(null)}/>}
      <NavBar title={role} sub={ll?ll+t('ライン')+' '+t('担当'):undefined} onBack={onBack}
        right={<div style={{display:'flex',gap:8,alignItems:'center'}}>
          {lastDone&&<button className="btn-ghost" onClick={handleUndo} style={{minHeight:40,minWidth:64,fontSize:13}}>{t('取り消し')}</button>}

  {key:'actualFraction',label:'端数実績',unit:'個'},
  {key:'kakeWorkers',label:'掛け人数',unit:'人'},

];
const SHEET_ROLES=['製品段取り','ハンガー段取り','掛け','降ろし検査','出荷'];
const ROLE_SHORT={'製品段取り':'製','ハンガー段取り':'ハ','掛け':'掛','降ろし検査':'降','出荷':'出'};
const TH={padding:'7px 10px',textAlign:'left',fontSize:12,fontWeight:600,color:'#555',borderBottom:'2px solid #D8D6D0',whiteSpace:'nowrap',background:'#F4F2EC',position:'sticky',top:0};
const TD={padding:'7px 10px',fontSize:13,whiteSpace:'nowrap',borderBottom:'1px solid #EEECE6'};

function PlanSpreadsheet({plans,master}){
  function val(col,item){
    const m=master[item.seiban]||{};
    const v=col.ms?(m[col.key]!=null?m[col.key]:item[col.key]):item[col.key];
    if(v==null||v==='')return<span style={{color:'#CCC'}}>—</span>;
    return col.unit?v+col.unit:v;
  }
  function renderLine(line){
    const lc=line==='A'?'#185FA5':'#534AB7';
    const items=plans.filter(p=>p.line===line).sort((a,b)=>a.kakeTime.localeCompare(b.kakeTime));
    return(
      <div style={{marginBottom:32}}>
        <div style={{background:lc,color:'#fff',padding:'9px 16px',fontSize:15,fontWeight:700,borderRadius:'10px 10px 0 0',display:'flex',justifyContent:'space-between'}}>
          <span>{line}ライン</span>
          <span style={{fontWeight:400,fontSize:13}}>{items.length}件</span>
        </div>
        {items.length===0?(
          <div style={{padding:'24px',textAlign:'center',color:'#aaa',background:'#fff',border:'1px solid #E0DED8',borderTop:'none',borderRadius:'0 0 10px 10px'}}>計画データなし</div>
        ):(
          <div style={{overflowX:'auto',border:'1px solid #E0DED8',borderTop:'none',borderRadius:'0 0 10px 10px'}}>
            <table style={{width:'100%',borderCollapse:'collapse',minWidth:1200}}>
              <thead>
                <tr>
                  <th style={{...TH,width:36,textAlign:'center',color:'#aaa'}}>#</th>
                  {SHEET_COLS.map(c=><th key={c.key} style={TH}>{c.label}</th>)}
                  <th style={{...TH,minWidth:120}}>工程進捗</th>
                </tr>
              </thead>
              <tbody>
                {items.map((item,idx)=>{
                  const doneRoles=SHEET_ROLES.filter(r=>item.completions?.[r]?.done);
                  const allDone=doneRoles.length===SHEET_ROLES.length;
                  const rowBg=allDone?'#F4FAF0':idx%2===0?'#fff':'#FAFAF8';
                  return(
                    <tr key={item.id} style={{background:rowBg}}>
                      <td style={{...TD,textAlign:'center',color:'#bbb',fontSize:12}}>{idx+1}</td>
                      {SHEET_COLS.map(c=>(
                        <td key={c.key} style={{...TD,fontWeight:c.bold?700:400,color:c.bold?lc:'#333',fontSize:c.bold?15:13}}>
                          {val(c,item)}
                        </td>
                      ))}
                      <td style={TD}>
                        <div style={{display:'flex',gap:4,alignItems:'center'}}>
                          {SHEET_ROLES.map(r=>{
                            const done=item.completions?.[r]?.done;
                            const time=item.completions?.[r]?.time;
                            return(
                              <div key={r} title={r+(time?' ('+time+')':'')} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                                <div style={{width:20,height:20,borderRadius:4,background:done?'#3B6D11':'#E0DED8',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                  <span style={{fontSize:9,color:done?'#fff':'#aaa',fontWeight:700}}>{ROLE_SHORT[r]}</span>
                                </div>
                                {done&&time&&<span style={{fontSize:8,color:'#888'}}>{time}</span>}
                              </div>
                            );
                          })}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  }
  return(
    <div>
      {renderLine('A')}
      {renderLine('B')}
    </div>
  );
}

function AdminRegister({plans,master,onRegister}){
  const[text,setText]=useState('');
  const[line,setLine]=useState('A');
  const[planDate,setPlanDate]=useState(TODAY);
  const[prev,setPrev]=useState(null);
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState(null);
  function doParse(){
    const items=parseExcel(text,line);
    setPrev(items);setMsg(null);
  }
  async function doReg(){
    if(!prev?.length||loading)return;
    setLoading(true);setMsg(null);
    try{
      await onRegister(prev,planDate);
      const ac=prev.filter(i=>i.line==='A').length,bc=prev.filter(i=>i.line==='B').length;
      const desc=ac&&bc?`Aライン ${ac}件・Bライン ${bc}件`:ac?`Aライン ${ac}件`:`Bライン ${bc}件`;
      setMsg({ok:true,t:desc+' 登録しました（新規背番号はマスターに自動登録されます）'});
      setPrev(null);setText('');
    }catch(e){setMsg({ok:false,t:'登録に失敗: '+e.message});}
    finally{setLoading(false);}
  }
  return(
    <div style={{display:'grid',gridTemplateColumns:'360px 1fr',gap:32,alignItems:'start'}}>
      <div>
      <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'center'}}>
        <span style={{fontSize:14,color:'#555',fontWeight:500}}>日付：</span>
        <input type="date" value={planDate} onChange={e=>{setPlanDate(e.target.value);setPrev(null);setMsg(null);}} style={{fontSize:14,padding:'8px 12px',borderRadius:10,width:'auto',flex:'none'}}/>
        {planDate!==TODAY&&<span style={{fontSize:12,padding:'4px 10px',borderRadius:8,background:'#FAEEDA',color:'#854F0B',fontWeight:600}}>過去・未来の日付</span>}
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'center'}}>
        <span style={{fontSize:14,color:'#555',fontWeight:500}}>ライン：</span>
        {['A','B'].map(l=>(
          <button key={l} onClick={()=>{setLine(l);setPrev(null);setMsg(null);}} style={{minHeight:44,padding:'0 24px',borderRadius:10,fontSize:15,fontWeight:600,border:`2px solid ${line===l?'#185FA5':'#C0BEB5'}`,background:line===l?'#E6F1FB':'#fff',color:line===l?'#185FA5':'#888'}}>{l}ライン</button>
        ))}
      </div>
      <div style={{fontSize:12,color:'#888',marginBottom:8,lineHeight:1.6}}>A・B両方の場合はまとめて選択してコピペ（30列）。片方のみの場合は下のライン選択で区別（15列）。列順：掛け時間／降ろし時間／所要時間／背番号／製品数／素材箱数／ハンガー名称／ハンガー本数／ハンガー内端数予定／掛け人数／掛幅／設定電圧／電圧上限／完成品箱数／降ろし人数</div>
      <textarea value={text} onChange={e=>{setText(e.target.value);setPrev(null);setMsg(null);}} placeholder={"08:05\t09:07\t01:02\tUD365\t120\t10\tH-360A\t12\t3\t3\t450\t200\t220\t10\t2\n08:08\t09:11\t01:03\tUD72\t144\t12\tH-72B\t8\t2\t2\t380\t185\t205\t12\t2"} style={{width:'100%',height:120,fontFamily:'monospace',fontSize:12,resize:'vertical',marginBottom:10}}/>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <button onClick={doParse} disabled={!text.trim()} style={{minHeight:48,padding:'0 24px',borderRadius:10,border:'1px solid #C0BEB5',background:'#fff',fontSize:15}}>読み込み</button>
        {prev?.length>0&&<button onClick={doReg} disabled={loading} style={{minHeight:48,padding:'0 24px',borderRadius:10,border:'none',background:loading?'#B4B2A9':'#185FA5',color:'#fff',fontSize:15,fontWeight:600}}>{loading?'登録中...':'登録確定（'+prev.length+'件）'}</button>}
      </div>
      {msg&&<div style={{padding:'12px 14px',background:msg.ok?'#EAF3DE':'#FCEBEB',border:`1px solid ${msg.ok?'#3B6D11':'#A32D2D'}`,borderRadius:10,color:msg.ok?'#27500A':'#501313',fontSize:14,fontWeight:500,marginBottom:14}}>{msg.t}</div>}
      </div>
      {prev?(
        <div>
          <div style={{fontSize:14,fontWeight:600,color:'#555',marginBottom:10}}>プレビュー — {line}ライン（{prev.length}件）</div>
          <div style={{overflowX:'auto',border:'1px solid #E0DED8',borderRadius:12}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'#F8F7F4'}}>{['','L','背番号','掛け時間','降ろし時間','製品数','ハンガー名称','設定電圧','マスター'].map(h=><th key={h} style={{padding:'10px 8px',textAlign:'left',borderBottom:'1px solid #E0DED8',fontWeight:600,color:'#666',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
              <tbody>
                {prev.map((item,i)=>{const img=master[item.seiban]?.imageUrl;return(
                  <tr key={i} style={{borderBottom:'1px solid #F0EEE8'}}>
                    <td style={{padding:'8px'}}>{img?<img src={img} style={{width:32,height:32,objectFit:'contain',borderRadius:6}}/>:<div style={{width:32,height:32,borderRadius:6,background:'#F0EEE8'}}/>}</td>
                    <td style={{padding:'8px',fontWeight:700,color:item.line==='A'?'#185FA5':'#534AB7',fontSize:13}}>{item.line}</td>
                    <td style={{padding:'8px',fontWeight:700,color:'#111',fontSize:14}}>{item.seiban}</td>
                    <td style={{padding:'8px',color:'#333'}}>{item.kakeTime}</td>
                    <td style={{padding:'8px',color:'#333'}}>{item.orosiTime}</td>
                    <td style={{padding:'8px',color:'#333'}}>{item.products}</td>
                    <td style={{padding:'8px',color:'#333'}}>{item.hangerName||'—'}</td>
                    <td style={{padding:'8px',color:'#333'}}>{item.voltage?item.voltage+'V':'—'}</td>
                    <td style={{padding:'8px'}}><span style={{fontSize:11,padding:'3px 8px',borderRadius:6,fontWeight:600,background:master[item.seiban]?'#EAF3DE':'#FAEEDA',color:master[item.seiban]?'#27500A':'#854F0B'}}>{master[item.seiban]?'画像あり':'画像なし'}</span></td>
                  </tr>
                );})}
              </tbody>
            </table>
          </div>
        </div>
      ):<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',minHeight:200,border:'1px dashed #E0DED8',borderRadius:12,color:'#CCC',fontSize:14}}>貼り付け後にプレビューが表示されます</div>}
    </div>
  );
}

function AdminProgress({plans}){
  const[editPlan,setEditPlan]=useState(null);
  const[histDate,setHistDate]=useState(TODAY);
  const[histPlans,setHistPlans]=useState(null);
  const[histLoading,setHistLoading]=useState(false);
  async function deletePlan(planId){
    if(!window.confirm('この計画を削除しますか？完了済みの工程情報も削除されます。'))return;
    try{await db.collection('plans').doc(planId).delete();}
    catch(e){alert('削除失敗: '+e.message);}
  }

  async function loadHistory(date){
    if(date===TODAY){setHistPlans(null);return;}
    setHistLoading(true);
    try{
      const snap=await db.collection('plans').where('date','==',date).get();
      const p=[];snap.forEach(doc=>p.push({id:doc.id,...doc.data()}));
      p.sort((a,b)=>a.kakeTime.localeCompare(b.kakeTime)||a.line.localeCompare(b.line));
      setHistPlans(p);
    }catch(e){alert('読み込み失敗: '+e.message);}
    finally{setHistLoading(false);}
  }
  function handleDateChange(d){setHistDate(d);loadHistory(d);}
  const displayPlans=histPlans!==null?histPlans:plans;
  const isHistory=histDate!==TODAY;
  const now=new Date().toTimeString().slice(0,5);
  const sorted=[...displayPlans].sort((a,b)=>a.kakeTime.localeCompare(b.kakeTime)||a.line.localeCompare(b.line));
  const ad=p=>ROLES.every(r=>p.completions?.[r]?.done);
  const dl=p=>!isHistory&&p.kakeTime<now&&!ad(p);
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <div style={{fontSize:13,color:'#888',fontWeight:500,whiteSpace:'nowrap'}}>日付：</div>
        <input type="date" value={histDate} onChange={e=>handleDateChange(e.target.value)}
          style={{fontSize:14,padding:'8px 12px',borderRadius:10,width:'auto',flex:'none'}}/>
        {isHistory&&<span style={{fontSize:12,padding:'4px 10px',borderRadius:8,background:'#FAEEDA',color:'#854F0B',fontWeight:600}}>過去実績</span>}
        {isHistory&&<button onClick={()=>handleDateChange(TODAY)} style={{fontSize:12,padding:'6px 14px',borderRadius:8,border:'1px solid #C0BEB5',background:'#fff',color:'#555'}}>今日に戻る</button>}
        {histLoading&&<span style={{fontSize:12,color:'#888'}}>読み込み中...</span>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        {[{l:'全体',v:plans.length,c:'#111'},{l:'完了',v:plans.filter(ad).length,c:'#3B6D11'},{l:'進行中',v:plans.filter(p=>ROLES.some(r=>p.completions?.[r]?.done)&&!ad(p)).length,c:'#BA7517'},{l:'遅延',v:plans.filter(dl).length,c:'#993556'}].map(s=>(
          <div key={s.l} style={{background:'#fff',borderRadius:16,padding:'20px 12px',textAlign:'center',border:'1px solid #E0DED8'}}>
            <div style={{fontSize:13,color:'#888',marginBottom:8,fontWeight:500}}>{s.l}</div>
            <div style={{fontSize:40,fontWeight:700,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>
      <div style={{overflowX:'auto',border:'1px solid #E0DED8',borderRadius:12}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{background:'#F8F7F4'}}>
            <th style={{padding:'12px 12px',textAlign:'left',borderBottom:'1px solid #E0DED8',fontWeight:600,color:'#666',width:40}}>L</th>
            <th style={{padding:'12px 12px',textAlign:'left',borderBottom:'1px solid #E0DED8',fontWeight:600,color:'#666',width:120}}>背番号</th>
            <th style={{padding:'12px 12px',textAlign:'left',borderBottom:'1px solid #E0DED8',fontWeight:600,color:'#666',width:90}}>掛け時間</th>
            <th style={{padding:'12px 12px',textAlign:'left',borderBottom:'1px solid #E0DED8',fontWeight:600,color:'#666',width:90}}>降ろし時間</th>
            <th style={{padding:'12px 12px',textAlign:'right',borderBottom:'1px solid #E0DED8',fontWeight:600,color:'#666',width:80}}>製品数</th>
            {ROLES.map(r=><th key={r} style={{padding:'12px 8px',textAlign:'center',borderBottom:'1px solid #E0DED8',fontWeight:600,color:RA[r],width:80,fontSize:12}}>{r}</th>)}
            <th style={{padding:'12px 12px',textAlign:'center',borderBottom:'1px solid #E0DED8',fontWeight:600,color:'#666',width:80}}>状態</th>
            <th style={{padding:'12px 8px',textAlign:'center',borderBottom:'1px solid #E0DED8',fontWeight:600,color:'#666',width:110}}></th>
          </tr></thead>
          <tbody>
            {sorted.map(item=>(
              <tr key={item.id} style={{borderBottom:'1px solid #F0EEE8',background:ad(item)?'#EAF3DE55':dl(item)?'#FCEBEB55':'transparent'}}>
                <td style={{padding:'12px 12px',color:'#888',fontWeight:700,fontSize:14}}>{item.line}</td>
                <td style={{padding:'12px 12px',fontWeight:700,color:'#111',fontSize:15}}>{item.seiban}</td>
                <td style={{padding:'12px 12px',color:'#555',fontSize:14}}>{item.kakeTime}</td>
                <td style={{padding:'12px 12px',color:'#555',fontSize:14}}>{item.orosiTime||'—'}</td>
                <td style={{padding:'12px 12px',color:'#555',fontSize:14,textAlign:'right'}}>{item.products?item.products.toLocaleString():'—'}</td>
                {ROLES.map(r=><td key={r} style={{padding:'12px 8px',textAlign:'center'}}>{item.completions?.[r]?.done?<span style={{color:'#3B6D11',fontWeight:700,fontSize:18}}>○</span>:<span style={{color:'#DDD',fontSize:20}}>·</span>}</td>)}
                <td style={{padding:'12px 8px',textAlign:'center'}}>
                  {ad(item)?<span style={{fontSize:11,padding:'3px 7px',borderRadius:6,fontWeight:600,background:'#C0DD97',color:'#27500A'}}>完了</span>
                    :dl(item)?<span style={{fontSize:11,padding:'3px 7px',borderRadius:6,fontWeight:600,background:'#F09595',color:'#501313'}}>遅延</span>
                    :<span style={{fontSize:11,padding:'3px 7px',borderRadius:6,fontWeight:600,background:'#FAC775',color:'#412402'}}>進行中</span>}
                </td>
                <td style={{padding:'10px 8px',textAlign:'center'}}>
                  <div style={{display:'flex',gap:6,justifyContent:'center'}}>
                    <button onClick={()=>setEditPlan(item)} style={{padding:'5px 10px',borderRadius:8,border:'1px solid #C0BEB5',background:'#fff',fontSize:12,color:'#555'}}>編集</button>
                    <button onClick={()=>deletePlan(item.id)} style={{padding:'5px 10px',borderRadius:8,border:'1px solid #F09595',background:'#FCEBEB',fontSize:12,color:'#A32D2D',fontWeight:600}}>削除</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {editPlan&&<PlanEditModal plan={editPlan} onClose={()=>setEditPlan(null)}/>}
    </div>
  );
}

function AdminScreen({plans,master,anomalies,onRegister,onBack}){

  return(

      <div style={{borderBottom:'1px solid #E0DED8',background:'#fff',position:'sticky',top:0,zIndex:20}}>
        <div style={{display:'flex',alignItems:'center',padding:'12px 24px 0',maxWidth:1400,margin:'0 auto'}}>
          <button className="btn-ghost" onClick={onBack} style={{marginRight:12,minHeight:44,minWidth:64}}>← 戻る</button>
          <span style={{fontSize:17,fontWeight:700,color:'#111',flex:1}}>管理者</span>
        </div>
        <div style={{display:'flex',padding:'0 24px',maxWidth:1400,margin:'0 auto'}}>
          {[['register','計画登録'],['progress','進捗確認'],['sheet','計画表'],['anomaly','異常履歴']].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:'14px 24px',background:'none',border:'none',fontSize:15,fontWeight:600,color:tab===id?'#185FA5':'#888',borderBottom:tab===id?'3px solid #185FA5':'3px solid transparent',minHeight:52}}>{label}</button>

function MasterScreen({master,anomalyTypes,onAddAnomalyType,onRemoveAnomalyType,onBack}){
  const[sel,setSel]=useState(null);
  const[newSb,setNewSb]=useState('');
  const[uploadPct,setUploadPct]=useState(-1);
  const[adding,setAdding]=useState(false);
  const[seeding,setSeeding]=useState(false);
  const[newAT,setNewAT]=useState('');
  const[addingAT,setAddingAT]=useState(false);
  const[masterTab,setMasterTab]=useState('seiban');
  const fileRef=useRef(null);
  const seibanList=Object.keys(master).sort();
  const selData=sel?master[sel]:null;
  const selImg=selData?.imageUrl||null;
  const[qrText,setQrText]=useState('');
  const[savingQr,setSavingQr]=useState(false);
  const[note,setNote]=useState('');
  const[savingNote,setSavingNote]=useState(false);
  useEffect(()=>{setQrText(selData?.qrText||'');},[sel,master]);
  useEffect(()=>{setNote(selData?.note||'');},[sel,master]);

  async function handleSaveQr(){
    if(!sel)return;
    setSavingQr(true);
    try{
      if(qrText.trim()){
        await db.collection('master').doc(sel).set({qrText:qrText.trim()},{merge:true});
      }else{
        await db.collection('master').doc(sel).update({qrText:firebase.firestore.FieldValue.delete()});
      }
    }catch(err){alert('保存に失敗: '+err.message);}
    finally{setSavingQr(false);}
  }

  async function handleSaveNote(){
    if(!sel)return;
    setSavingNote(true);
    try{
      await db.collection('master').doc(sel).set({note:note.trim()},{merge:true});
    }catch(err){alert('保存に失敗: '+err.message);}
    finally{setSavingNote(false);}
  }

  async function handleImg(e){
    const file=e.target.files[0];if(!file||!sel)return;
    if(file.size>3*1024*1024){alert('ファイルサイズは3MB以下にしてください');return;}
    setUploadPct(0);
    try{
      const ref=stor.ref(`product-images/${sel}`);
      const task=ref.put(file);
      task.on('state_changed',snap=>setUploadPct(Math.round(snap.bytesTransferred/snap.totalBytes*100)));
      await task;
      const url=await ref.getDownloadURL();
      await db.collection('master').doc(sel).set({imageUrl:url},{merge:true});
    }catch(err){alert('アップロードに失敗しました: '+err.message);}
    finally{setUploadPct(-1);}
    e.target.value='';
  }

  async function handleDeleteImg(){
    if(!sel||!selImg)return;
    try{
      try{await stor.ref(`product-images/${sel}`).delete();}catch(e){}
      await db.collection('master').doc(sel).update({imageUrl:firebase.firestore.FieldValue.delete()});
    }catch(err){alert('削除に失敗: '+err.message);}
  }

  async function handleAdd(){
    const s=newSb.trim();if(!s)return;
    if(master[s]){alert('すでに登録されています');return;}
    setAdding(true);
    try{await db.collection('master').doc(s).set({},{merge:true});setSel(s);setNewSb('');}
    catch(err){alert('追加に失敗: '+err.message);}
    finally{setAdding(false);}
  }

  async function handleSeed(){
    setSeeding(true);
    try{
      const batch=db.batch();
      Object.entries(MASTER_DEFAULT).forEach(([sb,data])=>{batch.set(db.collection('master').doc(sb),data,{merge:true});});
      await batch.commit();
    }catch(err){alert('投入に失敗: '+err.message);}
    finally{setSeeding(false);}
  }

  async function handleDeleteSeiban(){
    if(!sel)return;
    if(!window.confirm(`背番号「${sel}」をマスターから削除しますか？\n画像も削除されます。`))return;
    try{
      try{await stor.ref(`product-images/${sel}`).delete();}catch(e){}
      await db.collection('master').doc(sel).delete();
      setSel(null);
    }catch(err){alert('削除に失敗: '+err.message);}
  }

  async function handleAddAT(){
    const n=newAT.trim();if(!n||addingAT)return;
    setAddingAT(true);
    try{await onAddAnomalyType(n);setNewAT('');}
    catch(e){alert('追加失敗: '+e.message);}
    finally{setAddingAT(false);}
  }

  return(
    <div className="screen-wide">
      <NavBar title="マスター管理" sub="背番号・画像・QRコード" onBack={onBack} wide={true}/>
      <div style={{padding:'24px',maxWidth:1400,margin:'0 auto'}}>
        <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:'1px solid #E0DED8'}}>
          {[['seiban','背番号マスター'],['anomaly','異常種別管理']].map(([id,label])=>(
            <button key={id} onClick={()=>setMasterTab(id)} style={{padding:'12px 24px',background:'none',border:'none',fontSize:14,fontWeight:600,color:masterTab===id?'#185FA5':'#888',borderBottom:masterTab===id?'3px solid #185FA5':'3px solid transparent'}}>{label}</button>
          ))}
        </div>

        {masterTab==='anomaly'&&(
          <div style={{maxWidth:600}}>
            <div style={{fontSize:14,color:'#888',marginBottom:16,lineHeight:1.7}}>作業者の異常ボタンに表示される種別を管理します。</div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              <input value={newAT} onChange={e=>setNewAT(e.target.value)} placeholder="新しい異常種別を追加..." style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&handleAddAT()}/>
              <button onClick={handleAddAT} disabled={!newAT.trim()||addingAT} style={{minHeight:48,padding:'0 18px',borderRadius:10,border:'none',background:addingAT?'#B4B2A9':'#185FA5',color:'#fff',fontSize:14,fontWeight:600,whiteSpace:'nowrap'}}>{addingAT?'追加中...':'追加'}</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
              {anomalyTypes.map(at=>(
                <div key={at.id} style={{display:'flex',alignItems:'center',gap:8,background:'#fff',border:'1px solid #E0DED8',borderRadius:12,padding:'12px 14px'}}>
                  <span style={{flex:1,fontSize:14,fontWeight:600,color:'#111'}}>{at.name}</span>
                  <button onClick={()=>onRemoveAnomalyType(at.id)} style={{width:28,height:28,borderRadius:'50%',background:'#FCEBEB',border:'none',color:'#A32D2D',fontSize:16,fontWeight:700,lineHeight:'28px',padding:0}}>×</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {masterTab==='seiban'&&(
          <div>
            <div style={{display:'flex',gap:8,marginBottom:12}}>
              <input value={newSb} onChange={e=>setNewSb(e.target.value)} placeholder="新しい背番号を追加..." style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&handleAdd()}/>
              <button onClick={handleAdd} disabled={!newSb.trim()||adding} style={{minHeight:48,padding:'0 16px',borderRadius:10,border:'none',background:adding?'#B4B2A9':'#185FA5',color:'#fff',fontSize:14,fontWeight:600,whiteSpace:'nowrap'}}>{adding?'追加中...':'追加'}</button>
            </div>
            {seibanList.length===0&&(
              <button onClick={handleSeed} disabled={seeding} style={{width:'100%',minHeight:48,borderRadius:12,border:'2px dashed #185FA5',background:'#E6F1FB',color:'#185FA5',fontSize:14,fontWeight:600,marginBottom:14}}>
                {seeding?'投入中...':'サンプルマスターデータを投入'}
              </button>
            )}
            {seibanList.length>0&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10,marginBottom:16}}>
                {seibanList.map(sb=>(
                  <button key={sb} onClick={()=>setSel(sel===sb?null:sb)} style={{padding:'10px 12px',textAlign:'left',background:sel===sb?'#E6F1FB':'#fff',border:`1px solid ${sel===sb?'#185FA5':'#E0DED8'}`,borderRadius:12}}>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      {master[sb]?.imageUrl
                        ?<img src={master[sb].imageUrl} style={{width:36,height:36,objectFit:'contain',borderRadius:6,border:'1px solid #E0DED8',flexShrink:0}}/>
                        :<div style={{width:36,height:36,borderRadius:6,border:'1px dashed #D0CEC8',background:'#F8F7F4',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:10,color:'#CCC'}}>IMG</span></div>
                      }
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:'#111',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sb}</div>
                        <div style={{fontSize:10,color:'#aaa',marginTop:2}}>{master[sb]?.imageUrl?'画像あり':'画像なし'}</div>
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            )}
            {sel&&(
              <div className="card">
                <div style={{padding:'14px 16px',borderBottom:'1px solid #F0EEE8',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{fontSize:20,fontWeight:700,color:'#111'}}>{sel}</div>
                  <button onClick={handleDeleteSeiban} style={{padding:'6px 14px',borderRadius:8,border:'1px solid #F09595',background:'#FCEBEB',fontSize:13,fontWeight:600,color:'#A32D2D'}}>削除</button>
                </div>
                <div style={{padding:'16px'}}>
                  <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:16,alignItems:'flex-start'}}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                      <div style={{background:'#fff',border:'1px solid #E0DED8',borderRadius:10,padding:6}}><QRDisplay value={selData?.qrText||sel} size={130}/></div>
                      <span style={{fontSize:11,color:'#888',textAlign:'center',maxWidth:150}}>{selData?.qrText?'カスタム文字列':'背番号をQR化'}</span>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,flex:1,minWidth:130}}>
                      {selImg?(
                        <div style={{position:'relative'}}>
                          <img src={selImg} style={{width:130,height:130,objectFit:'contain',borderRadius:10,border:'1px solid #E0DED8',display:'block'}}/>
                          <button onClick={handleDeleteImg} style={{position:'absolute',top:-8,right:-8,width:28,height:28,borderRadius:'50%',background:'#E24B4A',border:'none',color:'#fff',fontSize:15,fontWeight:700,lineHeight:'28px',padding:0}}>×</button>
                        </div>
                      ):(
                        <div onClick={()=>uploadPct<0&&fileRef.current?.click()} style={{width:130,height:130,border:'2px dashed #D0CEC8',borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#FAFAF8',cursor:'pointer',gap:8}}>
                          {uploadPct>=0?(
                            <>
                              <div style={{fontSize:20,fontWeight:700,color:'#185FA5'}}>{uploadPct}%</div>
                              <div style={{width:90,height:5,background:'#E0DED8',borderRadius:3}}>
                                <div style={{width:uploadPct+'%',height:'100%',background:'#185FA5',borderRadius:3,transition:'width .2s'}}/>
                              </div>
                            </>
                          ):(
                            <><span style={{fontSize:32,color:'#D0CEC8'}}>+</span><span style={{fontSize:12,color:'#CCC'}}>画像を追加</span></>
                          )}
                        </div>
                      )}
                      <input type="file" accept="image/*" ref={fileRef} style={{display:'none'}} onChange={handleImg}/>
                      <button onClick={()=>fileRef.current?.click()} disabled={uploadPct>=0} style={{minHeight:44,padding:'0 14px',borderRadius:8,border:'1px solid #C0BEB5',background:'#fff',fontSize:13,width:'100%'}}>
                        {uploadPct>=0?`アップロード中 ${uploadPct}%`:(selImg?'画像を変更':'画像をアップロード')}
                      </button>
                    </div>
                  </div>
                  <div style={{marginTop:16,paddingTop:14,borderTop:'1px solid #F0EEE8'}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#888',marginBottom:8}}>QR文字列設定</div>
                    <div style={{fontSize:11,color:'#aaa',marginBottom:8,lineHeight:1.6}}>未設定の場合は背番号（{sel}）をそのままQR化します</div>
                    <div style={{display:'flex',gap:8}}>
                      <input value={qrText} onChange={e=>setQrText(e.target.value)}
                        placeholder={'例: https://example.com/'+sel+' または 任意の文字列'}
                        style={{flex:1,fontSize:13}}
                        onKeyDown={e=>e.key==='Enter'&&handleSaveQr()}/>
                      <button onClick={handleSaveQr} disabled={savingQr} style={{minHeight:44,padding:'0 16px',borderRadius:10,border:'none',background:savingQr?'#B4B2A9':'#185FA5',color:'#fff',fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>{savingQr?'保存中...':'保存'}</button>
                    </div>
                    {selData?.qrText&&(
                      <div style={{marginTop:8,padding:'6px 10px',background:'#E6F1FB',borderRadius:8,fontSize:11,color:'#185FA5',wordBreak:'break-all'}}>現在: {selData.qrText}</div>
                    )}
                  </div>
                  <div style={{marginTop:14}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#888',letterSpacing:.5,marginBottom:6}}>注意ポイント</div>
                    <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="作業者に伝えたい注意事項を入力..."
                      style={{width:'100%',height:80,fontSize:13,resize:'vertical',marginBottom:6}}/>
                    <button onClick={handleSaveNote} disabled={savingNote} style={{minHeight:40,padding:'0 18px',borderRadius:10,border:'none',background:savingNote?'#B4B2A9':'#BA7517',color:'#fff',fontSize:13,fontWeight:600}}>
                      {savingNote?'保存中...':'注意ポイントを保存'}
                    </button>
                    {selData?.note&&<div style={{marginTop:6,padding:'5px 10px',background:'#FFFBEA',borderRadius:8,fontSize:11,color:'#8A6A00',wordBreak:'break-all'}}>現在: {selData.note}</div>}
                  </div>
                  {Object.entries(selData||{}).filter(([k])=>k!=='imageUrl'&&k!=='qrText'&&k!=='note'&&selData[k]).length>0&&(
                    <>
                      <div style={{fontSize:12,fontWeight:600,color:'#888',letterSpacing:.5,marginBottom:8,marginTop:14}}>塗装条件</div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px'}}>
                        {[['ハンガー名称',selData.hangerName],['ハンガー本数',selData.hangers?selData.hangers+'本':null],['掛幅',selData.width?selData.width+'mm':null],['設定電圧',selData.voltage?selData.voltage+'V':null],['段替え空フック数',selData.emptyHooks?selData.emptyHooks+'個':null],['ハンガー連続本数',selData.continuous?selData.continuous+'本':null]].filter(([,v])=>v).map(([l,v])=>(
                          <div key={l}><div style={{fontSize:10,color:'#aaa',marginBottom:2}}>{l}</div><div style={{fontSize:14,fontWeight:600,color:'#111'}}>{v}</div></div>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
function App(){
  const[ready,setReady]=useState(false);
  const[err,setErr]=useState(null);
  const[master,setMaster]=useState({});
  const[plans,setPlans]=useState([]);
  const[anomalyTypes,setAnomalyTypes]=useState(DEFAULT_ANOMALY_TYPES.map((n,i)=>({id:n,name:n,order:i})));
  const[anomalies,setAnomalies]=useState([]);
  const[screen,setScreen]=useState('home');
  const[role,setRole]=useState(null);
  const[line,setLine]=useState(null);

  useEffect(()=>{
    let unsubM,unsubP,unsubAT,unsubAnomaly;
    auth.setPersistence(firebase.auth.Auth.Persistence.NONE)
      .then(()=>auth.signInAnonymously())
      .then(()=>{
        unsubAT=db.collection('anomalyTypes').onSnapshot(snap=>{
          const types=[];snap.forEach(doc=>types.push({id:doc.id,...doc.data()}));
          types.sort((a,b)=>(a.order||99)-(b.order||99));
          setAnomalyTypes(types.length>0?types:DEFAULT_ANOMALY_TYPES.map((n,i)=>({id:n,name:n,order:i})));
        });
        unsubAnomaly=db.collection('anomalies').where('date','==',TODAY).onSnapshot(snap=>{
          const a=[];snap.forEach(doc=>a.push({id:doc.id,...doc.data()}));
          setAnomalies(a);
        });
        unsubM=db.collection('master').onSnapshot(snap=>{
          const m={};snap.forEach(doc=>{m[doc.id]={...doc.data()};});setMaster(m);
        },e=>console.error('master listener:',e));
        unsubP=db.collection('plans').where('date','==',TODAY).onSnapshot(snap=>{
          const p=[];snap.forEach(doc=>p.push({id:doc.id,...doc.data()}));
          p.sort((a,b)=>a.kakeTime.localeCompare(b.kakeTime));setPlans(p);
        },e=>console.error('plans listener:',e));
        setReady(true);
      })
      .catch(e=>setErr(e.message));
    return()=>{unsubM&&unsubM();unsubP&&unsubP();unsubAT&&unsubAT();unsubAnomaly&&unsubAnomaly();};
  },[]);

  async function onComplete(planId,role,frac){
    const now=new Date().toTimeString().slice(0,5);
    const upd={[`completions.${role}`]:{done:true,time:now,ts:Date.now()},updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(frac!=='')upd.actualFraction=frac;
    await db.collection('plans').doc(planId).update(upd);
  }

  async function onUndo(planId,role){
    await db.collection('plans').doc(planId).update({
      [`completions.${role}`]:firebase.firestore.FieldValue.delete(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  async function addAnomalyType(name){
    const existing=anomalyTypes.find(t=>t.name===name);
    if(existing)return;
    await db.collection('anomalyTypes').add({name,order:anomalyTypes.length,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  }
  async function removeAnomalyType(id){
    await db.collection('anomalyTypes').doc(id).delete();
  }

  async function onRegister(items,date){
    if(!items.length)return;
    const targetDate=date||TODAY;
    const lines=[...new Set(items.map(i=>i.line))];
    const batch=db.batch();
    const ex=await db.collection('plans').where('date','==',targetDate).get();
    // 既存の完了情報を保存（seiban+line+kakeTime をキーに）
    const savedCompletions={};
    ex.forEach(doc=>{
      const d=doc.data();
      if(lines.includes(d.line)){
        const key=`${d.line}_${d.seiban}_${d.kakeTime}`;
        if(d.completions&&Object.keys(d.completions).length>0)savedCompletions[key]=d.completions;
        batch.delete(doc.ref);
      }
    });
    items.forEach(item=>{
      const ref=db.collection('plans').doc();
      const key=`${item.line}_${item.seiban}_${item.kakeTime}`;
      const completions=savedCompletions[key]||{};
      batch.set(ref,{date:targetDate,line:item.line,seiban:item.seiban,
        kakeTime:item.kakeTime,orosiTime:item.orosiTime,reqTime:item.reqTime,
        products:item.products,materialBoxes:item.materialBoxes,
        hangerName:item.hangerName,hangers:item.hangers,fraction:item.fraction,
        kakeWorkers:item.kakeWorkers,width:item.width,
        voltage:item.voltage,voltageMax:item.voltageMax,
        finishedBoxes:item.finishedBoxes,orosiWorkers:item.orosiWorkers,
        completions,actualFraction:'',
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    await batch.commit();

    // 計画内の背番号でマスター未登録のものを自動登録（in上限10件ずつチャンク処理）
    const newSeibanList=[...new Set(items.map(i=>i.seiban))];
    const existingIds=new Set();
    for(let i=0;i<newSeibanList.length;i+=10){
      const chunk=newSeibanList.slice(i,i+10);
      const snap=await db.collection('master').where(firebase.firestore.FieldPath.documentId(),'in',chunk).get();
      snap.docs.forEach(d=>existingIds.add(d.id));
    }
    const autoRegBatch=db.batch();
    let autoCount=0;
    newSeibanList.forEach(sb=>{
      if(!existingIds.has(sb)){
        autoRegBatch.set(db.collection('master').doc(sb),{autoRegistered:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
        autoCount++;
      }
    });
    if(autoCount>0)await autoRegBatch.commit();
  }

  const{fontScale}=useLang();

  if(err)return<ErrorScreen error={err} onRetry={()=>window.location.reload()}/>;
  if(!ready)return<LoadingScreen/>;

  function selectRole(r){setRole(r);if(r==='リフトマン'||r==='製品段取り'||r==='出荷'||r==='ハンガー段取り'){setLine(null);setScreen('worker');}else setScreen('lineSelect');}

  const wrap=content=><div style={{zoom:fontScale,transformOrigin:'top left'}}>{content}</div>;

  if(screen==='home')return wrap(<HomeScreen onRole={selectRole} onAdmin={id=>setScreen(id)}/>);
  if(screen==='lineSelect')return wrap(<LineSelectScreen role={role} onLine={l=>{setLine(l);setScreen('worker');}} onBack={()=>setScreen('home')}/>);
  if(screen==='worker')return wrap(<WorkerScreen role={role} line={line} plans={plans} master={master} anomalyTypes={anomalyTypes} onComplete={onComplete} onUndo={onUndo} onBack={()=>setScreen('home')}/>);
  if(screen==='admin')return wrap(<AdminScreen plans={plans} master={master} anomalies={anomalies} onRegister={onRegister} onBack={()=>setScreen('home')}/>);
  if(screen==='master')return wrap(<MasterScreen master={master} anomalyTypes={anomalyTypes} onAddAnomalyType={addAnomalyType} onRemoveAnomalyType={removeAnomalyType} onBack={()=>setScreen('home')}/>);
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<LangProvider><App/></LangProvider>);
</script>
</body>
</html>
